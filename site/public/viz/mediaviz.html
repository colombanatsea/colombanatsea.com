            {title:'Le GASPE nomme Colomban Monnier délégué général',axis:'socio',channel:'presse',type:'Article presse',date:new Date(2025,9,31),reach:8000,url:'https://meretmarine.com/',starMedia:true,outlet:'Mer & Marine'},
            {title:'E-carburants : l’Europe face au défi de la souveraineté énergétique',axis:'enviro',channel:'presse',type:'Article presse',date:new Date(2025,11,8),reach:8000,url:'https://hydrocontest.fr/',starMedia:true,outlet:'HydroContest by ENSM'},
            {title:'Méditerranée centrale : délitement du droit international',axis:'socio',channel:'presse',type:'Article presse',date:new Date(2025,11,20),reach:8000,url:'https://lemonde.fr/',starMedia:true,outlet:'Le Monde'},
            {title:'Propulsion vélique : quand l’art de la navigation est réinventé',axis:'techno',channel:'presse',type:'Article presse',date:new Date(2026,0,13),reach:9000,url:'https://hydrocontest.fr/',starMedia:true,outlet:'HydroContest by ENSM'},
            {title:'Maritime : la grande mise à jour des compétences',axis:'socio',channel:'presse',type:'Article presse',date:new Date(2026,2,2),reach:9000,url:'https://hydrocontest.fr/',starMedia:true,outlet:'HydroContest by ENSM'},
            {title:'La donnée maritime comme boussole environnementale',axis:'enviro',channel:'presse',type:'Article presse',date:new Date(2026,2,2),reach:9000,url:'https://hydrocontest.fr/',starMedia:true,outlet:'HydroContest by ENSM'},
    ];

    const publications = rawPubs.map(function(p, i) {
        return {
            id: i,
            title: p.title,
            axis: p.axis,
            channel: p.channel,
            type: p.type,
            tier: getPubTier(p.channel),
            date: p.date,
            year: p.date.getFullYear(),
            reach: p.reach,
            url: p.url || null,
            starMedia: p.starMedia || false,
            outlet: p.outlet || null
        };
    }).sort(function(a, b) { return a.date - b.date; });

    // =============================================
    // SCALE REACH VALUES
    // =============================================
    (function scaleReachValues() {
        const viewsPerPosition = {
            2022: 2000, 2023: 3000, 2024: 6000, 2025: 8000, 2026: 9000
        };
        publications.forEach(p => {
            p.reach = viewsPerPosition[p.year] || 0;
        });
    })();

    // =============================================
    // CANVAS SETUP
    // =============================================
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
        W = window.innerWidth;
        H = window.innerHeight;
        const dpr = window.devicePixelRatio || 1;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();

    // =============================================
    // STATE
    // =============================================
    let activeAxis = 'all';
    let activeChannels = new Set(['linkedin', 'instagram', 'youtube', 'presse', 'conference']);
    let scrollProgress = 0; // 0..1 based on scroll position
    let currentYear = YEAR_MIN;
    let hoveredPub = null;
    let hoveredPubIdx = -1;
    let animatedPositions = [];
    const startTime = Date.now();
    const mousePos = { x: -9999, y: -9999 };

    // =============================================
    // LAYOUT - Single merged lane
    // =============================================
    // All axes share a single vertical space.
    // X = time (years), Y = random jitter across full usable height
    // Color coding distinguishes axes.

    function layoutPublications() {
        const marginLeft = 60;
        const marginRight = 30;
        const marginTop = 58; // below top bar
        const marginBottom = 50; // above scroll indicator

        const usableW = W - marginLeft - marginRight;
        const usableH = H - marginTop - marginBottom;

        const timelineStart = new Date(2022, 4, 1).getTime();
        const timelineEnd = new Date(2026, 2, 9).getTime();
        const timeRange = timelineEnd - timelineStart;

        // Seeded random for consistent positions
        let seed = 7;
        function rand() { seed = (seed * 16807 + 0) % 2147483647; return (seed - 1) / 2147483646; }

        animatedPositions = publications.map((pub, i) => {
            const tNorm = (pub.date.getTime() - timelineStart) / timeRange;
            const x = marginLeft + tNorm * usableW;

            // Y across full usable height with jitter
            const yCenter = marginTop + usableH * 0.5;
            const jitterRange = usableH * 0.42;
            const yJitter = (rand() - 0.5) * 2 * jitterRange;
            const y = yCenter + yJitter;

            // Size depends on tier:
            // media (presse) = large, prominent
            // conference = medium
            // social (linkedin, instagram, youtube) = small, subtle
            let size;
            if (pub.tier === 'media') {
                size = Math.max(4, Math.min(8, Math.sqrt(pub.reach) / 35));
            } else if (pub.tier === 'conference') {
                size = Math.max(3.5, Math.min(7, Math.sqrt(pub.reach) / 40));
            } else {
                size = Math.max(2, Math.min(4.5, Math.sqrt(pub.reach) / 55));
            }

            return {
                pub, x, y,
                baseX: x, baseY: y,
                size,
                opacity: 0,
                targetOpacity: 0,
                appeared: false,
                appearTime: 0
            };
        });
    }

    layoutPublications();

    // =============================================
    // SCROLL-DRIVEN TIMELINE
    // =============================================
    function getScrollProgress() {
        const scrollTop = window.scrollY || document.documentElement.scrollTop;
        const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
        return Math.max(0, Math.min(1, scrollTop / maxScroll));
    }

    function progressToYear(progress) {
        // Map 0..1 to YEAR_MIN..YEAR_MAX (with fractional part for smooth transitions)
        return YEAR_MIN + progress * (YEAR_MAX - YEAR_MIN);
    }

    function onScroll() {
        scrollProgress = getScrollProgress();
        const yearFloat = progressToYear(scrollProgress);
        currentYear = Math.floor(yearFloat);
        // Publications appear progressively: a pub appears when scroll reaches its year+month fraction
        updateVisibility(yearFloat);
        updateScrollUI();
    }

    window.addEventListener('scroll', onScroll, { passive: true });

    function updateScrollUI() {
        // Progress bar
        document.getElementById('scroll-progress-fill').style.width = (scrollProgress * 100) + '%';

        // Year labels highlight
        document.querySelectorAll('.year-label').forEach(lbl => {
            const y = parseInt(lbl.dataset.year);
            lbl.classList.remove('current', 'past');
            if (y === currentYear) lbl.classList.add('current');
            else if (y < currentYear) lbl.classList.add('past');
        });
    }

    // =============================================
    // FILTER LOGIC
    // =============================================
    function isVisible(ap, yearFloat) {
        const axisMatch = activeAxis === 'all' || ap.pub.axis === activeAxis;
        const channelMatch = activeChannels.has(ap.pub.channel);
        // Progressive reveal: use date fractional position
        const pubTimeNorm = (ap.pub.date.getTime() - new Date(2022, 4, 1).getTime()) /
                            (new Date(2026, 2, 9).getTime() - new Date(2022, 4, 1).getTime());
        const yearMatch = scrollProgress >= pubTimeNorm - 0.002; // slight lead for smoothness
        return axisMatch && channelMatch && yearMatch;
    }

    function updateVisibility(yearFloat) {
        if (yearFloat === undefined) yearFloat = progressToYear(scrollProgress);
        animatedPositions.forEach(ap => {
            const vis = isVisible(ap, yearFloat);
            ap.targetOpacity = vis ? 1 : 0.03;
            if (vis && !ap.appeared) {
                ap.appeared = true;
                ap.appearTime = Date.now();
            }
        });
        updateStats();
    }

    function updateStats() {
        const visible = animatedPositions.filter(ap => ap.targetOpacity > 0.5);
        document.getElementById('stat-total').textContent = visible.length;

        const mediaCount = visible.filter(ap => ap.pub.tier === 'media').length;
        document.getElementById('stat-media').textContent = mediaCount;

        // Cumulative reach of all publications that have appeared so far
        const timelineStart = new Date(2022, 4, 1).getTime();
        const timelineEnd = new Date(2026, 2, 9).getTime();
        const timeRange = timelineEnd - timelineStart;
        let cumulativeReach = 0;
        for (const ap of animatedPositions) {
            const pubTimeNorm = (ap.pub.date.getTime() - timelineStart) / timeRange;
            if (scrollProgress >= pubTimeNorm - 0.002) {
                cumulativeReach += ap.pub.reach;
            }
        }
        document.getElementById('stat-reach').textContent = cumulativeReach > 1000000
            ? (cumulativeReach / 1000000).toFixed(1) + 'M'
            : cumulativeReach > 1000
                ? Math.floor(cumulativeReach / 1000) + 'K'
                : cumulativeReach;
    }

    // =============================================
    // AXIS FILTER BUTTONS
    // =============================================
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeAxis = btn.dataset.axis;
            updateVisibility();
        });
    });

    // =============================================
    // CHANNEL FILTER BUTTONS
    // =============================================
    const ALL_CHANNELS = ['linkedin', 'instagram', 'youtube', 'presse', 'conference'];

    document.querySelectorAll('.channel-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const channel = btn.dataset.channel;
            if (channel === 'all') {
                const allActive = activeChannels.size === ALL_CHANNELS.length;
                if (allActive) {
                    activeChannels.clear();
                    document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
                } else {
                    activeChannels = new Set(ALL_CHANNELS);
                    document.querySelectorAll('.channel-btn').forEach(b => b.classList.add('active'));
                }
            } else {
                if (activeChannels.has(channel)) {
                    activeChannels.delete(channel);
                    btn.classList.remove('active');
                } else {
                    activeChannels.add(channel);
                    btn.classList.add('active');
                }
                const allBtn = document.querySelector('.channel-btn[data-channel="all"]');
                if (activeChannels.size === ALL_CHANNELS.length) {
                    allBtn.classList.add('active');
                } else {
                    allBtn.classList.remove('active');
                }
            }
            updateVisibility();
        });
    });

    // =============================================
    // YEAR LABELS
    // =============================================
    function buildYearLabels() {
        const container = document.getElementById('year-labels');
        container.innerHTML = '';
        for (let y = YEAR_MIN; y <= YEAR_MAX; y++) {
            const lbl = document.createElement('div');
            lbl.className = 'year-label';
            lbl.textContent = y;
            lbl.dataset.year = y;
            container.appendChild(lbl);
        }
    }
    buildYearLabels();

    // =============================================
    // MOUSE ON CANVAS
    // =============================================
    canvas.addEventListener('mousemove', (e) => {
        mousePos.x = e.clientX;
        mousePos.y = e.clientY;
    });

    canvas.addEventListener('mouseleave', () => {
        mousePos.x = -9999;
        mousePos.y = -9999;
    });

    canvas.addEventListener('click', () => {
        if (hoveredPub) {
            const popup = document.getElementById('detail-popup');
            popup.style.display = 'block';
            popup.style.left = Math.min(mousePos.x + 16, W - 300) + 'px';
            popup.style.top = Math.min(mousePos.y - 16, H - 200) + 'px';

            document.getElementById('popup-title').textContent = hoveredPub.title;
            document.getElementById('popup-title').style.color = COLORS[hoveredPub.axis + 'Light'] || '#fff';

            // Show outlet name for presse, channel label for others
            const channelDisplay = hoveredPub.outlet || CHANNELS[hoveredPub.channel].label;
            document.getElementById('popup-channel').textContent = channelDisplay + ' \u00B7 ' + hoveredPub.date.toLocaleDateString('fr-FR', { year: 'numeric', month: 'long', day: 'numeric' });

            document.getElementById('popup-excerpt').textContent = '';

            const linkEl = document.getElementById('popup-link');
            if (hoveredPub.url) {
                linkEl.href = hoveredPub.url;
                linkEl.style.display = 'inline-block';
                linkEl.textContent = 'Lire l\u2019article \u2192';
            } else {
                linkEl.style.display = 'none';
            }
        } else {
            document.getElementById('detail-popup').style.display = 'none';
        }
    });

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.detail-popup') && !e.target.closest('#canvas')) {
            document.getElementById('detail-popup').style.display = 'none';
        }
    });

    // =============================================
    // RENDER
    // =============================================
    function render() {
        requestAnimationFrame(render);
        const time = (Date.now() - startTime) / 1000;

        ctx.fillStyle = '#0d1117';
        ctx.fillRect(0, 0, W, H);

        const marginTop = 58;
        const marginBottom = 50;
        const marginLeft = 60;
        const marginRight = 30;
        const usableH = H - marginTop - marginBottom;
        const usableW = W - marginLeft - marginRight;

        // Draw year grid lines
        const timelineStart = new Date(2022, 4, 1).getTime();
        const timelineEnd = new Date(2026, 2, 9).getTime();
        const timeRange = timelineEnd - timelineStart;
        ctx.globalAlpha = 0.1;
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 0.5;
        for (let y = YEAR_MIN; y <= YEAR_MAX; y++) {
            const tNorm = (new Date(y, 0, 1).getTime() - timelineStart) / timeRange;
            const x = marginLeft + tNorm * usableW;
            ctx.beginPath();
            ctx.moveTo(x, marginTop);
            ctx.lineTo(x, marginTop + usableH);
            ctx.stroke();
        }
        ctx.globalAlpha = 1;

        // Draw scroll position indicator (vertical line showing current time)
        const scrollX = marginLeft + scrollProgress * usableW;
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(scrollX, marginTop);
        ctx.lineTo(scrollX, marginTop + usableH);
        ctx.stroke();
        ctx.setLineDash([]);

        // Hovered pub detection
        hoveredPub = null;
        hoveredPubIdx = -1;

        for (let i = animatedPositions.length - 1; i >= 0; i--) {
            const ap = animatedPositions[i];
            if (ap.opacity < 0.3) continue;
            const dist = Math.hypot(mousePos.x - ap.x, mousePos.y - ap.y);
            const hitRadius = ap.size + (ap.pub.tier === 'media' ? 8 : 5);
            if (dist < hitRadius) {
                hoveredPub = ap.pub;
                hoveredPubIdx = i;
                break;
            }
        }

        // Draw connections between nearby same-axis publications
        ctx.globalAlpha = 0.05;
        for (let i = 0; i < animatedPositions.length; i++) {
            const a = animatedPositions[i];
            if (a.opacity < 0.3) continue;
            for (let j = i + 1; j < Math.min(i + 8, animatedPositions.length); j++) {
                const b = animatedPositions[j];
                if (b.opacity < 0.3 || a.pub.axis !== b.pub.axis) continue;
                const dist = Math.hypot(a.x - b.x, a.y - b.y);
                if (dist < 50) {
                    ctx.strokeStyle = COLORS[a.pub.axis];
                    ctx.lineWidth = 0.4;
                    ctx.beginPath();
                    ctx.moveTo(a.x, a.y);
                    ctx.lineTo(b.x, b.y);
                    ctx.stroke();
                }
            }
        }
        ctx.globalAlpha = 1;

        // Highlight connections for hovered pub
        if (hoveredPubIdx >= 0) {
            const hp = animatedPositions[hoveredPubIdx];
            ctx.globalAlpha = 0.2;
            animatedPositions.forEach((ap, i) => {
                if (i === hoveredPubIdx || ap.opacity < 0.3) return;
                if (ap.pub.axis !== hp.pub.axis) return;
                const dist = Math.hypot(hp.x - ap.x, hp.y - ap.y);
                if (dist < 120) {
                    ctx.strokeStyle = COLORS[hp.pub.axis + 'Light'] || COLORS[hp.pub.axis];
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(hp.x, hp.y);
                    ctx.lineTo(ap.x, ap.y);
                    ctx.stroke();
                    ap._highlight = true;
                }
            });
            ctx.globalAlpha = 1;
        }

        // Draw publications
        animatedPositions.forEach((ap, i) => {
            // Smooth opacity transition
            ap.opacity += (ap.targetOpacity - ap.opacity) * 0.12;
            if (ap.opacity < 0.02) { ap._highlight = false; return; }

            const color = COLORS[ap.pub.axis];
            const lightColor = COLORS[ap.pub.axis + 'Light'];

            const isHovered = (i === hoveredPubIdx);
            const isHighlighted = ap._highlight;
            ap._highlight = false;

            const isMedia = ap.pub.tier === 'media';
            const isConf = ap.pub.tier === 'conference';

            const scaleFactor = isHovered ? 1.4 : isHighlighted ? 1.15 : 1;
            const displaySize = ap.size * scaleFactor;

            // Appear animation
            let extraAlpha = 1;
            if (ap.appearTime > 0) {
                const elapsed = (Date.now() - ap.appearTime) / 1000;
                if (elapsed < 0.6) extraAlpha = elapsed / 0.6;
            }

            ctx.globalAlpha = ap.opacity * extraAlpha;

            if (isMedia) {
                // Press/media: medium circle, solid fill, thin white border
                const r = displaySize * 0.9;
                ctx.fillStyle = isHovered ? lightColor : color;
                ctx.beginPath();
                ctx.arc(ap.x, ap.y, r, 0, Math.PI * 2);
                ctx.fill();
                // White border ring
                ctx.strokeStyle = isHovered ? '#ffffff' : 'rgba(255,255,255,0.6)';
                ctx.lineWidth = 1;
                ctx.stroke();

            } else if (isConf) {
                // Conference: smaller circle, solid fill, no border
                const r = displaySize * 0.9;
                ctx.fillStyle = isHovered ? lightColor : color;
                ctx.beginPath();
                ctx.arc(ap.x, ap.y, r, 0, Math.PI * 2);
                ctx.fill();

            } else {
                // Social: tiny dot, muted color at 50% opacity
                const r = Math.max(1.5, displaySize * 0.55);
                ctx.fillStyle = isHovered ? lightColor : color;
                ctx.globalAlpha = ap.opacity * extraAlpha * (isHovered ? 0.9 : 0.5);
                ctx.beginPath();
                ctx.arc(ap.x, ap.y, r, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = ap.opacity * extraAlpha;
            }

            // Label on hover
            if (isHovered && ap.opacity > 0.5) {
                ctx.globalAlpha = 1;
                ctx.fillStyle = '#ffffff';
                ctx.font = '600 10px Poppins';
                ctx.textAlign = 'center';
                const labelText = ap.pub.title.length > 45 ? ap.pub.title.substring(0, 45) + '...' : ap.pub.title;
                ctx.fillText(labelText, ap.x, ap.y - displaySize - 14);

                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.font = '9px Poppins';
                const channelDisplay = ap.pub.outlet || CHANNELS[ap.pub.channel].label;
                ctx.fillText(channelDisplay + ' \u00B7 ' + ap.pub.year, ap.x, ap.y - displaySize - 4);

                canvas.style.cursor = 'pointer';
            }

            ctx.globalAlpha = 1;
        });

        if (!hoveredPub) canvas.style.cursor = 'default';

    }

    // =============================================
    // INIT
    // =============================================
    animatedPositions.forEach(ap => {
        ap.targetOpacity = 0;
        ap.opacity = 0;
    });
    updateStats();
    onScroll(); // set initial state from scroll position

    render();

    window.addEventListener('resize', () => {
        resize();
        layoutPublications();
        buildYearLabels();
        updateVisibility();
        updateScrollUI();
    });

    // Keyboard shortcut: Escape to close popup
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            document.getElementById('detail-popup').style.display = 'none';
        }
    });
    </script>
