<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proto 4 — Prises de position · Colomban</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d1117;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            /* Tall scroll container for scroll-driven timeline */
            height: 500vh;
            user-select: none;
        }

        #canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
            width: 100vw;
            height: 100vh;
        }

        /* ── Top bar: compact, single row ── */
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: rgba(13,17,23,0.88);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            gap: 12px;
        }
        .top-bar .title {
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
            letter-spacing: -0.3px;
        }
        .top-bar .title span {
            font-family: 'Source Serif 4', serif;
            font-size: 11px;
            font-style: italic;
            color: rgba(255,255,255,0.35);
            margin-left: 8px;
            font-weight: 400;
        }

        /* ── Filters row ── */
        .filters {
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: nowrap;
        }
        .filter-sep {
            width: 1px;
            height: 16px;
            background: rgba(255,255,255,0.12);
            margin: 0 4px;
        }
        .filter-btn {
            padding: 3px 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: transparent;
            color: rgba(255,255,255,0.4);
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 10px;
            font-weight: 600;
            transition: all 0.25s;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            white-space: nowrap;
        }
        .filter-btn:hover { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.2); }
        .filter-btn.active { color: #fff; }
        .filter-btn[data-axis="all"].active { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.25); }
        .filter-btn[data-axis="techno"].active { background: rgba(42,85,179,0.25); border-color: #2a55b3; color: #6b9fff; }
        .filter-btn[data-axis="enviro"].active { background: rgba(0,191,99,0.15); border-color: #00bf63; color: #4dff99; }
        .filter-btn[data-axis="socio"].active { background: rgba(179,42,85,0.25); border-color: #b32a55; color: #ff6b99; }

        .channel-btn {
            padding: 3px 8px;
            border: 1px solid rgba(255,255,255,0.06);
            background: transparent;
            color: rgba(255,255,255,0.3);
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 9px;
            font-weight: 500;
            transition: all 0.25s;
            white-space: nowrap;
        }
        .channel-btn:hover { color: rgba(255,255,255,0.6); }
        .channel-btn.active { color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); }

        /* ── Stats: inline in top bar ── */
        .stats {
            display: flex;
            gap: 14px;
            align-items: center;
            white-space: nowrap;
        }
        .stat {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }
        .stat .number {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }
        .stat .label {
            font-size: 8px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        /* ── Bottom scroll indicator ── */
        .scroll-indicator {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(13,17,23,0.9);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255,255,255,0.06);
            padding: 6px 16px 10px;
        }
        .scroll-progress-track {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            margin-bottom: 4px;
            overflow: hidden;
        }
        .scroll-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2a55b3, #00bf63, #b32a55);
            border-radius: 2px;
            width: 0%;
            transition: width 0.05s linear;
        }
        .year-labels {
            display: flex;
            justify-content: space-between;
            padding: 0 2px;
        }
        .year-label {
            font-size: 9px;
            color: rgba(255,255,255,0.6);
            transition: all 0.2s;
            text-align: center;
            min-width: 28px;
        }
        .year-label.current { color: #fff; font-weight: 700; }
        .year-label.past { color: rgba(255,255,255,0.75); }
        .current-year-display {
            position: fixed;
            bottom: 44px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 101;
            font-size: 28px;
            font-weight: 700;
            color: rgba(255,255,255,0.55);
            font-variant-numeric: tabular-nums;
            pointer-events: none;
            letter-spacing: 2px;
        }
        .scroll-hint {
            position: fixed;
            bottom: 58px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 101;
            font-size: 9px;
            color: rgba(255,255,255,0.45);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            pointer-events: none;
            animation: fadeHint 4s ease-out forwards;
        }
        @keyframes fadeHint {
            0%, 60% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* ── Detail popup ── */
        .detail-popup {
            position: fixed;
            z-index: 200;
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 14px;
            max-width: 280px;
            display: none;
            pointer-events: auto;
            transition: opacity 0.2s;
        }
        .detail-popup .pub-type {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }
        .detail-popup .pub-tier {
            display: inline-block;
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 1px 6px;
            border-radius: 6px;
            margin-left: 6px;
            font-weight: 600;
        }
        .detail-popup .pub-tier.media { background: rgba(212,168,87,0.25); color: #d4a857; }
        .detail-popup .pub-tier.conference { background: rgba(155,89,182,0.2); color: #b97fd4; }
        .detail-popup .pub-tier.social { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.4); }
        .detail-popup h3 {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 3px;
            line-height: 1.35;
        }
        .detail-popup .channel {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 6px;
        }
        .detail-popup .excerpt {
            font-family: 'Source Serif 4', serif;
            font-size: 11px;
            line-height: 1.5;
            color: rgba(255,255,255,0.6);
            margin-bottom: 8px;
        }
        .detail-popup .metrics {
            display: flex;
            gap: 12px;
            font-size: 10px;
            color: rgba(255,255,255,0.35);
        }
        .detail-popup .metrics strong { color: rgba(255,255,255,0.7); }

        /* ── Legend ── */
        .legend {
            position: fixed;
            bottom: 52px;
            right: 16px;
            z-index: 101;
            display: flex;
            gap: 12px;
            align-items: center;
            font-size: 8px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .legend-dot {
            border-radius: 50%;
            display: inline-block;
        }
        .legend-dot.media {
            width: 10px; height: 10px;
            box-shadow: 0 0 6px rgba(212,168,87,0.5);
            border: 1.5px solid rgba(255,255,255,0.4);
        }
        .legend-dot.conf {
            width: 7px; height: 7px;
            background: rgba(255,255,255,0.4);
        }
        .legend-dot.social {
            width: 5px; height: 5px;
            background: rgba(255,255,255,0.25);
        }

        /* ── Watermark ── */
        .watermark {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            font-size: 7px;
            color: rgba(255,255,255,0.04);
            letter-spacing: 3px;
            text-transform: uppercase;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <!-- Top bar: title + filters + stats -->
    <div class="top-bar">
        <div class="title">Prises de position<span>2013 -- 2026</span></div>
        <div class="filters">
            <button class="filter-btn active" data-axis="all">Tous</button>
            <button class="filter-btn" data-axis="techno">Techno</button>
            <button class="filter-btn" data-axis="enviro">Enviro</button>
            <button class="filter-btn" data-axis="socio">Socio</button>
            <div class="filter-sep"></div>
            <button class="channel-btn active" data-channel="all">Tous</button>
            <button class="channel-btn active" data-channel="linkedin">LinkedIn</button>
            <button class="channel-btn active" data-channel="instagram">Instagram</button>
            <button class="channel-btn active" data-channel="youtube">YouTube</button>
            <button class="channel-btn active" data-channel="presse">Presse</button>
            <button class="channel-btn active" data-channel="conference">Conference</button>
        </div>
        <div class="stats">
            <div class="stat">
                <div class="number" id="stat-total">0</div>
                <div class="label">publications visibles</div>
            </div>
            <div class="stat">
                <div class="number" id="stat-reach">0</div>
                <div class="label">portée cumulée</div>
            </div>
            <div class="stat">
                <div class="number" id="stat-media">0</div>
                <div class="label">articles presse</div>
            </div>
        </div>
    </div>

    <!-- Bottom scroll indicator -->
    <div class="scroll-indicator">
        <div class="scroll-progress-track">
            <div class="scroll-progress-fill" id="scroll-progress-fill"></div>
        </div>
        <div class="year-labels" id="year-labels"></div>
    </div>
    <div class="current-year-display" id="current-year-display">2013</div>
    <div class="scroll-hint">Scroll pour naviguer dans le temps</div>

    <!-- Legend: axis colors + tier sizes -->
    <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="width:8px;height:8px;background:#2a55b3;box-shadow:0 0 6px rgba(42,85,179,0.6);"></div> <span style="color:rgba(255,255,255,0.7)">Technologique</span></div>
        <div class="legend-item"><div class="legend-dot" style="width:8px;height:8px;background:#00bf63;box-shadow:0 0 6px rgba(0,191,99,0.6);"></div> <span style="color:rgba(255,255,255,0.7)">Environnementale</span></div>
        <div class="legend-item"><div class="legend-dot" style="width:8px;height:8px;background:#b32a55;box-shadow:0 0 6px rgba(179,42,85,0.6);"></div> <span style="color:rgba(255,255,255,0.7)">Socioculturelle</span></div>
        <div style="width:1px;height:14px;background:rgba(255,255,255,0.15);margin:0 4px;"></div>
        <div class="legend-item"><div class="legend-dot media" style="width:10px;height:10px;background:rgba(255,255,255,0.8);box-shadow:0 0 6px rgba(212,168,87,0.5);border:1.5px solid rgba(255,255,255,0.4);"></div> Presse</div>
        <div class="legend-item"><div class="legend-dot" style="width:7px;height:7px;background:rgba(255,255,255,0.45);"></div> Conf</div>
        <div class="legend-item"><div class="legend-dot" style="width:4px;height:4px;background:rgba(255,255,255,0.3);"></div> Social</div>
    </div>

    <!-- Detail popup -->
    <div class="detail-popup" id="detail-popup">
        <div style="display:flex;align-items:center;">
            <div class="pub-type" id="popup-type"></div>
            <div class="pub-tier" id="popup-tier"></div>
        </div>
        <h3 id="popup-title"></h3>
        <div class="channel" id="popup-channel"></div>
        <div class="excerpt" id="popup-excerpt"></div>
        <div class="metrics">
            <span><strong id="popup-reach">--</strong> portee</span>
            <span><strong id="popup-date">--</strong></span>
        </div>
    </div>

    <div class="watermark">COLOMBAN -- PRISES DE POSITION -- SCROLL-VIZ</div>

    <script>
    // =============================================
    // COLORS & CHANNELS
    // =============================================
    const COLORS = {
        techno: '#2a55b3',
        enviro: '#00bf63',
        socio:  '#b32a55',
        technoLight: '#6b9fff',
        enviroLight: '#4dff99',
        socioLight:  '#ff6b99',
        technoGlow: 'rgba(42, 85, 179, 0.35)',
        enviroGlow: 'rgba(0, 191, 99, 0.25)',
        socioGlow:  'rgba(179, 42, 85, 0.35)'
    };

    const CHANNELS = {
        linkedin:   { label: 'LinkedIn', color: '#0077b5' },
        instagram:  { label: 'Instagram', color: '#e4405f' },
        youtube:    { label: 'YouTube', color: '#ff0000' },
        presse:     { label: 'Presse', color: '#d4a857' },
        conference: { label: 'Conference', color: '#9b59b6' }
    };

    // Publication tier: media > conference > social
    // media = presse (Jeune Marine, Marine & Oceans, press coverage)
    // conference = conference
    // social = linkedin, instagram, youtube
    function getPubTier(channel) {
        if (channel === 'presse') return 'media';
        if (channel === 'conference') return 'conference';
        return 'social';
    }

    const YEAR_MIN = 2013;
    const YEAR_MAX = 2026;
    const YEAR_COUNT = YEAR_MAX - YEAR_MIN + 1;

    // =============================================
    // DATA GENERATION
    // =============================================
    function generatePublications() {
        const pubs = [];

        const subjects = [
            // LinkedIn - techno
            { title: "L'IA dans le maritime : hype ou revolution ?", axis: 'techno', channel: 'linkedin', type: 'Analyse' },
            { title: 'Les cables sous-marins, arteres du monde digital', axis: 'techno', channel: 'linkedin', type: 'Carte' },
            { title: 'Data maritime : 600 navires analyses', axis: 'techno', channel: 'linkedin', type: 'Analyse' },
            { title: 'Logbooks electroniques : la fin du papier a bord', axis: 'techno', channel: 'linkedin', type: 'Analyse' },
            { title: 'Navires autonomes : fantasme ou realite 2030 ?', axis: 'techno', channel: 'linkedin', type: 'Analyse' },
            { title: 'IoT maritime : chaque capteur raconte une histoire', axis: 'techno', channel: 'linkedin', type: 'Education' },
            // LinkedIn - enviro
            { title: 'Decarbonation du shipping : ou en est-on ?', axis: 'enviro', channel: 'linkedin', type: 'Analyse' },
            { title: 'CII, EEXI, EU MRV : le marin face a la reglementation', axis: 'enviro', channel: 'linkedin', type: 'Education' },
            { title: 'EMR : les hydroliennes ont-elles un avenir ?', axis: 'enviro', channel: 'linkedin', type: 'Analyse' },
            { title: 'Limites planetaires : au-dela du climat', axis: 'enviro', channel: 'linkedin', type: 'Education' },
            { title: 'Propulsion velique : retour vers le futur', axis: 'enviro', channel: 'linkedin', type: 'Analyse' },
            { title: 'Scrubbers vs. LNG : faux debat ?', axis: 'enviro', channel: 'linkedin', type: 'Analyse' },
            // LinkedIn - socio
            { title: 'Archipel France : 11M de km2 oublies', axis: 'socio', channel: 'linkedin', type: 'Appel' },
            { title: 'Les grandes decouvertes : premieres startups', axis: 'socio', channel: 'linkedin', type: 'Inspiration' },
            { title: 'GASPE : le service public maritime en France', axis: 'socio', channel: 'linkedin', type: 'Education' },
            { title: 'Oceans : 3e employeur mondial ignore', axis: 'socio', channel: 'linkedin', type: 'Analyse' },
            { title: 'La mer nourrit, transporte, connecte : qui le sait ?', axis: 'socio', channel: 'linkedin', type: 'Appel' },
            // Instagram
            { title: 'Le maritime dans la culture francaise', axis: 'socio', channel: 'instagram', type: 'Inspiration' },
            { title: 'Petit Bateau, JPG et le marin', axis: 'socio', channel: 'instagram', type: 'Inspiration' },
            { title: 'NRL La Reunion : construire l\'impossible', axis: 'techno', channel: 'instagram', type: 'Inspiration' },
            { title: 'Infographie : 1 objet sur 2 a pris la mer', axis: 'socio', channel: 'instagram', type: 'Education' },
            { title: 'Biodiversite abyssale : l\'inconnu sous nos pieds', axis: 'enviro', channel: 'instagram', type: 'Inspiration' },
            // YouTube
            { title: 'Hissez Mots : "Amarrer"', axis: 'socio', channel: 'youtube', type: 'Video' },
            { title: 'Comment devenir officier de marine marchande', axis: 'socio', channel: 'youtube', type: 'Education' },
            { title: 'Visite du CMA CGM Jacques Saade', axis: 'techno', channel: 'youtube', type: 'Video' },
            { title: 'Hissez Mots : "Tribord"', axis: 'socio', channel: 'youtube', type: 'Video' },
            { title: '24h a bord d\'un porte-conteneurs', axis: 'socio', channel: 'youtube', type: 'Video' },
            // Presse (media - highlighted)
            { title: 'Jeune Marine : l\'officier connecte', axis: 'techno', channel: 'presse', type: 'Article presse' },
            { title: 'Marine & Oceans : transition techno du maritime', axis: 'techno', channel: 'presse', type: 'Article presse' },
            { title: 'Le Monde : la France et ses 11M km2 de mer', axis: 'socio', channel: 'presse', type: 'Article presse' },
            { title: 'TF1 : quotidien des marins marchands', axis: 'socio', channel: 'presse', type: 'Article presse' },
            { title: 'Mer & Marine : innovations digitales shipping', axis: 'techno', channel: 'presse', type: 'Article presse' },
            { title: 'La ZEE francaise, un empire invisible', axis: 'socio', channel: 'presse', type: 'Article presse' },
            { title: 'Conflits : geopolitique des mers', axis: 'socio', channel: 'presse', type: 'Article presse' },
            { title: 'Ouest-France : le renouveau de la marine a voile', axis: 'enviro', channel: 'presse', type: 'Article presse' },
            { title: 'Les Echos : economie bleue, secteur d\'avenir', axis: 'socio', channel: 'presse', type: 'Article presse' },
            { title: 'Jeune Marine : decarbonation et futur du shipping', axis: 'enviro', channel: 'presse', type: 'Article presse' },
            { title: 'Marine & Oceans : souverainete maritime francaise', axis: 'socio', channel: 'presse', type: 'Article presse' },
            // Conferences
            { title: 'Euromaritime 2020 : modele eco des compagnies de service public', axis: 'socio', channel: 'conference', type: 'Conference' },
            { title: 'Euromaritime 2022 : digitalisation du shipping', axis: 'techno', channel: 'conference', type: 'Conference' },
            { title: 'Euromaritime 2024 : decarbonation et regulation', axis: 'enviro', channel: 'conference', type: 'Conference' },
            { title: 'Academie de Marine : potentiel strategique du maritime de proximite', axis: 'socio', channel: 'conference', type: 'Conference' },
            { title: 'Academie de Marine : ZEE et souverainete', axis: 'socio', channel: 'conference', type: 'Conference' },
            { title: 'Propeller Club Marseille : Introduction to digitalization', axis: 'techno', channel: 'conference', type: 'Conference' },
            { title: 'Propeller Club Le Havre : Introduction to decarbonation', axis: 'enviro', channel: 'conference', type: 'Conference' },
            { title: 'Race for Water : propulsion velique et decarbonation', axis: 'enviro', channel: 'conference', type: 'Conference' },
            { title: 'Digital Ship Athens : electronic logbooks', axis: 'techno', channel: 'conference', type: 'Conference' },
            { title: 'Digital Ship Hamburg : maritime AI applications', axis: 'techno', channel: 'conference', type: 'Conference' },
            { title: 'Universite de Rennes : decarbonation du maritime', axis: 'enviro', channel: 'conference', type: 'Conference' },
            { title: 'AG Federation Merite Maritime : avenir du maritime', axis: 'socio', channel: 'conference', type: 'Conference' },
            { title: 'Cyberdefense maritime : le prochain front', axis: 'techno', channel: 'conference', type: 'Conference' },
            { title: 'Le sauvetage en mer a l\'ere du digital', axis: 'techno', channel: 'conference', type: 'Conference' },
            { title: 'CMA CGM : innovation day keynote', axis: 'techno', channel: 'conference', type: 'Conference' },
            { title: 'Assises de l\'economie de la mer : panel decarbonation', axis: 'enviro', channel: 'conference', type: 'Conference' },
            { title: 'Sea Tech Week Brest : capteurs et IoT maritime', axis: 'techno', channel: 'conference', type: 'Conference' },
        ];

        // Seeded pseudo-random for reproducibility
        let seed = 42;
        function rand() { seed = (seed * 16807 + 0) % 2147483647; return (seed - 1) / 2147483646; }

        for (let year = YEAR_MIN; year <= YEAR_MAX; year++) {
            let count;
            if (year <= 2015) count = Math.floor(rand() * 2) + 1;
            else if (year <= 2018) count = Math.floor(rand() * 4) + 2;
            else if (year <= 2020) count = Math.floor(rand() * 6) + 4;
            else if (year <= 2023) count = Math.floor(rand() * 10) + 7;
            else count = Math.floor(rand() * 14) + 10;

            for (let i = 0; i < count; i++) {
                const template = subjects[Math.floor(rand() * subjects.length)];
                const month = Math.floor(rand() * 12);
                const day = Math.floor(rand() * 28) + 1;
                const reach = year <= 2019
                    ? Math.floor(rand() * 5000) + 300
                    : Math.floor(rand() * 50000) + 2000;

                pubs.push({
                    id: pubs.length,
                    title: template.title,
                    axis: template.axis,
                    channel: template.channel,
                    type: template.type,
                    tier: getPubTier(template.channel),
                    date: new Date(year, month, day),
                    year: year,
                    reach: reach,
                    excerpt: 'Analyse et reflexion sur les enjeux maritimes contemporains.'
                });
            }
        }

        return pubs.sort((a, b) => a.date - b.date);
    }

    const publications = generatePublications();

    // =============================================
    // SCALE REACH TO HIT CUMULATIVE TARGETS
    // =============================================
    // Targets: cumulative reach = 2,400,000 by end 2024, 3,600,000 by end 2025
    // Extrapolate 2023 and 2026 proportionally.
    (function scaleReachValues() {
        // Group pubs by year-end buckets
        const pubsThrough2024 = publications.filter(p => p.year <= 2024);
        const pubsIn2025 = publications.filter(p => p.year === 2025);
        const pubsIn2026 = publications.filter(p => p.year === 2026);
        const pubsThrough2023 = publications.filter(p => p.year <= 2023);

        // Raw sums
        const rawThrough2024 = pubsThrough2024.reduce((s, p) => s + p.reach, 0);
        const rawIn2025 = pubsIn2025.reduce((s, p) => s + p.reach, 0);

        // Scale all pubs through 2024 so their cumulative = 2,400,000
        const scale2024 = 2400000 / rawThrough2024;
        pubsThrough2024.forEach(p => { p.reach = Math.round(p.reach * scale2024); });

        // Scale 2025 pubs so cumulative through 2025 = 3,600,000
        // Need 2025 to add 1,200,000
        const target2025Delta = 3600000 - 2400000; // 1,200,000
        const scale2025 = target2025Delta / rawIn2025;
        pubsIn2025.forEach(p => { p.reach = Math.round(p.reach * scale2025); });

        // Extrapolate 2026: growth from 2024->2025 was 1.2M over 2.4M = 50% growth
        // Apply same 50% growth for 2026 delta = 1,800,000
        const target2026Delta = 1800000;
        const rawIn2026 = pubsIn2026.reduce((s, p) => s + p.reach, 0);
        if (rawIn2026 > 0) {
            const scale2026 = target2026Delta / rawIn2026;
            pubsIn2026.forEach(p => { p.reach = Math.round(p.reach * scale2026); });
        }

        // For 2023: proportionally back-calculate
        // Through 2023 is part of the 2,400,000 total through 2024
        // The raw ratio of through-2023 vs through-2024 determines how much
        // cumulative was reached by end of 2023.
        // Already scaled, so cumulative through 2023 is just the sum of scaled pubs through 2023.
        // This is already correct since we scaled all pubs through 2024 uniformly.
    })();

    // =============================================
    // CANVAS SETUP
    // =============================================
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
        W = window.innerWidth;
        H = window.innerHeight;
        const dpr = window.devicePixelRatio || 1;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();

    // =============================================
    // STATE
    // =============================================
    let activeAxis = 'all';
    let activeChannels = new Set(['linkedin', 'instagram', 'youtube', 'presse', 'conference']);
    let scrollProgress = 0; // 0..1 based on scroll position
    let currentYear = YEAR_MIN;
    let hoveredPub = null;
    let hoveredPubIdx = -1;
    let animatedPositions = [];
    const startTime = Date.now();
    const mousePos = { x: -9999, y: -9999 };

    // =============================================
    // LAYOUT - Single merged lane
    // =============================================
    // All axes share a single vertical space.
    // X = time (years), Y = random jitter across full usable height
    // Color coding distinguishes axes.

    function layoutPublications() {
        const marginLeft = 60;
        const marginRight = 30;
        const marginTop = 58; // below top bar
        const marginBottom = 50; // above scroll indicator

        const usableW = W - marginLeft - marginRight;
        const usableH = H - marginTop - marginBottom;

        const timelineStart = new Date(YEAR_MIN, 0, 1).getTime();
        const timelineEnd = new Date(YEAR_MAX + 1, 0, 1).getTime();
        const timeRange = timelineEnd - timelineStart;

        // Seeded random for consistent positions
        let seed = 7;
        function rand() { seed = (seed * 16807 + 0) % 2147483647; return (seed - 1) / 2147483646; }

        animatedPositions = publications.map((pub, i) => {
            const tNorm = (pub.date.getTime() - timelineStart) / timeRange;
            const x = marginLeft + tNorm * usableW;

            // Y across full usable height with jitter
            const yCenter = marginTop + usableH * 0.5;
            const jitterRange = usableH * 0.42;
            const yJitter = (rand() - 0.5) * 2 * jitterRange;
            const y = yCenter + yJitter;

            // Size depends on tier:
            // media (presse) = large, prominent
            // conference = medium
            // social (linkedin, instagram, youtube) = small, subtle
            let size;
            if (pub.tier === 'media') {
                size = Math.max(6, Math.min(12, Math.sqrt(pub.reach) / 25));
            } else if (pub.tier === 'conference') {
                size = Math.max(3.5, Math.min(7, Math.sqrt(pub.reach) / 40));
            } else {
                size = Math.max(2, Math.min(4.5, Math.sqrt(pub.reach) / 55));
            }

            return {
                pub, x, y,
                baseX: x, baseY: y,
                size,
                opacity: 0,
                targetOpacity: 0,
                appeared: false,
                appearTime: 0
            };
        });
    }

    layoutPublications();

    // =============================================
    // SCROLL-DRIVEN TIMELINE
    // =============================================
    function getScrollProgress() {
        const scrollTop = window.scrollY || document.documentElement.scrollTop;
        const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
        return Math.max(0, Math.min(1, scrollTop / maxScroll));
    }

    function progressToYear(progress) {
        // Map 0..1 to YEAR_MIN..YEAR_MAX (with fractional part for smooth transitions)
        return YEAR_MIN + progress * (YEAR_MAX - YEAR_MIN);
    }

    function onScroll() {
        scrollProgress = getScrollProgress();
        const yearFloat = progressToYear(scrollProgress);
        currentYear = Math.floor(yearFloat);
        // Publications appear progressively: a pub appears when scroll reaches its year+month fraction
        updateVisibility(yearFloat);
        updateScrollUI();
    }

    window.addEventListener('scroll', onScroll, { passive: true });

    function updateScrollUI() {
        // Progress bar
        document.getElementById('scroll-progress-fill').style.width = (scrollProgress * 100) + '%';

        // Year display
        const display = document.getElementById('current-year-display');
        display.textContent = currentYear;

        // Year labels highlight
        document.querySelectorAll('.year-label').forEach(lbl => {
            const y = parseInt(lbl.dataset.year);
            lbl.classList.remove('current', 'past');
            if (y === currentYear) lbl.classList.add('current');
            else if (y < currentYear) lbl.classList.add('past');
        });
    }

    // =============================================
    // FILTER LOGIC
    // =============================================
    function isVisible(ap, yearFloat) {
        const axisMatch = activeAxis === 'all' || ap.pub.axis === activeAxis;
        const channelMatch = activeChannels.has(ap.pub.channel);
        // Progressive reveal: use date fractional position
        const pubTimeNorm = (ap.pub.date.getTime() - new Date(YEAR_MIN, 0, 1).getTime()) /
                            (new Date(YEAR_MAX + 1, 0, 1).getTime() - new Date(YEAR_MIN, 0, 1).getTime());
        const yearMatch = scrollProgress >= pubTimeNorm - 0.002; // slight lead for smoothness
        return axisMatch && channelMatch && yearMatch;
    }

    function updateVisibility(yearFloat) {
        if (yearFloat === undefined) yearFloat = progressToYear(scrollProgress);
        animatedPositions.forEach(ap => {
            const vis = isVisible(ap, yearFloat);
            ap.targetOpacity = vis ? 1 : 0.03;
            if (vis && !ap.appeared) {
                ap.appeared = true;
                ap.appearTime = Date.now();
            }
        });
        updateStats();
    }

    function updateStats() {
        const visible = animatedPositions.filter(ap => ap.targetOpacity > 0.5);
        document.getElementById('stat-total').textContent = visible.length;

        // Cumulative reach: sum reach of all publications up to the current scroll position
        // (i.e., all pubs that have appeared so far, regardless of axis/channel filter)
        const timelineStart = new Date(YEAR_MIN, 0, 1).getTime();
        const timelineEnd = new Date(YEAR_MAX + 1, 0, 1).getTime();
        const timeRange = timelineEnd - timelineStart;
        let cumulativeReach = 0;
        for (const ap of animatedPositions) {
            const pubTimeNorm = (ap.pub.date.getTime() - timelineStart) / timeRange;
            if (scrollProgress >= pubTimeNorm - 0.002) {
                cumulativeReach += ap.pub.reach;
            }
        }
        document.getElementById('stat-reach').textContent = cumulativeReach > 1000000
            ? (cumulativeReach / 1000000).toFixed(1) + 'M'
            : cumulativeReach > 1000
                ? Math.floor(cumulativeReach / 1000) + 'K'
                : cumulativeReach;

        const mediaCount = visible.filter(ap => ap.pub.tier === 'media').length;
        document.getElementById('stat-media').textContent = mediaCount;
    }

    // =============================================
    // AXIS FILTER BUTTONS
    // =============================================
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeAxis = btn.dataset.axis;
            updateVisibility();
        });
    });

    // =============================================
    // CHANNEL FILTER BUTTONS
    // =============================================
    const ALL_CHANNELS = ['linkedin', 'instagram', 'youtube', 'presse', 'conference'];

    document.querySelectorAll('.channel-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const channel = btn.dataset.channel;
            if (channel === 'all') {
                const allActive = activeChannels.size === ALL_CHANNELS.length;
                if (allActive) {
                    activeChannels.clear();
                    document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
                } else {
                    activeChannels = new Set(ALL_CHANNELS);
                    document.querySelectorAll('.channel-btn').forEach(b => b.classList.add('active'));
                }
            } else {
                if (activeChannels.has(channel)) {
                    activeChannels.delete(channel);
                    btn.classList.remove('active');
                } else {
                    activeChannels.add(channel);
                    btn.classList.add('active');
                }
                const allBtn = document.querySelector('.channel-btn[data-channel="all"]');
                if (activeChannels.size === ALL_CHANNELS.length) {
                    allBtn.classList.add('active');
                } else {
                    allBtn.classList.remove('active');
                }
            }
            updateVisibility();
        });
    });

    // =============================================
    // YEAR LABELS
    // =============================================
    function buildYearLabels() {
        const container = document.getElementById('year-labels');
        container.innerHTML = '';
        for (let y = YEAR_MIN; y <= YEAR_MAX; y++) {
            const lbl = document.createElement('div');
            lbl.className = 'year-label';
            lbl.textContent = y;
            lbl.dataset.year = y;
            container.appendChild(lbl);
        }
    }
    buildYearLabels();

    // =============================================
    // MOUSE ON CANVAS
    // =============================================
    canvas.addEventListener('mousemove', (e) => {
        mousePos.x = e.clientX;
        mousePos.y = e.clientY;
    });

    canvas.addEventListener('mouseleave', () => {
        mousePos.x = -9999;
        mousePos.y = -9999;
    });

    canvas.addEventListener('click', () => {
        if (hoveredPub) {
            const popup = document.getElementById('detail-popup');
            popup.style.display = 'block';
            popup.style.left = Math.min(mousePos.x + 16, W - 300) + 'px';
            popup.style.top = Math.min(mousePos.y - 16, H - 200) + 'px';
            document.getElementById('popup-type').textContent = hoveredPub.type;
            document.getElementById('popup-type').style.color = COLORS[hoveredPub.axis];

            const tierEl = document.getElementById('popup-tier');
            tierEl.textContent = hoveredPub.tier === 'media' ? 'PRESSE' : hoveredPub.tier === 'conference' ? 'CONF' : 'SOCIAL';
            tierEl.className = 'pub-tier ' + hoveredPub.tier;

            document.getElementById('popup-title').textContent = hoveredPub.title;
            document.getElementById('popup-channel').textContent = CHANNELS[hoveredPub.channel].label + ' \u00B7 ' + hoveredPub.date.toLocaleDateString('fr-FR');
            document.getElementById('popup-excerpt').textContent = hoveredPub.excerpt;
            document.getElementById('popup-reach').textContent = hoveredPub.reach.toLocaleString('fr-FR');
            document.getElementById('popup-date').textContent = hoveredPub.date.toLocaleDateString('fr-FR', { year: 'numeric', month: 'long' });
        } else {
            document.getElementById('detail-popup').style.display = 'none';
        }
    });

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.detail-popup') && !e.target.closest('#canvas')) {
            document.getElementById('detail-popup').style.display = 'none';
        }
    });

    // =============================================
    // RENDER
    // =============================================
    function render() {
        requestAnimationFrame(render);
        const time = (Date.now() - startTime) / 1000;

        ctx.fillStyle = '#0d1117';
        ctx.fillRect(0, 0, W, H);

        const marginTop = 58;
        const marginBottom = 50;
        const marginLeft = 60;
        const marginRight = 30;
        const usableH = H - marginTop - marginBottom;
        const usableW = W - marginLeft - marginRight;

        // Draw year grid lines
        const timelineStart = new Date(YEAR_MIN, 0, 1).getTime();
        const timelineEnd = new Date(YEAR_MAX + 1, 0, 1).getTime();
        const timeRange = timelineEnd - timelineStart;
        ctx.globalAlpha = 0.1;
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 0.5;
        for (let y = YEAR_MIN; y <= YEAR_MAX; y++) {
            const tNorm = (new Date(y, 0, 1).getTime() - timelineStart) / timeRange;
            const x = marginLeft + tNorm * usableW;
            ctx.beginPath();
            ctx.moveTo(x, marginTop);
            ctx.lineTo(x, marginTop + usableH);
            ctx.stroke();
        }
        ctx.globalAlpha = 1;

        // Draw scroll position indicator (vertical line showing current time)
        const scrollX = marginLeft + scrollProgress * usableW;
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(scrollX, marginTop);
        ctx.lineTo(scrollX, marginTop + usableH);
        ctx.stroke();
        ctx.setLineDash([]);

        // Hovered pub detection
        hoveredPub = null;
        hoveredPubIdx = -1;

        for (let i = animatedPositions.length - 1; i >= 0; i--) {
            const ap = animatedPositions[i];
            if (ap.opacity < 0.3) continue;
            const dist = Math.hypot(mousePos.x - ap.x, mousePos.y - ap.y);
            const hitRadius = ap.size + (ap.pub.tier === 'media' ? 8 : 5);
            if (dist < hitRadius) {
                hoveredPub = ap.pub;
                hoveredPubIdx = i;
                break;
            }
        }

        // Draw connections between nearby same-axis publications
        ctx.globalAlpha = 0.05;
        for (let i = 0; i < animatedPositions.length; i++) {
            const a = animatedPositions[i];
            if (a.opacity < 0.3) continue;
            for (let j = i + 1; j < Math.min(i + 8, animatedPositions.length); j++) {
                const b = animatedPositions[j];
                if (b.opacity < 0.3 || a.pub.axis !== b.pub.axis) continue;
                const dist = Math.hypot(a.x - b.x, a.y - b.y);
                if (dist < 50) {
                    ctx.strokeStyle = COLORS[a.pub.axis];
                    ctx.lineWidth = 0.4;
                    ctx.beginPath();
                    ctx.moveTo(a.x, a.y);
                    ctx.lineTo(b.x, b.y);
                    ctx.stroke();
                }
            }
        }
        ctx.globalAlpha = 1;

        // Highlight connections for hovered pub
        if (hoveredPubIdx >= 0) {
            const hp = animatedPositions[hoveredPubIdx];
            ctx.globalAlpha = 0.2;
            animatedPositions.forEach((ap, i) => {
                if (i === hoveredPubIdx || ap.opacity < 0.3) return;
                if (ap.pub.axis !== hp.pub.axis) return;
                const dist = Math.hypot(hp.x - ap.x, hp.y - ap.y);
                if (dist < 120) {
                    ctx.strokeStyle = COLORS[hp.pub.axis + 'Light'] || COLORS[hp.pub.axis];
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(hp.x, hp.y);
                    ctx.lineTo(ap.x, ap.y);
                    ctx.stroke();
                    ap._highlight = true;
                }
            });
            ctx.globalAlpha = 1;
        }

        // Draw publications
        animatedPositions.forEach((ap, i) => {
            // Smooth opacity transition
            ap.opacity += (ap.targetOpacity - ap.opacity) * 0.12;
            if (ap.opacity < 0.02) { ap._highlight = false; return; }

            const color = COLORS[ap.pub.axis];
            const lightColor = COLORS[ap.pub.axis + 'Light'];
            const glowColor = COLORS[ap.pub.axis + 'Glow'];
            const breathe = Math.sin(time * 0.5 + i * 0.3) * 0.15;

            const isHovered = (i === hoveredPubIdx);
            const isHighlighted = ap._highlight;
            ap._highlight = false;

            const isMedia = ap.pub.tier === 'media';
            const isConf = ap.pub.tier === 'conference';

            const scaleFactor = isHovered ? 1.8 : isHighlighted ? 1.3 : 1;
            const displaySize = ap.size * (1 + breathe * 0.1) * scaleFactor;

            // Appear animation
            let extraAlpha = 1;
            if (ap.appearTime > 0) {
                const elapsed = (Date.now() - ap.appearTime) / 1000;
                if (elapsed < 0.6) extraAlpha = elapsed / 0.6;
            }

            ctx.globalAlpha = ap.opacity * extraAlpha;

            // === MEDIA PUBLICATIONS: special glow + ring ===
            if (isMedia) {
                // Outer glow aura (pulsing)
                const pulseSize = displaySize * (3.5 + Math.sin(time * 1.2 + i) * 0.5);
                const glow = ctx.createRadialGradient(ap.x, ap.y, displaySize * 0.5, ap.x, ap.y, pulseSize);
                glow.addColorStop(0, glowColor);
                glow.addColorStop(0.5, glowColor.replace(/[\d.]+\)$/, '0.1)'));
                glow.addColorStop(1, 'transparent');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(ap.x, ap.y, pulseSize, 0, Math.PI * 2);
                ctx.fill();

                // Bright core dot
                ctx.fillStyle = (isHovered || isHighlighted) ? '#ffffff' : lightColor;
                ctx.beginPath();
                ctx.arc(ap.x, ap.y, displaySize, 0, Math.PI * 2);
                ctx.fill();

                // Ring around media dots
                ctx.strokeStyle = isHovered ? '#ffffff' : 'rgba(255,255,255,0.45)';
                ctx.lineWidth = isHovered ? 2 : 1.2;
                ctx.beginPath();
                ctx.arc(ap.x, ap.y, displaySize + 3, 0, Math.PI * 2);
                ctx.stroke();

                // Diamond icon in center for large enough dots
                if (displaySize > 5) {
                    ctx.fillStyle = isHovered ? color : 'rgba(255,255,255,0.7)';
                    const d = displaySize * 0.35;
                    ctx.beginPath();
                    ctx.moveTo(ap.x, ap.y - d);
                    ctx.lineTo(ap.x + d, ap.y);
                    ctx.lineTo(ap.x, ap.y + d);
                    ctx.lineTo(ap.x - d, ap.y);
                    ctx.closePath();
                    ctx.fill();
                }

            } else if (isConf) {
                // Conference: normal dot with subtle glow
                if (isHovered || isHighlighted || displaySize > 4) {
                    const glowSize = displaySize * (isHovered ? 3.5 : 2.2);
                    const glow = ctx.createRadialGradient(ap.x, ap.y, 0, ap.x, ap.y, glowSize);
                    glow.addColorStop(0, glowColor);
                    glow.addColorStop(1, 'transparent');
                    ctx.fillStyle = glow;
                    ctx.beginPath();
                    ctx.arc(ap.x, ap.y, glowSize, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.fillStyle = (isHovered || isHighlighted) ? lightColor : color;
                ctx.beginPath();
                ctx.arc(ap.x, ap.y, displaySize, 0, Math.PI * 2);
                ctx.fill();

            } else {
                // Social: small, subtle dot
                const muted = color;
                ctx.fillStyle = (isHovered || isHighlighted) ? lightColor : muted;
                ctx.globalAlpha = ap.opacity * extraAlpha * (isHovered ? 1 : 0.6);
                ctx.beginPath();
                ctx.arc(ap.x, ap.y, displaySize, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = ap.opacity * extraAlpha;
            }

            // Label on hover
            if (isHovered && ap.opacity > 0.5) {
                ctx.globalAlpha = 1;
                ctx.fillStyle = '#ffffff';
                ctx.font = '600 10px Poppins';
                ctx.textAlign = 'center';
                const labelText = ap.pub.title.length > 45 ? ap.pub.title.substring(0, 45) + '...' : ap.pub.title;
                ctx.fillText(labelText, ap.x, ap.y - displaySize - 14);

                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.font = '9px Poppins';
                const tierLabel = ap.pub.tier === 'media' ? ' \u2605 PRESSE' : ap.pub.tier === 'conference' ? ' CONF' : '';
                ctx.fillText(CHANNELS[ap.pub.channel].label + ' \u00B7 ' + ap.pub.year + tierLabel, ap.x, ap.y - displaySize - 4);

                canvas.style.cursor = 'pointer';
            }

            ctx.globalAlpha = 1;
        });

        if (!hoveredPub) canvas.style.cursor = 'default';

        // Year labels on canvas (bottom of each year column)
        ctx.font = '500 9px Poppins';
        ctx.textAlign = 'center';
        for (let y = YEAR_MIN; y <= YEAR_MAX; y++) {
            const tNorm = (new Date(y, 6, 1).getTime() - timelineStart) / timeRange; // mid-year
            const x = marginLeft + tNorm * usableW;
            if (y === currentYear) {
                ctx.globalAlpha = 0.7;
                ctx.fillStyle = '#ffffff';
                ctx.font = '700 10px Poppins';
            } else if (y < currentYear) {
                ctx.globalAlpha = 0.35;
                ctx.fillStyle = '#ffffff';
                ctx.font = '500 9px Poppins';
            } else {
                ctx.globalAlpha = 0.18;
                ctx.fillStyle = '#ffffff';
                ctx.font = '500 9px Poppins';
            }
            ctx.fillText(y, x, marginTop + usableH + 14);
        }
        ctx.globalAlpha = 1;
    }

    // =============================================
    // INIT
    // =============================================
    animatedPositions.forEach(ap => {
        ap.targetOpacity = 0;
        ap.opacity = 0;
    });
    updateStats();
    onScroll(); // set initial state from scroll position

    render();

    window.addEventListener('resize', () => {
        resize();
        layoutPublications();
        buildYearLabels();
        updateVisibility();
        updateScrollUI();
    });

    // Keyboard shortcut: Escape to close popup
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            document.getElementById('detail-popup').style.display = 'none';
        }
    });
    </script>
</body>
</html>
