<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proto 4 — Média-viz Constellation · Colomban</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e1a;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            height: 100vh;
            user-select: none;
        }

        #canvas { position: fixed; top: 0; left: 0; z-index: 1; }

        /* ── Top bar: compact, single row ── */
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: rgba(10,14,26,0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            gap: 12px;
        }
        .top-bar .title {
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
            letter-spacing: -0.3px;
        }
        .top-bar .title span {
            font-family: 'Source Serif 4', serif;
            font-size: 11px;
            font-style: italic;
            color: rgba(255,255,255,0.35);
            margin-left: 8px;
            font-weight: 400;
        }

        /* ── Filters row ── */
        .filters {
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: nowrap;
        }
        .filter-sep {
            width: 1px;
            height: 16px;
            background: rgba(255,255,255,0.12);
            margin: 0 4px;
        }
        .filter-btn {
            padding: 3px 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: transparent;
            color: rgba(255,255,255,0.4);
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 10px;
            font-weight: 600;
            transition: all 0.25s;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            white-space: nowrap;
        }
        .filter-btn:hover { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.2); }
        .filter-btn.active { color: #fff; }
        .filter-btn[data-axis="all"].active { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.25); }
        .filter-btn[data-axis="techno"].active { background: rgba(42,85,179,0.25); border-color: #2a55b3; color: #6b9fff; }
        .filter-btn[data-axis="enviro"].active { background: rgba(0,191,99,0.15); border-color: #00bf63; color: #4dff99; }
        .filter-btn[data-axis="socio"].active { background: rgba(179,42,85,0.25); border-color: #b32a55; color: #ff6b99; }

        .channel-btn {
            padding: 3px 8px;
            border: 1px solid rgba(255,255,255,0.06);
            background: transparent;
            color: rgba(255,255,255,0.3);
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 9px;
            font-weight: 500;
            transition: all 0.25s;
            white-space: nowrap;
        }
        .channel-btn:hover { color: rgba(255,255,255,0.6); }
        .channel-btn.active { color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); }

        /* ── Stats: inline in top bar ── */
        .stats {
            display: flex;
            gap: 14px;
            align-items: center;
            white-space: nowrap;
        }
        .stat {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }
        .stat .number {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }
        .stat .label {
            font-size: 8px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        /* ── Bottom timeline area ── */
        .timeline-area {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(10,14,26,0.9);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255,255,255,0.06);
            padding: 4px 16px 8px;
        }

        /* Density mini chart */
        .density-chart {
            height: 20px;
            display: flex;
            align-items: flex-end;
            gap: 1px;
            margin-bottom: 2px;
        }
        .density-bar-item {
            flex: 1;
            border-radius: 1px 1px 0 0;
            transition: background 0.3s, height 0.3s;
            min-height: 1px;
        }

        /* Transport controls */
        .transport {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 2px;
        }
        .transport-btn {
            width: 26px; height: 26px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.6);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            transition: all 0.2s;
        }
        .transport-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .transport-btn.playing { background: rgba(42,85,179,0.3); border-color: #2a55b3; color: #6b9fff; }

        /* Slider track */
        .slider-container {
            flex: 1;
            position: relative;
            height: 28px;
            cursor: pointer;
        }
        .slider-track {
            position: absolute;
            top: 12px;
            left: 0; right: 0;
            height: 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
        }
        .slider-fill {
            position: absolute;
            top: 12px;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, rgba(42,85,179,0.5), rgba(0,191,99,0.5));
            border-radius: 2px;
            transition: width 0.15s;
        }
        .slider-handle {
            position: absolute;
            top: 6px;
            width: 16px; height: 16px;
            background: #fff;
            border-radius: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 8px rgba(255,255,255,0.3), 0 0 20px rgba(42,85,179,0.3);
            transition: box-shadow 0.2s;
            cursor: grab;
        }
        .slider-handle:hover, .slider-handle.dragging {
            box-shadow: 0 0 12px rgba(255,255,255,0.5), 0 0 30px rgba(42,85,179,0.5);
        }
        .slider-handle.dragging { cursor: grabbing; }

        /* Year labels */
        .year-labels {
            display: flex;
            justify-content: space-between;
            padding: 0 2px;
        }
        .year-label {
            font-size: 9px;
            color: rgba(255,255,255,0.25);
            cursor: pointer;
            transition: all 0.2s;
            padding: 1px 3px;
            border-radius: 4px;
            text-align: center;
            min-width: 28px;
        }
        .year-label:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.05); }
        .year-label.current { color: #fff; font-weight: 600; }
        .year-label.past { color: rgba(255,255,255,0.45); }

        /* Current year display */
        .current-year-display {
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            min-width: 36px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        /* ── Detail popup ── */
        .detail-popup {
            position: fixed;
            z-index: 200;
            background: rgba(10, 14, 26, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 14px;
            max-width: 280px;
            display: none;
            pointer-events: auto;
            transition: opacity 0.2s;
        }
        .detail-popup .pub-type {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }
        .detail-popup h3 {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 3px;
            line-height: 1.35;
        }
        .detail-popup .channel {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 6px;
        }
        .detail-popup .excerpt {
            font-family: 'Source Serif 4', serif;
            font-size: 11px;
            line-height: 1.5;
            color: rgba(255,255,255,0.6);
            margin-bottom: 8px;
        }
        .detail-popup .metrics {
            display: flex;
            gap: 12px;
            font-size: 10px;
            color: rgba(255,255,255,0.35);
        }
        .detail-popup .metrics strong { color: rgba(255,255,255,0.7); }

        /* ── Watermark ── */
        .watermark {
            position: fixed;
            bottom: 76px; left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            font-size: 8px;
            color: rgba(255,255,255,0.1);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <!-- Top bar: title + filters + stats -->
    <div class="top-bar">
        <div class="title">Constellation médiatique<span>2013 — 2026</span></div>
        <div class="filters">
            <button class="filter-btn active" data-axis="all">Tous</button>
            <button class="filter-btn" data-axis="techno">Techno</button>
            <button class="filter-btn" data-axis="enviro">Enviro</button>
            <button class="filter-btn" data-axis="socio">Socio</button>
            <div class="filter-sep"></div>
            <button class="channel-btn active" data-channel="all">Tous</button>
            <button class="channel-btn active" data-channel="linkedin">LinkedIn</button>
            <button class="channel-btn active" data-channel="instagram">Instagram</button>
            <button class="channel-btn active" data-channel="youtube">YouTube</button>
            <button class="channel-btn active" data-channel="presse">Presse</button>
            <button class="channel-btn active" data-channel="conference">Conférence</button>
        </div>
        <div class="stats">
            <div class="stat">
                <div class="number" id="stat-total">0</div>
                <div class="label">pubs</div>
            </div>
            <div class="stat">
                <div class="number" id="stat-reach">0</div>
                <div class="label">portée</div>
            </div>
            <div class="stat">
                <div class="number" id="stat-channels">0</div>
                <div class="label">canaux</div>
            </div>
        </div>
    </div>

    <!-- Bottom timeline area -->
    <div class="timeline-area">
        <div class="density-chart" id="density-chart"></div>
        <div class="transport">
            <button class="transport-btn" id="btn-prev" title="Année précédente">&#9664;</button>
            <button class="transport-btn" id="btn-play" title="Lecture automatique">&#9654;</button>
            <button class="transport-btn" id="btn-next" title="Année suivante">&#9654;</button>
            <div class="current-year-display" id="current-year-display">ALL</div>
            <div class="slider-container" id="slider-container">
                <div class="slider-track"></div>
                <div class="slider-fill" id="slider-fill"></div>
                <div class="slider-handle" id="slider-handle"></div>
            </div>
        </div>
        <div class="year-labels" id="year-labels"></div>
    </div>

    <!-- Detail popup -->
    <div class="detail-popup" id="detail-popup">
        <div class="pub-type" id="popup-type"></div>
        <h3 id="popup-title"></h3>
        <div class="channel" id="popup-channel"></div>
        <div class="excerpt" id="popup-excerpt"></div>
        <div class="metrics">
            <span><strong id="popup-reach">--</strong> portee</span>
            <span><strong id="popup-date">--</strong></span>
        </div>
    </div>

    <div class="watermark">COLOMBAN -- PROTO 4 -- MEDIA-VIZ</div>

    <script>
    // =============================================
    // COLORS & CHANNELS
    // =============================================
    const COLORS = {
        techno: '#2a55b3',
        enviro: '#00bf63',
        socio:  '#b32a55',
        technoLight: '#6b9fff',
        enviroLight: '#4dff99',
        socioLight:  '#ff6b99',
        technoGlow: 'rgba(42, 85, 179, 0.35)',
        enviroGlow: 'rgba(0, 191, 99, 0.25)',
        socioGlow:  'rgba(179, 42, 85, 0.35)'
    };

    const CHANNELS = {
        linkedin:   { label: 'LinkedIn', color: '#0077b5' },
        instagram:  { label: 'Instagram', color: '#e4405f' },
        youtube:    { label: 'YouTube', color: '#ff0000' },
        presse:     { label: 'Presse', color: '#d4a857' },
        conference: { label: 'Conference', color: '#9b59b6' }
    };

    const YEAR_MIN = 2013;
    const YEAR_MAX = 2026;
    const YEAR_COUNT = YEAR_MAX - YEAR_MIN + 1;

    // =============================================
    // DATA GENERATION
    // =============================================
    function generatePublications() {
        const pubs = [];

        // Fixed subject pool with real data
        const subjects = [
            // LinkedIn - techno
            { title: "L'IA dans le maritime : hype ou revolution ?", axis: 'techno', channel: 'linkedin', type: 'Analyse' },
            { title: 'Les cables sous-marins, arteres du monde digital', axis: 'techno', channel: 'linkedin', type: 'Carte' },
            { title: 'Data maritime : 600 navires analyses', axis: 'techno', channel: 'linkedin', type: 'Analyse' },
            { title: 'Logbooks electroniques : la fin du papier a bord', axis: 'techno', channel: 'linkedin', type: 'Analyse' },
            { title: 'Navires autonomes : fantasme ou realite 2030 ?', axis: 'techno', channel: 'linkedin', type: 'Analyse' },
            { title: 'IoT maritime : chaque capteur raconte une histoire', axis: 'techno', channel: 'linkedin', type: 'Education' },
            // LinkedIn - enviro
            { title: 'Decarbonation du shipping : ou en est-on ?', axis: 'enviro', channel: 'linkedin', type: 'Analyse' },
            { title: 'CII, EEXI, EU MRV : le marin face a la reglementation', axis: 'enviro', channel: 'linkedin', type: 'Education' },
            { title: 'EMR : les hydroliennes ont-elles un avenir ?', axis: 'enviro', channel: 'linkedin', type: 'Analyse' },
            { title: 'Limites planetaires : au-dela du climat', axis: 'enviro', channel: 'linkedin', type: 'Education' },
            { title: 'Propulsion velique : retour vers le futur', axis: 'enviro', channel: 'linkedin', type: 'Analyse' },
            { title: 'Scrubbers vs. LNG : faux debat ?', axis: 'enviro', channel: 'linkedin', type: 'Analyse' },
            // LinkedIn - socio
            { title: 'Archipel France : 11M de km2 oublies', axis: 'socio', channel: 'linkedin', type: 'Appel' },
            { title: 'Les grandes decouvertes : premieres startups', axis: 'socio', channel: 'linkedin', type: 'Inspiration' },
            { title: 'GASPE : le service public maritime en France', axis: 'socio', channel: 'linkedin', type: 'Education' },
            { title: 'Oceans : 3e employeur mondial ignore', axis: 'socio', channel: 'linkedin', type: 'Analyse' },
            { title: 'La mer nourrit, transporte, connecte : qui le sait ?', axis: 'socio', channel: 'linkedin', type: 'Appel' },
            // Instagram
            { title: 'Le maritime dans la culture francaise', axis: 'socio', channel: 'instagram', type: 'Inspiration' },
            { title: 'Petit Bateau, JPG et le marin', axis: 'socio', channel: 'instagram', type: 'Inspiration' },
            { title: 'NRL La Reunion : construire l\'impossible', axis: 'techno', channel: 'instagram', type: 'Inspiration' },
            { title: 'Infographie : 1 objet sur 2 a pris la mer', axis: 'socio', channel: 'instagram', type: 'Education' },
            { title: 'Biodiversite abyssale : l\'inconnu sous nos pieds', axis: 'enviro', channel: 'instagram', type: 'Inspiration' },
            // YouTube
            { title: 'Hissez Mots : "Amarrer"', axis: 'socio', channel: 'youtube', type: 'Video' },
            { title: 'Comment devenir officier de marine marchande', axis: 'socio', channel: 'youtube', type: 'Education' },
            { title: 'Visite du CMA CGM Jacques Saade', axis: 'techno', channel: 'youtube', type: 'Video' },
            { title: 'Hissez Mots : "Tribord"', axis: 'socio', channel: 'youtube', type: 'Video' },
            { title: '24h a bord d\'un porte-conteneurs', axis: 'socio', channel: 'youtube', type: 'Video' },
            // Presse
            { title: 'Marine & Oceans : transition techno du maritime', axis: 'techno', channel: 'presse', type: 'Article' },
            { title: 'Le Monde : la France et ses 11M km2 de mer', axis: 'socio', channel: 'presse', type: 'Article' },
            { title: 'TF1 : quotidien des marins marchands', axis: 'socio', channel: 'presse', type: 'Article' },
            { title: 'Mer & Marine : innovations digitales shipping', axis: 'techno', channel: 'presse', type: 'Article' },
            { title: 'La ZEE francaise, un empire invisible', axis: 'socio', channel: 'presse', type: 'Article' },
            { title: 'Conflits : geopolitique des mers', axis: 'socio', channel: 'presse', type: 'Article' },
            { title: 'Ouest-France : le renouveau de la marine a voile', axis: 'enviro', channel: 'presse', type: 'Article' },
            { title: 'Les Echos : economie bleue, secteur d\'avenir', axis: 'socio', channel: 'presse', type: 'Article' },
            // Conferences - REAL conference data
            { title: 'Euromaritime 2020 : modele eco des compagnies de service public', axis: 'socio', channel: 'conference', type: 'Conference' },
            { title: 'Euromaritime 2022 : digitalisation du shipping', axis: 'techno', channel: 'conference', type: 'Conference' },
            { title: 'Euromaritime 2024 : decarbonation et regulation', axis: 'enviro', channel: 'conference', type: 'Conference' },
            { title: 'Academie de Marine : potentiel strategique du maritime de proximite', axis: 'socio', channel: 'conference', type: 'Conference' },
            { title: 'Academie de Marine : ZEE et souverainete', axis: 'socio', channel: 'conference', type: 'Conference' },
            { title: 'Propeller Club Marseille : Introduction to digitalization', axis: 'techno', channel: 'conference', type: 'Conference' },
            { title: 'Propeller Club Le Havre : Introduction to decarbonation', axis: 'enviro', channel: 'conference', type: 'Conference' },
            { title: 'Race for Water : propulsion velique et decarbonation', axis: 'enviro', channel: 'conference', type: 'Conference' },
            { title: 'Digital Ship Athens : electronic logbooks', axis: 'techno', channel: 'conference', type: 'Conference' },
            { title: 'Digital Ship Hamburg : maritime AI applications', axis: 'techno', channel: 'conference', type: 'Conference' },
            { title: 'Universite de Rennes : decarbonation du maritime', axis: 'enviro', channel: 'conference', type: 'Conference' },
            { title: 'AG Federation Merite Maritime : avenir du maritime', axis: 'socio', channel: 'conference', type: 'Conference' },
            { title: 'Cyberdefense maritime : le prochain front', axis: 'techno', channel: 'conference', type: 'Conference' },
            { title: 'Le sauvetage en mer a l\'ere du digital', axis: 'techno', channel: 'conference', type: 'Conference' },
            { title: 'CMA CGM : innovation day keynote', axis: 'techno', channel: 'conference', type: 'Conference' },
            { title: 'Assises de l\'economie de la mer : panel decarbonation', axis: 'enviro', channel: 'conference', type: 'Conference' },
            { title: 'Sea Tech Week Brest : capteurs et IoT maritime', axis: 'techno', channel: 'conference', type: 'Conference' },
        ];

        // Use seeded pseudo-random for reproducibility
        let seed = 42;
        function rand() { seed = (seed * 16807 + 0) % 2147483647; return (seed - 1) / 2147483646; }

        for (let year = YEAR_MIN; year <= YEAR_MAX; year++) {
            let count;
            if (year <= 2015) count = Math.floor(rand() * 2) + 1;
            else if (year <= 2018) count = Math.floor(rand() * 4) + 2;
            else if (year <= 2020) count = Math.floor(rand() * 6) + 4;
            else if (year <= 2023) count = Math.floor(rand() * 10) + 7;
            else count = Math.floor(rand() * 14) + 10;

            for (let i = 0; i < count; i++) {
                const template = subjects[Math.floor(rand() * subjects.length)];
                const month = Math.floor(rand() * 12);
                const day = Math.floor(rand() * 28) + 1;
                const reach = year <= 2019
                    ? Math.floor(rand() * 5000) + 300
                    : Math.floor(rand() * 50000) + 2000;

                pubs.push({
                    id: pubs.length,
                    title: template.title,
                    axis: template.axis,
                    channel: template.channel,
                    type: template.type,
                    date: new Date(year, month, day),
                    year: year,
                    reach: reach,
                    excerpt: 'Analyse et reflexion sur les enjeux maritimes contemporains.'
                });
            }
        }

        return pubs.sort((a, b) => a.date - b.date);
    }

    const publications = generatePublications();

    // =============================================
    // CANVAS SETUP
    // =============================================
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
        W = window.innerWidth;
        H = window.innerHeight;
        const dpr = window.devicePixelRatio || 1;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();

    // =============================================
    // STATE
    // =============================================
    let activeAxis = 'all';
    let activeChannels = new Set(['linkedin', 'instagram', 'youtube', 'presse', 'conference']);
    let currentYear = YEAR_MAX; // slider position: YEAR_MIN..YEAR_MAX, or YEAR_MAX means "show all up to max"
    let isPlaying = false;
    let playTimer = null;
    let playSubIndex = 0; // for progressive appearance within a year
    let hoveredPub = null;
    let hoveredPubIdx = -1;
    let animatedPositions = [];
    let showAllYears = true; // when true, show all years
    const startTime = Date.now();
    const mousePos = { x: -9999, y: -9999 };

    // =============================================
    // LAYOUT
    // =============================================
    function layoutPublications() {
        const marginLeft = 30;
        const marginRight = 30;
        const marginTop = 52; // below top bar
        const marginBottom = 82; // above timeline area

        const usableW = W - marginLeft - marginRight;
        const usableH = H - marginTop - marginBottom;

        const timelineStart = new Date(YEAR_MIN, 0, 1).getTime();
        const timelineEnd = new Date(YEAR_MAX + 1, 0, 1).getTime();
        const timeRange = timelineEnd - timelineStart;

        // Use seeded random for consistent positions
        let seed = 7;
        function rand() { seed = (seed * 16807 + 0) % 2147483647; return (seed - 1) / 2147483646; }

        animatedPositions = publications.map((pub, i) => {
            const tNorm = (pub.date.getTime() - timelineStart) / timeRange;
            const x = marginLeft + tNorm * usableW;

            // Vertical band by axis
            let yBase;
            if (pub.axis === 'techno') yBase = marginTop + usableH * 0.18;
            else if (pub.axis === 'enviro') yBase = marginTop + usableH * 0.50;
            else yBase = marginTop + usableH * 0.82;

            const yJitter = (rand() - 0.5) * usableH * 0.22;
            const y = Math.max(marginTop + 10, Math.min(H - marginBottom - 10, yBase + yJitter));

            // Size: compact
            const size = Math.max(2.5, Math.min(8, Math.sqrt(pub.reach) / 40));

            return {
                pub, x, y,
                baseX: x, baseY: y,
                size,
                opacity: 0,
                targetOpacity: 1,
                appeared: false,
                appearTime: 0
            };
        });
    }

    layoutPublications();

    // =============================================
    // FILTER LOGIC
    // =============================================
    function isVisible(ap) {
        const axisMatch = activeAxis === 'all' || ap.pub.axis === activeAxis;
        const channelMatch = activeChannels.has(ap.pub.channel);
        let yearMatch;
        if (showAllYears) {
            yearMatch = true;
        } else {
            yearMatch = ap.pub.year <= currentYear;
        }
        return axisMatch && channelMatch && yearMatch;
    }

    function updateVisibility() {
        animatedPositions.forEach(ap => {
            ap.targetOpacity = isVisible(ap) ? 1 : 0.04;
        });
        updateStats();
    }

    function updateStats() {
        const visible = animatedPositions.filter(ap => ap.targetOpacity > 0.5);
        document.getElementById('stat-total').textContent = visible.length;
        const totalReach = visible.reduce((sum, ap) => sum + ap.pub.reach, 0);
        document.getElementById('stat-reach').textContent = totalReach > 1000000
            ? (totalReach / 1000000).toFixed(1) + 'M'
            : totalReach > 1000
                ? Math.floor(totalReach / 1000) + 'K'
                : totalReach;
        const channels = new Set(visible.map(ap => ap.pub.channel));
        document.getElementById('stat-channels').textContent = channels.size;
    }

    // =============================================
    // AXIS FILTER BUTTONS
    // =============================================
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeAxis = btn.dataset.axis;
            updateVisibility();
        });
    });

    // =============================================
    // CHANNEL FILTER BUTTONS (fixed for conference)
    // =============================================
    const ALL_CHANNELS = ['linkedin', 'instagram', 'youtube', 'presse', 'conference'];

    document.querySelectorAll('.channel-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const channel = btn.dataset.channel;
            if (channel === 'all') {
                const allActive = activeChannels.size === ALL_CHANNELS.length;
                if (allActive) {
                    activeChannels.clear();
                    document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
                } else {
                    activeChannels = new Set(ALL_CHANNELS);
                    document.querySelectorAll('.channel-btn').forEach(b => b.classList.add('active'));
                }
            } else {
                if (activeChannels.has(channel)) {
                    activeChannels.delete(channel);
                    btn.classList.remove('active');
                } else {
                    activeChannels.add(channel);
                    btn.classList.add('active');
                }
                // Sync "all" button
                const allBtn = document.querySelector('.channel-btn[data-channel="all"]');
                if (activeChannels.size === ALL_CHANNELS.length) {
                    allBtn.classList.add('active');
                } else {
                    allBtn.classList.remove('active');
                }
            }
            updateVisibility();
        });
    });

    // =============================================
    // DENSITY CHART
    // =============================================
    function buildDensityChart() {
        const chart = document.getElementById('density-chart');
        chart.innerHTML = '';
        // One bar per year
        const maxCount = Math.max(...Array.from({length: YEAR_COUNT}, (_, i) =>
            publications.filter(p => p.year === YEAR_MIN + i).length
        ));

        for (let y = YEAR_MIN; y <= YEAR_MAX; y++) {
            const count = publications.filter(p => p.year === y).length;
            const bar = document.createElement('div');
            bar.className = 'density-bar-item';
            const h = Math.max(2, (count / maxCount) * 18);
            bar.style.height = h + 'px';

            // Color by dominant axis this year
            const techCount = publications.filter(p => p.year === y && p.axis === 'techno').length;
            const envCount = publications.filter(p => p.year === y && p.axis === 'enviro').length;
            const socCount = publications.filter(p => p.year === y && p.axis === 'socio').length;
            const maxAxis = Math.max(techCount, envCount, socCount);
            let color;
            if (maxAxis === techCount) color = 'rgba(42,85,179,0.5)';
            else if (maxAxis === envCount) color = 'rgba(0,191,99,0.4)';
            else color = 'rgba(179,42,85,0.5)';

            const isActive = showAllYears || y <= currentYear;
            bar.style.background = isActive ? color : 'rgba(255,255,255,0.05)';
            bar.dataset.year = y;
            chart.appendChild(bar);
        }
    }
    buildDensityChart();

    function updateDensityHighlight() {
        document.querySelectorAll('.density-bar-item').forEach(bar => {
            const y = parseInt(bar.dataset.year);
            const isActive = showAllYears || y <= currentYear;
            if (isActive) {
                const techCount = publications.filter(p => p.year === y && p.axis === 'techno').length;
                const envCount = publications.filter(p => p.year === y && p.axis === 'enviro').length;
                const socCount = publications.filter(p => p.year === y && p.axis === 'socio').length;
                const maxAxis = Math.max(techCount, envCount, socCount);
                if (maxAxis === techCount) bar.style.background = 'rgba(42,85,179,0.5)';
                else if (maxAxis === envCount) bar.style.background = 'rgba(0,191,99,0.4)';
                else bar.style.background = 'rgba(179,42,85,0.5)';
            } else {
                bar.style.background = 'rgba(255,255,255,0.05)';
            }
        });
    }

    // =============================================
    // YEAR LABELS
    // =============================================
    function buildYearLabels() {
        const container = document.getElementById('year-labels');
        container.innerHTML = '';
        for (let y = YEAR_MIN; y <= YEAR_MAX; y++) {
            const lbl = document.createElement('div');
            lbl.className = 'year-label';
            lbl.textContent = y;
            lbl.dataset.year = y;
            lbl.addEventListener('click', () => {
                showAllYears = false;
                currentYear = y;
                updateSlider();
                updateVisibility();
                updateYearLabels();
                updateDensityHighlight();
                stopPlay();
            });
            container.appendChild(lbl);
        }
    }
    buildYearLabels();

    function updateYearLabels() {
        document.querySelectorAll('.year-label').forEach(lbl => {
            const y = parseInt(lbl.dataset.year);
            lbl.classList.remove('current', 'past');
            if (!showAllYears) {
                if (y === currentYear) lbl.classList.add('current');
                else if (y < currentYear) lbl.classList.add('past');
            }
        });
        const display = document.getElementById('current-year-display');
        display.textContent = showAllYears ? 'ALL' : currentYear;
    }
    updateYearLabels();

    // =============================================
    // SLIDER
    // =============================================
    const sliderContainer = document.getElementById('slider-container');
    const sliderFill = document.getElementById('slider-fill');
    const sliderHandle = document.getElementById('slider-handle');
    let isDraggingSlider = false;

    function yearToSliderPct(year) {
        return ((year - YEAR_MIN) / (YEAR_MAX - YEAR_MIN)) * 100;
    }

    function sliderPctToYear(pct) {
        return Math.round(YEAR_MIN + (pct / 100) * (YEAR_MAX - YEAR_MIN));
    }

    function updateSlider() {
        const pct = showAllYears ? 100 : yearToSliderPct(currentYear);
        sliderFill.style.width = pct + '%';
        sliderHandle.style.left = pct + '%';
    }
    updateSlider();

    function handleSliderInput(clientX) {
        const rect = sliderContainer.getBoundingClientRect();
        const pct = Math.max(0, Math.min(100, ((clientX - rect.left) / rect.width) * 100));
        const year = sliderPctToYear(pct);
        showAllYears = (year >= YEAR_MAX);
        currentYear = Math.min(year, YEAR_MAX);
        updateSlider();
        updateVisibility();
        updateYearLabels();
        updateDensityHighlight();
    }

    sliderContainer.addEventListener('mousedown', (e) => {
        isDraggingSlider = true;
        sliderHandle.classList.add('dragging');
        handleSliderInput(e.clientX);
        stopPlay();
    });
    document.addEventListener('mousemove', (e) => {
        if (isDraggingSlider) handleSliderInput(e.clientX);
    });
    document.addEventListener('mouseup', () => {
        if (isDraggingSlider) {
            isDraggingSlider = false;
            sliderHandle.classList.remove('dragging');
        }
    });

    // Touch support
    sliderContainer.addEventListener('touchstart', (e) => {
        isDraggingSlider = true;
        sliderHandle.classList.add('dragging');
        handleSliderInput(e.touches[0].clientX);
        stopPlay();
    }, { passive: true });
    document.addEventListener('touchmove', (e) => {
        if (isDraggingSlider) handleSliderInput(e.touches[0].clientX);
    }, { passive: true });
    document.addEventListener('touchend', () => {
        isDraggingSlider = false;
        sliderHandle.classList.remove('dragging');
    });

    // =============================================
    // TRANSPORT CONTROLS (play/pause, prev, next)
    // =============================================
    const btnPlay = document.getElementById('btn-play');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');

    // Style the next button (mirror the triangle)
    btnNext.style.transform = 'scaleX(1)';
    btnPrev.innerHTML = '\u25C0';
    btnPlay.innerHTML = '\u25B6';
    btnNext.innerHTML = '\u25B6';

    function stopPlay() {
        isPlaying = false;
        btnPlay.classList.remove('playing');
        btnPlay.innerHTML = '\u25B6';
        if (playTimer) { clearInterval(playTimer); playTimer = null; }
    }

    function startPlay() {
        isPlaying = true;
        btnPlay.classList.add('playing');
        btnPlay.innerHTML = '\u23F8'; // pause icon
        if (showAllYears) {
            currentYear = YEAR_MIN;
            showAllYears = false;
        }
        playSubIndex = 0;

        playTimer = setInterval(() => {
            // Progressive appearance: advance publication by publication within the year
            const yearPubs = animatedPositions.filter(ap => ap.pub.year === currentYear);
            if (playSubIndex < yearPubs.length) {
                // Show next publication in current year
                yearPubs[playSubIndex].targetOpacity = isVisible(yearPubs[playSubIndex]) ? 1 : 0.04;
                yearPubs[playSubIndex].appeared = true;
                yearPubs[playSubIndex].appearTime = Date.now();
                playSubIndex++;
            } else {
                // Move to next year
                if (currentYear < YEAR_MAX) {
                    currentYear++;
                    playSubIndex = 0;
                    updateVisibility();
                } else {
                    showAllYears = true;
                    updateVisibility();
                    stopPlay();
                }
            }
            updateSlider();
            updateYearLabels();
            updateDensityHighlight();
            updateStats();
        }, 180); // fast enough to feel animated
    }

    btnPlay.addEventListener('click', () => {
        if (isPlaying) stopPlay();
        else startPlay();
    });

    btnPrev.addEventListener('click', () => {
        stopPlay();
        if (showAllYears) {
            showAllYears = false;
            currentYear = YEAR_MAX;
        } else if (currentYear > YEAR_MIN) {
            currentYear--;
        }
        updateSlider();
        updateVisibility();
        updateYearLabels();
        updateDensityHighlight();
    });

    btnNext.addEventListener('click', () => {
        stopPlay();
        if (showAllYears) return;
        if (currentYear < YEAR_MAX) {
            currentYear++;
        } else {
            showAllYears = true;
        }
        updateSlider();
        updateVisibility();
        updateYearLabels();
        updateDensityHighlight();
    });

    // =============================================
    // MOUSE ON CANVAS
    // =============================================
    canvas.addEventListener('mousemove', (e) => {
        mousePos.x = e.clientX;
        mousePos.y = e.clientY;
    });

    canvas.addEventListener('mouseleave', () => {
        mousePos.x = -9999;
        mousePos.y = -9999;
    });

    canvas.addEventListener('click', () => {
        if (hoveredPub) {
            const popup = document.getElementById('detail-popup');
            popup.style.display = 'block';
            popup.style.left = Math.min(mousePos.x + 16, W - 300) + 'px';
            popup.style.top = Math.min(mousePos.y - 16, H - 180) + 'px';
            document.getElementById('popup-type').textContent = hoveredPub.type;
            document.getElementById('popup-type').style.color = COLORS[hoveredPub.axis];
            document.getElementById('popup-title').textContent = hoveredPub.title;
            document.getElementById('popup-channel').textContent = CHANNELS[hoveredPub.channel].label + ' \u00B7 ' + hoveredPub.date.toLocaleDateString('fr-FR');
            document.getElementById('popup-excerpt').textContent = hoveredPub.excerpt;
            document.getElementById('popup-reach').textContent = hoveredPub.reach.toLocaleString('fr-FR');
            document.getElementById('popup-date').textContent = hoveredPub.date.toLocaleDateString('fr-FR', { year: 'numeric', month: 'long' });
        } else {
            document.getElementById('detail-popup').style.display = 'none';
        }
    });

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.detail-popup') && !e.target.closest('#canvas')) {
            document.getElementById('detail-popup').style.display = 'none';
        }
    });

    // =============================================
    // RENDER
    // =============================================
    function render() {
        requestAnimationFrame(render);
        const time = (Date.now() - startTime) / 1000;

        ctx.fillStyle = '#0a0e1a';
        ctx.fillRect(0, 0, W, H);

        // Background gradient zones
        if (activeAxis === 'all') {
            const marginTop = 52;
            const usableH = H - marginTop - 82;
            const grad = ctx.createLinearGradient(0, marginTop, 0, marginTop + usableH);
            grad.addColorStop(0, 'rgba(42, 85, 179, 0.025)');
            grad.addColorStop(0.4, 'rgba(0, 191, 99, 0.015)');
            grad.addColorStop(0.8, 'rgba(179, 42, 85, 0.025)');
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.fillRect(0, marginTop, W, usableH);
        }

        hoveredPub = null;
        hoveredPubIdx = -1;

        // Find hovered
        for (let i = animatedPositions.length - 1; i >= 0; i--) {
            const ap = animatedPositions[i];
            if (ap.opacity < 0.3) continue;
            const dist = Math.hypot(mousePos.x - ap.x, mousePos.y - ap.y);
            if (dist < ap.size + 6) {
                hoveredPub = ap.pub;
                hoveredPubIdx = i;
                break;
            }
        }

        // Draw connections between nearby same-axis publications
        ctx.globalAlpha = 0.06;
        for (let i = 0; i < animatedPositions.length; i++) {
            const a = animatedPositions[i];
            if (a.opacity < 0.3) continue;
            for (let j = i + 1; j < Math.min(i + 6, animatedPositions.length); j++) {
                const b = animatedPositions[j];
                if (b.opacity < 0.3 || a.pub.axis !== b.pub.axis) continue;
                const dist = Math.hypot(a.x - b.x, a.y - b.y);
                if (dist < 60) {
                    ctx.strokeStyle = COLORS[a.pub.axis];
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(a.x, a.y);
                    ctx.lineTo(b.x, b.y);
                    ctx.stroke();
                }
            }
        }
        ctx.globalAlpha = 1;

        // Highlight connections for hovered pub
        if (hoveredPubIdx >= 0) {
            const hp = animatedPositions[hoveredPubIdx];
            ctx.globalAlpha = 0.2;
            animatedPositions.forEach((ap, i) => {
                if (i === hoveredPubIdx || ap.opacity < 0.3) return;
                if (ap.pub.axis !== hp.pub.axis) return;
                const dist = Math.hypot(hp.x - ap.x, hp.y - ap.y);
                if (dist < 120) {
                    ctx.strokeStyle = COLORS[hp.pub.axis + 'Light'] || COLORS[hp.pub.axis];
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(hp.x, hp.y);
                    ctx.lineTo(ap.x, ap.y);
                    ctx.stroke();
                    // Brighten nearby dot
                    ap._highlight = true;
                }
            });
            ctx.globalAlpha = 1;
        }

        // Draw publications
        animatedPositions.forEach((ap, i) => {
            // Smooth opacity
            ap.opacity += (ap.targetOpacity - ap.opacity) * 0.1;
            if (ap.opacity < 0.02) { ap._highlight = false; return; }

            const color = COLORS[ap.pub.axis];
            const lightColor = COLORS[ap.pub.axis + 'Light'];
            const glowColor = COLORS[ap.pub.axis + 'Glow'];
            const breathe = Math.sin(time * 0.6 + i * 0.4) * 0.15;

            const isHovered = (i === hoveredPubIdx);
            const isHighlighted = ap._highlight;
            ap._highlight = false;

            const scaleFactor = isHovered ? 1.8 : isHighlighted ? 1.3 : 1;
            const displaySize = ap.size * (1 + breathe * 0.1) * scaleFactor;

            // Appear animation (during play)
            let extraAlpha = 1;
            if (ap.appearTime > 0) {
                const elapsed = (Date.now() - ap.appearTime) / 1000;
                if (elapsed < 0.5) extraAlpha = elapsed / 0.5;
            }

            ctx.globalAlpha = ap.opacity * extraAlpha;

            // Glow for large or hovered
            if (ap.size > 4 || isHovered || isHighlighted) {
                const glowSize = displaySize * (isHovered ? 4 : 2.5);
                const glow = ctx.createRadialGradient(ap.x, ap.y, 0, ap.x, ap.y, glowSize);
                glow.addColorStop(0, glowColor);
                glow.addColorStop(1, 'transparent');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(ap.x, ap.y, glowSize, 0, Math.PI * 2);
                ctx.fill();
            }

            // Dot
            ctx.fillStyle = (isHovered || isHighlighted) ? lightColor : color;
            ctx.beginPath();
            ctx.arc(ap.x, ap.y, displaySize, 0, Math.PI * 2);
            ctx.fill();

            // Label on hover
            if (isHovered && ap.opacity > 0.5) {
                ctx.globalAlpha = 1;
                ctx.fillStyle = '#ffffff';
                ctx.font = '600 10px Poppins';
                ctx.textAlign = 'center';
                const labelText = ap.pub.title.length > 45 ? ap.pub.title.substring(0, 45) + '...' : ap.pub.title;
                ctx.fillText(labelText, ap.x, ap.y - displaySize - 10);

                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.font = '9px Poppins';
                ctx.fillText(CHANNELS[ap.pub.channel].label + ' \u00B7 ' + ap.pub.year, ap.x, ap.y - displaySize - 1);

                canvas.style.cursor = 'pointer';
            }

            ctx.globalAlpha = 1;
        });

        if (!hoveredPub) canvas.style.cursor = 'default';

        // Axis labels (compact, rotated feel)
        const marginTop = 52;
        const usableH = H - marginTop - 82;
        ctx.globalAlpha = 0.2;
        ctx.font = '600 9px Poppins';
        ctx.textAlign = 'left';
        ctx.fillStyle = COLORS.technoLight;
        ctx.fillText('TECHNO', 6, marginTop + usableH * 0.18 + 3);
        ctx.fillStyle = COLORS.enviroLight;
        ctx.fillText('ENVIRO', 6, marginTop + usableH * 0.50 + 3);
        ctx.fillStyle = COLORS.socioLight;
        ctx.fillText('SOCIO', 6, marginTop + usableH * 0.82 + 3);
        ctx.globalAlpha = 1;
    }

    // =============================================
    // INIT
    // =============================================
    // Set initial state: show all
    showAllYears = true;
    currentYear = YEAR_MAX;
    animatedPositions.forEach(ap => {
        ap.targetOpacity = 1;
        ap.opacity = 0; // start invisible for fade-in
    });
    updateSlider();
    updateYearLabels();
    updateStats();

    render();

    window.addEventListener('resize', () => {
        resize();
        layoutPublications();
        buildDensityChart();
        buildYearLabels();
        updateSlider();
        updateYearLabels();
        updateVisibility();
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Space') {
            e.preventDefault();
            if (isPlaying) stopPlay(); else startPlay();
        } else if (e.key === 'ArrowLeft') {
            btnPrev.click();
        } else if (e.key === 'ArrowRight') {
            btnNext.click();
        } else if (e.key === 'Escape') {
            showAllYears = true;
            currentYear = YEAR_MAX;
            stopPlay();
            updateSlider();
            updateVisibility();
            updateYearLabels();
            updateDensityHighlight();
        }
    });
    </script>
</body>
</html>
