        /* ── Top bar: compact, single row ── */

            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: rgba(13,17,23,0.88);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.06);

        .top-bar .title {
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
            letter-spacing: -0.3px;
        }
        .top-bar .title span {
            font-family: 'Source Serif 4', serif;
            font-size: 11px;
            font-style: italic;

            height: 16px;
            background: rgba(255,255,255,0.12);
            margin: 0 4px;
        }
        .filter-btn {

            color: rgba(255,255,255,0.4);
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 10px;
            font-weight: 600;
            transition: all 0.25s;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            white-space: nowrap;
        }

        .filter-btn[data-axis="socio"].active { background: rgba(179,42,85,0.25); border-color: #b32a55; color: #ff6b99; }

            padding: 3px 8px;
            border: 1px solid rgba(255,255,255,0.06);
            background: transparent;
            color: rgba(255,255,255,0.3);
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 9px;
            font-weight: 500;
            transition: all 0.25s;
            white-space: nowrap;

            display: flex;
            gap: 14px;
            align-items: center;
            white-space: nowrap;
        }
        .stat {
            display: flex;
            align-items: baseline;
            gap: 4px;

            font-weight: 700;
            color: #fff;

        }
        .stat .label {

            color: rgba(255,255,255,0.85);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        /* ── Bottom scroll indicator ── */

            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(13,17,23,0.9);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255,255,255,0.06);

            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            margin-bottom: 4px;
            overflow: hidden;

        .scroll-progress-fill {
            height: 100%;

            width: 0%;

            position: fixed;
            bottom: 58px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 101;
            font-size: 9px;
            color: rgba(255,255,255,0.45);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            pointer-events: none;
            animation: fadeHint 4s ease-out forwards;

            0%, 60% { opacity: 1; }
            100% { opacity: 0; }

            position: fixed;
            z-index: 200;
            background: rgba(13, 17, 23, 0.95);

        .detail-popup .pub-tier {

        .watermark {

            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            font-size: 7px;
            color: rgba(255,255,255,0.04);
            letter-spacing: 3px;
            text-transform: uppercase;
            pointer-events: none;

    const publications = generatePublications();

    // =============================================
    // SCALE REACH TO HIT CUMULATIVE TARGETS
    // =============================================
    // Targets: cumulative reach = 2,700,000 by end 2024, 3,600,000 by end 2025
    // Extrapolate 2023 and 2026 proportionally.
    (function scaleReachValues() {
        // Group pubs by year-end buckets
        const pubsThrough2024 = publications.filter(p => p.year <= 2024);
        const pubsIn2025 = publications.filter(p => p.year === 2025);
        const pubsIn2026 = publications.filter(p => p.year === 2026);

        // Raw sums
        const rawThrough2024 = pubsThrough2024.reduce((s, p) => s + p.reach, 0);
        const rawIn2025 = pubsIn2025.reduce((s, p) => s + p.reach, 0);

        // Scale all pubs through 2024 so their cumulative = 2,700,000
        const scale2024 = 2700000 / rawThrough2024;
        pubsThrough2024.forEach(p => { p.reach = Math.round(p.reach * scale2024); });

        // Scale 2025 pubs so cumulative through 2025 = 3,600,000
        // Need 2025 to add 900,000
        const target2025Delta = 3600000 - 2700000; // 900,000
        const scale2025 = target2025Delta / rawIn2025;
        pubsIn2025.forEach(p => { p.reach = Math.round(p.reach * scale2025); });

        // Extrapolate 2026: growth from 2024->2025 was 900K over 2.7M ≈ 33%
        // Apply same 33% growth for 2026 delta ≈ 1,200,000
        const target2026Delta = 1200000;
        const rawIn2026 = pubsIn2026.reduce((s, p) => s + p.reach, 0);
        if (rawIn2026 > 0) {
            const scale2026 = target2026Delta / rawIn2026;
            pubsIn2026.forEach(p => { p.reach = Math.round(p.reach * scale2026); });
        }

        // For 2023: proportionally handled by uniform scaling of through-2024 pubs.
        // Already correct since we scaled all pubs through 2024 uniformly.
    })();

    // =============================================

        canvas.width = W * dpr;
        canvas.height = H * dpr;

    // =============================================
    // STATE
    // =============================================
    let activeAxis = 'all';
    let activeChannels = new Set(['linkedin', 'instagram', 'youtube', 'presse', 'conference']);
    let scrollProgress = 0; // 0..1 based on scroll position
    let currentYear = YEAR_MIN;
    let hoveredPub = null;

    // =============================================
    // LAYOUT - Single merged lane
    // =============================================
    // All axes share a single vertical space.
    // X = time (years), Y = random jitter across full usable height
    // Color coding distinguishes axes.

    function layoutPublications() {
        const marginLeft = 60;
        const marginRight = 30;
        const marginTop = 58; // below top bar
        const marginBottom = 50; // above scroll indicator

        const usableW = W - marginLeft - marginRight;
        const usableH = H - marginTop - marginBottom;

        const timelineStart = new Date(YEAR_MIN, 0, 1).getTime();
        const timelineEnd = new Date(YEAR_MAX + 1, 0, 1).getTime();
        const timeRange = timelineEnd - timelineStart;

        // Seeded random for consistent positions
        let seed = 7;
        function rand() { seed = (seed * 16807 + 0) % 2147483647; return (seed - 1) / 2147483646; }

        animatedPositions = publications.map((pub, i) => {
            const tNorm = (pub.date.getTime() - timelineStart) / timeRange;
            const x = marginLeft + tNorm * usableW;

            // Y across full usable height with jitter
            const yCenter = marginTop + usableH * 0.5;
            const jitterRange = usableH * 0.42;
            const yJitter = (rand() - 0.5) * 2 * jitterRange;
            const y = yCenter + yJitter;

            // Size depends on tier:
            // media (presse) = large, prominent
            // conference = medium
            // social (linkedin, instagram, youtube) = small, subtle
            let size;
            if (pub.tier === 'media') {
                size = Math.max(6, Math.min(12, Math.sqrt(pub.reach) / 25));
            } else if (pub.tier === 'conference') {
                size = Math.max(3.5, Math.min(7, Math.sqrt(pub.reach) / 40));
            } else {
                size = Math.max(2, Math.min(4.5, Math.sqrt(pub.reach) / 55));
            }

            return {
                pub, x, y,
                baseX: x, baseY: y,
                size,
                opacity: 0,
                targetOpacity: 0,
                appeared: false,
                appearTime: 0
            };
        });
    }

    // =============================================
    // SCROLL-DRIVEN TIMELINE
    // =============================================
    function getScrollProgress() {
        const scrollTop = window.scrollY || document.documentElement.scrollTop;
        const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
        return Math.max(0, Math.min(1, scrollTop / maxScroll));
    }

    function progressToYear(progress) {
        // Map 0..1 to YEAR_MIN..YEAR_MAX (with fractional part for smooth transitions)
        return YEAR_MIN + progress * (YEAR_MAX - YEAR_MIN);
    }

    function onScroll() {
        scrollProgress = getScrollProgress();
        const yearFloat = progressToYear(scrollProgress);
        currentYear = Math.floor(yearFloat);
        // Publications appear progressively: a pub appears when scroll reaches its year+month fraction
        updateVisibility(yearFloat);
        updateScrollUI();
    }

    window.addEventListener('scroll', onScroll, { passive: true });

    function updateScrollUI() {
        // Progress bar
        document.getElementById('scroll-progress-fill').style.width = (scrollProgress * 100) + '%';

        // Year labels highlight
        document.querySelectorAll('.year-label').forEach(lbl => {
            const y = parseInt(lbl.dataset.year);
            lbl.classList.remove('current', 'past');
            if (y === currentYear) lbl.classList.add('current');
            else if (y < currentYear) lbl.classList.add('past');
        });
    }

    // =============================================
    // FILTER LOGIC
    // =============================================
    function isVisible(ap, yearFloat) {
        const axisMatch = activeAxis === 'all' || ap.pub.axis === activeAxis;
        const channelMatch = activeChannels.has(ap.pub.channel);
        // Progressive reveal: use date fractional position
        const pubTimeNorm = (ap.pub.date.getTime() - new Date(YEAR_MIN, 0, 1).getTime()) /
                            (new Date(YEAR_MAX + 1, 0, 1).getTime() - new Date(YEAR_MIN, 0, 1).getTime());
        const yearMatch = scrollProgress >= pubTimeNorm - 0.002; // slight lead for smoothness
        return axisMatch && channelMatch && yearMatch;
    }

    function updateVisibility(yearFloat) {
        if (yearFloat === undefined) yearFloat = progressToYear(scrollProgress);
        animatedPositions.forEach(ap => {
            const vis = isVisible(ap, yearFloat);
            ap.targetOpacity = vis ? 1 : 0.03;
            if (vis && !ap.appeared) {
                ap.appeared = true;
                ap.appearTime = Date.now();
            }
        });
        updateStats();
    }

    function updateStats() {
        const visible = animatedPositions.filter(ap => ap.targetOpacity > 0.5);
        document.getElementById('stat-total').textContent = visible.length;

        const mediaCount = visible.filter(ap => ap.pub.tier === 'media').length;
        document.getElementById('stat-media').textContent = mediaCount;

                } else {
                    activeChannels = new Set(ALL_CHANNELS);
                    document.querySelectorAll('.channel-btn').forEach(b => b.classList.add('active'));

            } else {
                if (activeChannels.has(channel)) {

                    btn.classList.remove('active');

    // =============================================
    // RENDER
    // =============================================
    function render() {
        requestAnimationFrame(render);
        const time = (Date.now() - startTime) / 1000;

        ctx.fillStyle = '#0d1117';
        ctx.fillRect(0, 0, W, H);

        const marginTop = 58;
        const marginBottom = 50;
        const marginLeft = 60;
        const marginRight = 30;
        const usableH = H - marginTop - marginBottom;
        const usableW = W - marginLeft - marginRight;

        // Draw year grid lines
        const timelineStart = new Date(YEAR_MIN, 0, 1).getTime();
        const timelineEnd = new Date(YEAR_MAX + 1, 0, 1).getTime();
        const timeRange = timelineEnd - timelineStart;
        ctx.globalAlpha = 0.1;
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 0.5;
        for (let y = YEAR_MIN; y <= YEAR_MAX; y++) {
            const tNorm = (new Date(y, 0, 1).getTime() - timelineStart) / timeRange;
            const x = marginLeft + tNorm * usableW;
            ctx.beginPath();
            ctx.moveTo(x, marginTop);
            ctx.lineTo(x, marginTop + usableH);
            ctx.stroke();
        }
        ctx.globalAlpha = 1;

        // Draw scroll position indicator (vertical line showing current time)
        const scrollX = marginLeft + scrollProgress * usableW;
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(scrollX, marginTop);
        ctx.lineTo(scrollX, marginTop + usableH);
        ctx.stroke();
        ctx.setLineDash([]);

        // Hovered pub detection
        hoveredPub = null;
        hoveredPubIdx = -1;

        for (let i = animatedPositions.length - 1; i >= 0; i--) {
            const ap = animatedPositions[i];
            if (ap.opacity < 0.3) continue;
            const dist = Math.hypot(mousePos.x - ap.x, mousePos.y - ap.y);
            const hitRadius = ap.size + (ap.pub.tier === 'media' ? 8 : 5);
            if (dist < hitRadius) {
                hoveredPub = ap.pub;
                hoveredPubIdx = i;
                break;
            }
        }

        // Draw connections between nearby same-axis publications
        ctx.globalAlpha = 0.05;
        for (let i = 0; i < animatedPositions.length; i++) {
            const a = animatedPositions[i];
            if (a.opacity < 0.3) continue;
            for (let j = i + 1; j < Math.min(i + 8, animatedPositions.length); j++) {
                const b = animatedPositions[j];
                if (b.opacity < 0.3 || a.pub.axis !== b.pub.axis) continue;
                const dist = Math.hypot(a.x - b.x, a.y - b.y);
                if (dist < 50) {
                    ctx.strokeStyle = COLORS[a.pub.axis];
                    ctx.lineWidth = 0.4;
                    ctx.beginPath();
                    ctx.moveTo(a.x, a.y);
                    ctx.lineTo(b.x, b.y);
                    ctx.stroke();
                }
            }
        }
        ctx.globalAlpha = 1;

        // Highlight connections for hovered pub
        if (hoveredPubIdx >= 0) {
            const hp = animatedPositions[hoveredPubIdx];
            ctx.globalAlpha = 0.2;
            animatedPositions.forEach((ap, i) => {
                if (i === hoveredPubIdx || ap.opacity < 0.3) return;
                if (ap.pub.axis !== hp.pub.axis) return;
                const dist = Math.hypot(hp.x - ap.x, hp.y - ap.y);
                if (dist < 120) {
                    ctx.strokeStyle = COLORS[hp.pub.axis + 'Light'] || COLORS[hp.pub.axis];
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(hp.x, hp.y);
                    ctx.lineTo(ap.x, ap.y);
                    ctx.stroke();
                    ap._highlight = true;
                }
            });
            ctx.globalAlpha = 1;
        }

        // Draw publications
        animatedPositions.forEach((ap, i) => {
            // Smooth opacity transition
            ap.opacity += (ap.targetOpacity - ap.opacity) * 0.12;
            if (ap.opacity < 0.02) { ap._highlight = false; return; }

            const color = COLORS[ap.pub.axis];
            const lightColor = COLORS[ap.pub.axis + 'Light'];

            const isHovered = (i === hoveredPubIdx);
            const isHighlighted = ap._highlight;
            ap._highlight = false;

            const isMedia = ap.pub.tier === 'media';
            const isConf = ap.pub.tier === 'conference';

            const scaleFactor = isHovered ? 1.4 : isHighlighted ? 1.15 : 1;
            const displaySize = ap.size * scaleFactor;

            // Appear animation
            let extraAlpha = 1;
            if (ap.appearTime > 0) {
                const elapsed = (Date.now() - ap.appearTime) / 1000;
                if (elapsed < 0.6) extraAlpha = elapsed / 0.6;
            }

            ctx.globalAlpha = ap.opacity * extraAlpha;

            if (isMedia) {
                // Press/media: medium circle, solid fill, thin white border
                const r = displaySize * 1.2;
                ctx.fillStyle = isHovered ? lightColor : color;
                ctx.beginPath();
                ctx.arc(ap.x, ap.y, r, 0, Math.PI * 2);
                ctx.fill();
                // White border ring
                ctx.strokeStyle = isHovered ? '#ffffff' : 'rgba(255,255,255,0.6)';
                ctx.lineWidth = 1;
                ctx.stroke();

            } else if (isConf) {
                // Conference: smaller circle, solid fill, no border
                const r = displaySize * 0.9;
                ctx.fillStyle = isHovered ? lightColor : color;
                ctx.beginPath();
                ctx.arc(ap.x, ap.y, r, 0, Math.PI * 2);
                ctx.fill();

            } else {
                // Social: tiny dot, muted color at 50% opacity
                const r = Math.max(1.5, displaySize * 0.55);
                ctx.fillStyle = isHovered ? lightColor : color;
                ctx.globalAlpha = ap.opacity * extraAlpha * (isHovered ? 0.9 : 0.5);
                ctx.beginPath();
                ctx.arc(ap.x, ap.y, r, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = ap.opacity * extraAlpha;
            }

            // Label on hover
            if (isHovered && ap.opacity > 0.5) {
                ctx.globalAlpha = 1;
                ctx.fillStyle = '#ffffff';
                ctx.font = '600 10px Poppins';
                ctx.textAlign = 'center';
                const labelText = ap.pub.title.length > 45 ? ap.pub.title.substring(0, 45) + '...' : ap.pub.title;
                ctx.fillText(labelText, ap.x, ap.y - displaySize - 14);

                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.font = '9px Poppins';
                const tierLabel = isMedia ? ' PRESSE' : isConf ? ' CONF' : '';
                ctx.fillText(CHANNELS[ap.pub.channel].label + ' \u00B7 ' + ap.pub.year + tierLabel, ap.x, ap.y - displaySize - 4);

                canvas.style.cursor = 'pointer';
            }

            ctx.globalAlpha = 1;
        });

        if (!hoveredPub) canvas.style.cursor = 'default';

        // Year labels on canvas (bottom of each year column)
        ctx.font = '500 9px Poppins';
        ctx.textAlign = 'center';
        for (let y = YEAR_MIN; y <= YEAR_MAX; y++) {
            const tNorm = (new Date(y, 6, 1).getTime() - timelineStart) / timeRange; // mid-year
            const x = marginLeft + tNorm * usableW;
            if (y === currentYear) {
                ctx.globalAlpha = 0.95;
                ctx.fillStyle = '#ffffff';
                ctx.font = '700 10px Poppins';
            } else if (y < currentYear) {
                ctx.globalAlpha = 0.85;
                ctx.fillStyle = '#ffffff';
                ctx.font = '500 9px Poppins';
            } else {
                ctx.globalAlpha = 0.5;
                ctx.fillStyle = '#ffffff';
                ctx.font = '500 9px Poppins';
            }
            ctx.fillText(y, x, marginTop + usableH + 14);
        }
        ctx.globalAlpha = 1;
    }

    // =============================================
    // INIT
    // =============================================
    animatedPositions.forEach(ap => {
        ap.targetOpacity = 0;
        ap.opacity = 0;
    });
    updateStats();
    onScroll(); // set initial state from scroll position

    render();

    window.addEventListener('resize', () => {
        resize();
        layoutPublications();
        buildYearLabels();
        updateVisibility();
        updateScrollUI();
    });

    // Keyboard shortcut: Escape to close popup
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            document.getElementById('detail-popup').style.display = 'none';
        }
    });
    </script>
</body>
</html>
