<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proto 4 — Média-viz Constellation · Colomban</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e1a;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #canvas { position: fixed; top: 0; left: 0; z-index: 1; }

        /* Title */
        .title-area {
            position: fixed;
            top: 30px; left: 40px;
            z-index: 50;
        }
        .title-area h1 {
            font-size: clamp(18px, 2.5vw, 28px);
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
        }
        .title-area .subtitle {
            font-family: 'Source Serif 4', serif;
            font-size: 13px;
            font-style: italic;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
        }

        /* Axis filter */
        .axis-filter {
            position: fixed;
            top: 30px; right: 40px;
            z-index: 100;
            display: flex;
            gap: 8px;
        }
        .filter-btn {
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.6);
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .filter-btn.active { color: #fff; }
        .filter-btn[data-axis="all"].active { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); }
        .filter-btn[data-axis="techno"].active { background: rgba(42,85,179,0.3); border-color: #2a55b3; color: #6b9fff; }
        .filter-btn[data-axis="enviro"].active { background: rgba(0,191,99,0.2); border-color: #00bf63; color: #4dff99; }
        .filter-btn[data-axis="socio"].active { background: rgba(179,42,85,0.3); border-color: #b32a55; color: #ff6b99; }

        /* Channel filter */
        .channel-filter {
            position: fixed;
            top: 70px; right: 40px;
            z-index: 100;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            max-width: 350px;
            justify-content: flex-end;
        }
        .channel-btn {
            padding: 4px 10px;
            border: 1px solid rgba(255,255,255,0.08);
            background: transparent;
            color: rgba(255,255,255,0.35);
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 10px;
            transition: all 0.3s;
        }
        .channel-btn.active { color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.08); }

        /* Timeline axis */
        .timeline-axis {
            position: fixed;
            bottom: 50px;
            left: 40px;
            right: 40px;
            height: 40px;
            z-index: 50;
        }

        /* Stats bar */
        .stats-bar {
            position: fixed;
            bottom: 110px;
            left: 40px;
            z-index: 50;
            display: flex;
            gap: 30px;
        }
        .stat {
            text-align: center;
        }
        .stat .number {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }
        .stat .label {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Detail popup */
        .detail-popup {
            position: fixed;
            z-index: 200;
            background: rgba(10, 14, 26, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            padding: 20px;
            max-width: 340px;
            display: none;
            pointer-events: auto;
        }
        .detail-popup .pub-type {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
        }
        .detail-popup h3 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.4;
        }
        .detail-popup .channel {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 8px;
        }
        .detail-popup .excerpt {
            font-family: 'Source Serif 4', serif;
            font-size: 13px;
            line-height: 1.6;
            color: rgba(255,255,255,0.7);
            margin-bottom: 12px;
        }
        .detail-popup .metrics {
            display: flex;
            gap: 16px;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
        }
        .detail-popup .metrics strong { color: rgba(255,255,255,0.8); }

        /* Density bar */
        .density-bar {
            position: fixed;
            bottom: 90px;
            left: 40px;
            right: 40px;
            height: 4px;
            z-index: 50;
            display: flex;
            gap: 1px;
        }
        .density-segment {
            flex: 1;
            border-radius: 2px;
            transition: background 0.3s;
        }

        /* Watermark */
        .watermark {
            position: fixed;
            bottom: 15px; left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            font-size: 9px;
            color: rgba(255,255,255,0.15);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="title-area">
        <h1>Constellation médiatique</h1>
        <div class="subtitle">Prises de parole 2013 → 2026</div>
    </div>

    <div class="axis-filter">
        <button class="filter-btn active" data-axis="all">Tous</button>
        <button class="filter-btn" data-axis="techno">Techno</button>
        <button class="filter-btn" data-axis="enviro">Enviro</button>
        <button class="filter-btn" data-axis="socio">Socio</button>
    </div>

    <div class="channel-filter">
        <button class="channel-btn active" data-channel="all">Tous</button>
        <button class="channel-btn active" data-channel="linkedin">LinkedIn</button>
        <button class="channel-btn active" data-channel="instagram">Instagram</button>
        <button class="channel-btn active" data-channel="youtube">YouTube</button>
        <button class="channel-btn active" data-channel="presse">Presse</button>
        <button class="channel-btn active" data-channel="conference">Conférence</button>
    </div>

    <div class="stats-bar">
        <div class="stat">
            <div class="number" id="stat-total">0</div>
            <div class="label">Publications</div>
        </div>
        <div class="stat">
            <div class="number" id="stat-reach">0</div>
            <div class="label">Portée estimée</div>
        </div>
        <div class="stat">
            <div class="number" id="stat-channels">0</div>
            <div class="label">Canaux</div>
        </div>
    </div>

    <div class="density-bar" id="density-bar"></div>

    <canvas id="timeline-canvas" class="timeline-axis"></canvas>

    <div class="detail-popup" id="detail-popup">
        <div class="pub-type" id="popup-type"></div>
        <h3 id="popup-title"></h3>
        <div class="channel" id="popup-channel"></div>
        <div class="excerpt" id="popup-excerpt"></div>
        <div class="metrics">
            <span><strong id="popup-reach">—</strong> portée</span>
            <span><strong id="popup-date">—</strong></span>
        </div>
    </div>

    <div class="watermark">COLOMBAN — PROTO 4 — MÉDIA-VIZ</div>

    <script>
    // ═══════════════════════════════════════════
    // DATA — Sample publications
    // ═══════════════════════════════════════════
    const COLORS = {
        techno: '#2a55b3',
        enviro: '#00bf63',
        socio:  '#b32a55',
        technoGlow: 'rgba(42, 85, 179, 0.4)',
        enviroGlow: 'rgba(0, 191, 99, 0.3)',
        socioGlow:  'rgba(179, 42, 85, 0.4)'
    };

    const CHANNELS = {
        linkedin:   { label: 'LinkedIn', icon: 'in', color: '#0077b5' },
        instagram:  { label: 'Instagram', icon: 'ig', color: '#e4405f' },
        youtube:    { label: 'YouTube', icon: 'yt', color: '#ff0000' },
        presse:     { label: 'Presse', icon: 'pr', color: '#d4a857' },
        conference: { label: 'Conférence', icon: 'cf', color: '#9b59b6' }
    };

    // Simulated publications (in production: pulled from Notion)
    function generatePublications() {
        const pubs = [];
        const types = ['Analyse', 'Réaction', 'Appel à l\'action', 'Inspiration', 'Éducation', 'Vidéo', 'Carte', 'Article'];
        const subjects = [
            { title: 'Décarbonation du shipping : où en est-on vraiment ?', axis: 'enviro', channel: 'linkedin', type: 'Analyse' },
            { title: 'L\'IA dans le maritime : hype ou révolution ?', axis: 'techno', channel: 'linkedin', type: 'Analyse' },
            { title: 'Archipel France : 11 millions de km² oubliés', axis: 'socio', channel: 'linkedin', type: 'Appel à l\'action' },
            { title: 'CII, EEXI, EU MRV : le marin face à la réglementation', axis: 'enviro', channel: 'linkedin', type: 'Éducation' },
            { title: 'Les câbles sous-marins, artères du monde digital', axis: 'techno', channel: 'linkedin', type: 'Carte' },
            { title: 'Hissez Mots : "Amarrer"', axis: 'socio', channel: 'youtube', type: 'Vidéo' },
            { title: 'Le maritime dans la culture française', axis: 'socio', channel: 'instagram', type: 'Inspiration' },
            { title: 'Comment devenir officier de marine marchande', axis: 'socio', channel: 'youtube', type: 'Éducation' },
            { title: 'La ZEE française, un empire invisible', axis: 'socio', channel: 'presse', type: 'Article' },
            { title: 'Cyberdéfense maritime : le prochain front', axis: 'techno', channel: 'conference', type: 'Analyse' },
            { title: 'EMR : les hydroliennes ont-elles un avenir ?', axis: 'enviro', channel: 'linkedin', type: 'Analyse' },
            { title: 'Marine & Océans : La transition technologique du maritime', axis: 'techno', channel: 'presse', type: 'Article' },
            { title: 'Conflits : Géopolitique des mers', axis: 'socio', channel: 'presse', type: 'Article' },
            { title: 'Le sauvetage en mer à l\'ère du digital', axis: 'techno', channel: 'conference', type: 'Analyse' },
            { title: 'Petit Bateau, JPG et le marin : la mer dans notre culture', axis: 'socio', channel: 'instagram', type: 'Inspiration' },
            { title: 'Limites planétaires : au-delà du climat', axis: 'enviro', channel: 'linkedin', type: 'Éducation' },
            { title: 'Les grandes découvertes : premières startups', axis: 'socio', channel: 'linkedin', type: 'Inspiration' },
            { title: 'Data maritime : 600 navires analysés, une catastrophe révélée', axis: 'techno', channel: 'linkedin', type: 'Analyse' },
            { title: 'GASPE : le service public maritime en France', axis: 'socio', channel: 'linkedin', type: 'Éducation' },
            { title: 'NRL La Réunion : quand le maritime construit l\'impossible', axis: 'techno', channel: 'instagram', type: 'Inspiration' }
        ];

        // Generate ~120 publications across 2013-2026
        // Density increases over time (acceleration)
        for (let year = 2013; year <= 2026; year++) {
            // Publications per year increases exponentially
            let count;
            if (year <= 2017) count = Math.floor(Math.random() * 3) + 1;
            else if (year <= 2020) count = Math.floor(Math.random() * 5) + 3;
            else if (year <= 2023) count = Math.floor(Math.random() * 10) + 8;
            else count = Math.floor(Math.random() * 15) + 12;

            for (let i = 0; i < count; i++) {
                const template = subjects[Math.floor(Math.random() * subjects.length)];
                const month = Math.floor(Math.random() * 12) + 1;
                const day = Math.floor(Math.random() * 28) + 1;
                const reach = year <= 2020
                    ? Math.floor(Math.random() * 5000) + 500
                    : Math.floor(Math.random() * 50000) + 2000;

                pubs.push({
                    id: pubs.length,
                    title: template.title,
                    axis: template.axis,
                    channel: template.channel,
                    type: template.type,
                    date: new Date(year, month - 1, day),
                    year: year,
                    reach: reach,
                    excerpt: 'Lorem ipsum excerpt de la publication...'
                });
            }
        }

        return pubs.sort((a, b) => a.date - b.date);
    }

    const publications = generatePublications();

    // ═══════════════════════════════════════════
    // CANVAS SETUP
    // ═══════════════════════════════════════════
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const tlCanvas = document.getElementById('timeline-canvas');
    const tlCtx = tlCanvas.getContext('2d');
    let W, H;

    function resize() {
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * devicePixelRatio;
        canvas.height = H * devicePixelRatio;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.scale(devicePixelRatio, devicePixelRatio);

        tlCanvas.width = (W - 80) * devicePixelRatio;
        tlCanvas.height = 40 * devicePixelRatio;
        tlCanvas.style.width = (W - 80) + 'px';
        tlCanvas.style.height = '40px';
        tlCtx.scale(devicePixelRatio, devicePixelRatio);
    }
    resize();
    window.addEventListener('resize', resize);

    // ═══════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════
    let activeAxis = 'all';
    let activeChannels = new Set(['linkedin', 'instagram', 'youtube', 'presse', 'conference']);
    let hoveredPub = null;
    let animatedPositions = [];
    const startTime = Date.now();

    // ═══════════════════════════════════════════
    // LAYOUT — Position publications as constellation
    // ═══════════════════════════════════════════
    function layoutPublications() {
        const timelineStart = new Date(2013, 0, 1).getTime();
        const timelineEnd = new Date(2027, 0, 1).getTime();
        const timeRange = timelineEnd - timelineStart;

        const marginLeft = 60;
        const marginRight = 60;
        const marginTop = 130;
        const marginBottom = 160;

        const usableW = W - marginLeft - marginRight;
        const usableH = H - marginTop - marginBottom;

        animatedPositions = publications.map((pub, i) => {
            const tNorm = (pub.date.getTime() - timelineStart) / timeRange;
            const x = marginLeft + tNorm * usableW;

            // Vertical position: spread by axis, with some randomness
            let yBase;
            if (pub.axis === 'techno') yBase = marginTop + usableH * 0.2;
            else if (pub.axis === 'enviro') yBase = marginTop + usableH * 0.5;
            else yBase = marginTop + usableH * 0.8;

            const yJitter = (Math.random() - 0.5) * usableH * 0.25;
            const y = yBase + yJitter;

            // Size based on reach
            const size = Math.max(3, Math.min(12, Math.sqrt(pub.reach) / 30));

            return {
                pub,
                x, y,
                targetX: x,
                targetY: y,
                size,
                opacity: 1,
                targetOpacity: 1
            };
        });
    }

    layoutPublications();

    // ═══════════════════════════════════════════
    // FILTERS
    // ═══════════════════════════════════════════
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeAxis = btn.dataset.axis;
            updateVisibility();
        });
    });

    document.querySelectorAll('.channel-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const channel = btn.dataset.channel;
            if (channel === 'all') {
                const allActive = activeChannels.size === 5;
                document.querySelectorAll('.channel-btn').forEach(b => {
                    if (b.dataset.channel !== 'all') {
                        b.classList.toggle('active', !allActive);
                    }
                });
                if (allActive) activeChannels.clear();
                else activeChannels = new Set(['linkedin', 'instagram', 'youtube', 'presse', 'conference']);
                btn.classList.toggle('active', !allActive);
            } else {
                btn.classList.toggle('active');
                if (activeChannels.has(channel)) activeChannels.delete(channel);
                else activeChannels.add(channel);
                // Update "all" button
                document.querySelector('.channel-btn[data-channel="all"]').classList.toggle('active', activeChannels.size === 5);
            }
            updateVisibility();
        });
    });

    function updateVisibility() {
        animatedPositions.forEach(ap => {
            const axisMatch = activeAxis === 'all' || ap.pub.axis === activeAxis;
            const channelMatch = activeChannels.has(ap.pub.channel);
            ap.targetOpacity = (axisMatch && channelMatch) ? 1 : 0.05;
        });
        updateStats();
    }

    function updateStats() {
        const visible = animatedPositions.filter(ap => ap.targetOpacity > 0.5);
        document.getElementById('stat-total').textContent = visible.length;
        const totalReach = visible.reduce((sum, ap) => sum + ap.pub.reach, 0);
        document.getElementById('stat-reach').textContent = totalReach > 1000000
            ? (totalReach / 1000000).toFixed(1) + 'M'
            : totalReach > 1000
                ? Math.floor(totalReach / 1000) + 'K'
                : totalReach;
        const channels = new Set(visible.map(ap => ap.pub.channel));
        document.getElementById('stat-channels').textContent = channels.size;
    }
    updateStats();

    // ═══════════════════════════════════════════
    // DENSITY BAR
    // ═══════════════════════════════════════════
    function buildDensityBar() {
        const bar = document.getElementById('density-bar');
        bar.innerHTML = '';
        const years = 2027 - 2013;
        const segments = years * 4; // quarterly

        for (let i = 0; i < segments; i++) {
            const startDate = new Date(2013 + Math.floor(i / 4), (i % 4) * 3, 1);
            const endDate = new Date(2013 + Math.floor((i + 1) / 4), ((i + 1) % 4) * 3, 1);

            const count = publications.filter(p =>
                p.date >= startDate && p.date < endDate
            ).length;

            const seg = document.createElement('div');
            seg.className = 'density-segment';
            const intensity = Math.min(1, count / 8);
            seg.style.background = `rgba(255, 255, 255, ${intensity * 0.4})`;
            bar.appendChild(seg);
        }
    }
    buildDensityBar();

    // ═══════════════════════════════════════════
    // DRAW
    // ═══════════════════════════════════════════
    const mousePos = { x: 0, y: 0 };
    canvas.addEventListener('mousemove', (e) => {
        mousePos.x = e.clientX;
        mousePos.y = e.clientY;
    });

    canvas.addEventListener('click', () => {
        if (hoveredPub) {
            const popup = document.getElementById('detail-popup');
            popup.style.display = 'block';
            popup.style.left = Math.min(mousePos.x + 20, W - 360) + 'px';
            popup.style.top = Math.min(mousePos.y - 20, H - 200) + 'px';
            document.getElementById('popup-type').textContent = hoveredPub.type;
            document.getElementById('popup-type').style.color = COLORS[hoveredPub.axis];
            document.getElementById('popup-title').textContent = hoveredPub.title;
            document.getElementById('popup-channel').textContent = CHANNELS[hoveredPub.channel].label + ' · ' + hoveredPub.date.toLocaleDateString('fr-FR');
            document.getElementById('popup-excerpt').textContent = hoveredPub.excerpt;
            document.getElementById('popup-reach').textContent = hoveredPub.reach.toLocaleString('fr-FR');
            document.getElementById('popup-date').textContent = hoveredPub.date.toLocaleDateString('fr-FR', { year: 'numeric', month: 'long' });
        } else {
            document.getElementById('detail-popup').style.display = 'none';
        }
    });

    function drawTimeline() {
        const tlW = tlCanvas.width / devicePixelRatio;
        const tlH = tlCanvas.height / devicePixelRatio;
        tlCtx.clearRect(0, 0, tlW, tlH);

        // Axis line
        tlCtx.strokeStyle = 'rgba(255,255,255,0.15)';
        tlCtx.lineWidth = 1;
        tlCtx.beginPath();
        tlCtx.moveTo(0, 10);
        tlCtx.lineTo(tlW, 10);
        tlCtx.stroke();

        // Year markers
        for (let year = 2013; year <= 2026; year++) {
            const x = ((year - 2013) / (2027 - 2013)) * tlW;
            tlCtx.strokeStyle = 'rgba(255,255,255,0.2)';
            tlCtx.beginPath();
            tlCtx.moveTo(x, 5);
            tlCtx.lineTo(x, 15);
            tlCtx.stroke();

            tlCtx.fillStyle = 'rgba(255,255,255,0.35)';
            tlCtx.font = '10px Poppins';
            tlCtx.textAlign = 'center';
            tlCtx.fillText(year, x, 30);
        }

        // Highlight key moments
        const moments = [
            { year: 2013, label: 'Opsealog', color: COLORS.enviro },
            { year: 2017, label: 'Choix décisif', color: '#ff6b6b' },
            { year: 2023, label: 'Accélération', color: COLORS.socio },
            { year: 2026, label: 'Océanocratie', color: COLORS.techno }
        ];
        moments.forEach(m => {
            const x = ((m.year - 2013) / (2027 - 2013)) * tlW;
            tlCtx.fillStyle = m.color;
            tlCtx.beginPath();
            tlCtx.arc(x, 10, 4, 0, Math.PI * 2);
            tlCtx.fill();
        });
    }

    function render() {
        requestAnimationFrame(render);
        const time = (Date.now() - startTime) / 1000;

        ctx.fillStyle = '#0a0e1a';
        ctx.fillRect(0, 0, W, H);

        // Background subtle gradient zones for axes
        if (activeAxis === 'all') {
            const grad1 = ctx.createLinearGradient(0, 0, 0, H);
            grad1.addColorStop(0, 'rgba(42, 85, 179, 0.03)');
            grad1.addColorStop(0.4, 'rgba(0, 191, 99, 0.02)');
            grad1.addColorStop(0.8, 'rgba(179, 42, 85, 0.03)');
            grad1.addColorStop(1, 'transparent');
            ctx.fillStyle = grad1;
            ctx.fillRect(0, 0, W, H);
        }

        hoveredPub = null;

        // Draw connections between nearby publications of same axis
        ctx.globalAlpha = 0.08;
        for (let i = 0; i < animatedPositions.length; i++) {
            const a = animatedPositions[i];
            if (a.opacity < 0.3) continue;
            for (let j = i + 1; j < Math.min(i + 5, animatedPositions.length); j++) {
                const b = animatedPositions[j];
                if (b.opacity < 0.3) continue;
                if (a.pub.axis !== b.pub.axis) continue;
                const dist = Math.hypot(a.x - b.x, a.y - b.y);
                if (dist < 80) {
                    ctx.strokeStyle = COLORS[a.pub.axis];
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(a.x, a.y);
                    ctx.lineTo(b.x, b.y);
                    ctx.stroke();
                }
            }
        }
        ctx.globalAlpha = 1;

        // Draw publications
        animatedPositions.forEach((ap, i) => {
            // Animate opacity
            ap.opacity += (ap.targetOpacity - ap.opacity) * 0.08;

            if (ap.opacity < 0.02) return;

            const color = COLORS[ap.pub.axis];
            const glowColor = COLORS[ap.pub.axis + 'Glow'];
            const breathe = Math.sin(time * 0.8 + i * 0.3) * 0.3;

            // Check hover
            const dist = Math.hypot(mousePos.x - ap.x, mousePos.y - ap.y);
            const isHovered = dist < ap.size + 8;
            if (isHovered && ap.opacity > 0.5) hoveredPub = ap.pub;

            const displaySize = ap.size * (1 + breathe * 0.1) * (isHovered ? 1.5 : 1);

            ctx.globalAlpha = ap.opacity;

            // Glow
            if (ap.size > 5 || isHovered) {
                const glow = ctx.createRadialGradient(ap.x, ap.y, 0, ap.x, ap.y, displaySize * 3);
                glow.addColorStop(0, glowColor || (color + '30'));
                glow.addColorStop(1, 'transparent');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(ap.x, ap.y, displaySize * 3, 0, Math.PI * 2);
                ctx.fill();
            }

            // Dot
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(ap.x, ap.y, displaySize, 0, Math.PI * 2);
            ctx.fill();

            // Hovered label
            if (isHovered && ap.opacity > 0.5) {
                ctx.fillStyle = '#ffffff';
                ctx.font = '600 11px Poppins';
                ctx.textAlign = 'center';
                ctx.fillText(ap.pub.title.substring(0, 40) + (ap.pub.title.length > 40 ? '...' : ''), ap.x, ap.y - displaySize - 12);

                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.font = '10px "Source Serif 4"';
                ctx.fillText(CHANNELS[ap.pub.channel].label + ' · ' + ap.pub.year, ap.x, ap.y - displaySize - 1);

                canvas.style.cursor = 'pointer';
            }

            ctx.globalAlpha = 1;
        });

        // Reset cursor if not hovering
        if (!hoveredPub) canvas.style.cursor = 'default';

        // Draw axis labels on left
        ctx.globalAlpha = 0.3;
        ctx.font = '600 10px Poppins';
        ctx.textAlign = 'left';
        const marginTop = 130;
        const usableH = H - marginTop - 160;

        ctx.fillStyle = COLORS.techno;
        ctx.fillText('TECHNOLOGIQUE', 10, marginTop + usableH * 0.2);
        ctx.fillStyle = COLORS.enviro;
        ctx.fillText('ENVIRONNEMENTALE', 10, marginTop + usableH * 0.5);
        ctx.fillStyle = COLORS.socio;
        ctx.fillText('SOCIOCULTURELLE', 10, marginTop + usableH * 0.8);
        ctx.globalAlpha = 1;

        drawTimeline();
    }

    render();

    // Close popup on outside click
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.detail-popup') && !e.target.closest('#canvas')) {
            document.getElementById('detail-popup').style.display = 'none';
        }
    });

    window.addEventListener('resize', () => {
        resize();
        layoutPublications();
    });
    </script>
</body>
</html>
