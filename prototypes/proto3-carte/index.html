        { name: 'Océan Atlantique', lon: -30, lat: 20, size: 14, opacity: 0.08, italic: true },
        { name: 'Atlantique Sud', lon: -15, lat: -20, size: 11, opacity: 0.06, italic: true },
        { name: 'Océan Indien', lon: 70, lat: -15, size: 14, opacity: 0.08, italic: true },
        { name: 'Océan Pacifique', lon: 150, lat: 0, size: 14, opacity: 0.07, italic: true },
        { name: 'Mer Méditerranée', lon: 18, lat: 36, size: 10, opacity: 0.08, italic: true },
        { name: 'Mer du Nord', lon: 3, lat: 57, size: 8, opacity: 0.06, italic: true },
        { name: 'Golfe de Guinée', lon: 2, lat: 1, size: 8, opacity: 0.06, italic: true },
        { name: 'Mer de Chine', lon: 115, lat: 18, size: 9, opacity: 0.06, italic: true },
        { name: 'Mer Rouge', lon: 38, lat: 20, size: 8, opacity: 0.06, italic: true },
        // Key cities
        { name: 'Bretagne', lon: -3.5, lat: 48.6, size: 9, opacity: 0.18 },
        { name: 'Marseille', lon: 5.8, lat: 42.5, size: 9, opacity: 0.15 },
        { name: 'Brest', lon: -5, lat: 48.8, size: 8, opacity: 0.12 },
        { name: 'Le Havre', lon: 0.3, lat: 50.1, size: 8, opacity: 0.1 },
        { name: 'Annecy', lon: 6.4, lat: 46.4, size: 8, opacity: 0.1 },
        { name: 'Paris', lon: 2.6, lat: 49.2, size: 9, opacity: 0.12 },
        { name: 'Luanda', lon: 13.2, lat: -9.2, size: 8, opacity: 0.12 },
        { name: 'La Réunion', lon: 55.5, lat: -22.5, size: 9, opacity: 0.18 },
        { name: 'Madagascar', lon: 47, lat: -19, size: 10, opacity: 0.12, italic: true },
    ];

    // ═══════════════════════════════════════════
    // CANVAS SETUP
    // ═══════════════════════════════════════════
    const canvas = document.getElementById('map-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, DPR;

    function resize() {
        DPR = window.devicePixelRatio || 1;
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * DPR;
        canvas.height = H * DPR;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    // ═══════════════════════════════════════════
    // MAP PROJECTION (Mercator)
    // ═══════════════════════════════════════════
    let mapCenter = { lon: 15, lat: 25 };
    let mapZoom = 1.0;

    function project(lon, lat) {
        const x = W / 2 + (lon - mapCenter.lon) * (W / 120) * mapZoom;
        const latRad = lat * Math.PI / 180;
        const centerLatRad = mapCenter.lat * Math.PI / 180;
        const mercY = Math.log(Math.tan(Math.PI / 4 + latRad / 2));
        const mercCenter = Math.log(Math.tan(Math.PI / 4 + centerLatRad / 2));
        const y = H / 2 - (mercY - mercCenter) * (W / 120) * mapZoom * (180 / Math.PI);
        return { x, y };
    }

    // ═══════════════════════════════════════════
    // DRAWING FUNCTIONS
    // ═══════════════════════════════════════════
    function drawGrid() {
        ctx.strokeStyle = COLORS.grid;
        ctx.lineWidth = 0.5;

        for (let lon = -80; lon <= 160; lon += 10) {
            ctx.beginPath();
            const p1 = project(lon, -60);
            const p2 = project(lon, 75);
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
        }
        for (let lat = -60; lat <= 75; lat += 10) {
            ctx.beginPath();
            const p1 = project(-80, lat);
            const p2 = project(160, lat);
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
        }

        // Equator — slightly more visible
        ctx.strokeStyle = 'rgba(232, 220, 200, 0.1)';
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        const eq1 = project(-80, 0);
        const eq2 = project(160, 0);
        ctx.moveTo(eq1.x, eq1.y);
        ctx.lineTo(eq2.x, eq2.y);
        ctx.stroke();

        // Coordinate labels at edges
        ctx.fillStyle = 'rgba(232, 220, 200, 0.08)';
        ctx.font = '8px "Source Serif 4", serif';
        ctx.textAlign = 'center';
        for (let lon = -60; lon <= 140; lon += 20) {
            const p = project(lon, -55);
            if (p.x > 10 && p.x < W - 10) {
                ctx.fillText(lon + '°', p.x, p.y);
            }
        }
        ctx.textAlign = 'right';
        for (let lat = -40; lat <= 60; lat += 20) {
            const p = project(-75, lat);
            if (p.y > 10 && p.y < H - 10) {
                ctx.fillText(lat + '°', p.x, p.y + 3);
            }
        }
    }

    function drawContinent(points, fillColor, strokeColor, lineWidth) {
        if (!points || points.length < 3) return;
        ctx.beginPath();
        let first = true;
        for (let i = 0; i < points.length; i++) {
            const p = project(points[i][0], points[i][1]);
            if (first) { ctx.moveTo(p.x, p.y); first = false; }
            else ctx.lineTo(p.x, p.y);
        }
        ctx.closePath();
        ctx.fillStyle = fillColor || COLORS.coastFill;
        ctx.fill();
        ctx.strokeStyle = strokeColor || COLORS.coast;
        ctx.lineWidth = lineWidth || 1.2;
        ctx.stroke();
    }

    function drawCoastlines() {
        // Draw all continents
        drawContinent(continents.europe);
        drawContinent(continents.britain);
        drawContinent(continents.ireland);
        drawContinent(continents.africaWest);
        drawContinent(continents.madagascar);
        drawContinent(continents.india);
        drawContinent(continents.china);
        drawContinent(continents.australia);
        drawContinent(continents.southAmerica);
        drawContinent(continents.reunionIsland, 'rgba(232, 220, 200, 0.15)', COLORS.coast, 1);

        // Draw place names
        placeNames.forEach(place => {
            const p = project(place.lon, place.lat);
            if (p.x < -200 || p.x > W + 200 || p.y < -100 || p.y > H + 100) return;
            ctx.globalAlpha = place.opacity;
            ctx.fillStyle = COLORS.sillage;
            const fontStyle = place.italic ? 'italic ' : '';
            ctx.font = `${fontStyle}${place.size}px "Source Serif 4", serif`;
            ctx.textAlign = 'center';
            ctx.fillText(place.name, p.x, p.y);
            ctx.globalAlpha = 1;
        });
    }

    // ═══════════════════════════════════════════
    // SILLAGE (route) DRAWING with smart labels
    // ═══════════════════════════════════════════
    function drawSillage(progress) {
        const totalPoints = sillageWaypoints.length;
        const drawnPoints = Math.floor(progress * totalPoints);
        const partialProgress = (progress * totalPoints) - drawnPoints;

        if (drawnPoints < 1) return;

        // Draw dashed wake trail behind the main route
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(232, 220, 200, 0.15)';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 8]);
        for (let i = 0; i <= Math.min(drawnPoints, totalPoints - 1); i++) {
            const wp = sillageWaypoints[i];
            const p = project(wp.lon, wp.lat);
            if (i === 0) ctx.moveTo(p.x, p.y);
            else {
                const prev = sillageWaypoints[i - 1];
                const prevP = project(prev.lon, prev.lat);
                const cpX = (prevP.x + p.x) / 2;
                const cpY = Math.min(prevP.y, p.y) - Math.abs(p.x - prevP.x) * 0.12;
                ctx.quadraticCurveTo(cpX, cpY, p.x, p.y);
            }
        }
        ctx.stroke();
        ctx.setLineDash([]);

        // Draw the main route
        ctx.beginPath();
        ctx.strokeStyle = COLORS.sillage;
        ctx.lineWidth = 2.5;
        ctx.globalAlpha = 0.8;

        for (let i = 0; i <= Math.min(drawnPoints, totalPoints - 1); i++) {
            const wp = sillageWaypoints[i];
            const p = project(wp.lon, wp.lat);

            if (i === 0) {
                ctx.moveTo(p.x, p.y);
            } else {
                const prev = sillageWaypoints[i - 1];
                const prevP = project(prev.lon, prev.lat);
                const cpX = (prevP.x + p.x) / 2;
                const cpY = Math.min(prevP.y, p.y) - Math.abs(p.x - prevP.x) * 0.12;

                if (i === drawnPoints && partialProgress < 1) {
                    const t = partialProgress;
                    const ix = (1-t)*(1-t)*prevP.x + 2*(1-t)*t*cpX + t*t*p.x;
                    const iy = (1-t)*(1-t)*prevP.y + 2*(1-t)*t*cpY + t*t*p.y;
                    ctx.quadraticCurveTo(cpX, cpY, ix, iy);
                } else {
                    ctx.quadraticCurveTo(cpX, cpY, p.x, p.y);
                }
            }
        }
        ctx.stroke();
        ctx.globalAlpha = 1;

        // ── Smart label management ──
        // For each visible waypoint, determine if its label should show.
        // Rule: if a LATER visible waypoint is at the same approximate location,
        // hide the earlier one's label (keep only the most recent).
        // Exception: founder and decisive moments always show.
        const visibleCount = Math.min(drawnPoints + 1, totalPoints);
        const labelVisible = new Array(visibleCount).fill(true);

        for (let i = 0; i < visibleCount; i++) {
            if (sillageWaypoints[i].isFounder || sillageWaypoints[i].isDecisive) continue;
            for (let j = i + 1; j < visibleCount; j++) {
                const a = sillageWaypoints[i], b = sillageWaypoints[j];
                if (Math.abs(a.lon - b.lon) < 3 && Math.abs(a.lat - b.lat) < 3) {
                    labelVisible[i] = false;
                    break;
                }
            }
        }

        // Draw waypoint dots and labels
        for (let i = 0; i < visibleCount; i++) {
            const wp = sillageWaypoints[i];
            const p = project(wp.lon, wp.lat);

            let dotSize = 4;
            let dotColor = COLORS.sillage;
            let glowSize = 0;

            if (wp.isFounder) {
                dotSize = 8;
                dotColor = COLORS.enviro;
                glowSize = 25;
            } else if (wp.isDecisive) {
                dotSize = 9;
                dotColor = '#ff6b6b';
                glowSize = 30;
            }

            // Glow for special waypoints
            if (glowSize > 0) {
                const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowSize);
                gradient.addColorStop(0, dotColor + '50');
                gradient.addColorStop(0.5, dotColor + '20');
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(p.x, p.y, glowSize, 0, Math.PI * 2);
                ctx.fill();

                // Pulsing ring for special waypoints
                const pulsePhase = (Date.now() / 1000) % 2;
                const pulseRadius = glowSize + pulsePhase * 10;
                const pulseAlpha = Math.max(0, 0.3 - pulsePhase * 0.15);
                ctx.strokeStyle = dotColor;
                ctx.globalAlpha = pulseAlpha;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, pulseRadius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1;
            }

            // Dot
            ctx.fillStyle = dotColor;
            ctx.beginPath();
            ctx.arc(p.x, p.y, dotSize, 0, Math.PI * 2);
            ctx.fill();

            // Outer ring
            ctx.strokeStyle = dotColor;
            ctx.lineWidth = 1;
            ctx.globalAlpha = 0.5;
            ctx.beginPath();
            ctx.arc(p.x, p.y, dotSize + 3, 0, Math.PI * 2);
            ctx.stroke();
            ctx.globalAlpha = 1;

            // Label — only if smart label check says visible
            if (labelVisible[i]) {
                const isSpecial = wp.isFounder || wp.isDecisive;
                const labelColor = wp.isFounder ? COLORS.enviro : (wp.isDecisive ? '#ff6b6b' : 'rgba(232, 220, 200, 0.7)');

                ctx.fillStyle = labelColor;
                ctx.font = isSpecial ? 'bold 12px Poppins' : '10px Poppins';
                ctx.textAlign = 'center';
                ctx.fillText(wp.label, p.x, p.y - dotSize - 12);

                // Year below label for special waypoints
                if (isSpecial) {
                    ctx.font = '9px "Source Serif 4", serif';
                    ctx.fillStyle = labelColor + '80';
                    ctx.fillText(wp.year, p.x, p.y - dotSize - 1);
                }
            }
        }
    }

    // ═══════════════════════════════════════════
    // RÉSEAU (network) DRAWING
    // ═══════════════════════════════════════════
    // Seeded random for consistent thread curves
    let threadSeeds = reseauThreads.map((_, i) => (i * 137.508 + 42) % 100 - 50);

    function drawReseau(progress, time) {
        if (progress <= 0) return;

        const hub = project(annecyHub.lon, annecyHub.lat);

        // Hub glow
        const hubGlow = ctx.createRadialGradient(hub.x, hub.y, 0, hub.x, hub.y, 35);
        hubGlow.addColorStop(0, 'rgba(232, 220, 200, 0.35)');
        hubGlow.addColorStop(0.5, 'rgba(232, 220, 200, 0.1)');
        hubGlow.addColorStop(1, 'transparent');
        ctx.fillStyle = hubGlow;
        ctx.beginPath();
        ctx.arc(hub.x, hub.y, 35, 0, Math.PI * 2);
        ctx.fill();

        // Hub dot
        ctx.fillStyle = '#e8dcc8';
        ctx.beginPath();
        ctx.arc(hub.x, hub.y, 6, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = 'rgba(232, 220, 200, 0.85)';
        ctx.font = '600 13px Poppins';
        ctx.textAlign = 'center';
        ctx.fillText('ANNECY', hub.x, hub.y - 18);
        ctx.font = 'italic 10px "Source Serif 4"';
        ctx.fillStyle = 'rgba(232, 220, 200, 0.45)';
        ctx.fillText('Port d\'attache', hub.x, hub.y + 22);

        // Draw threads
        const threadsToShow = Math.ceil(progress * reseauThreads.length);

        for (let i = 0; i < threadsToShow; i++) {
            const thread = reseauThreads[i];
            const threadProgress = Math.min(1, (progress * reseauThreads.length - i));
            if (threadProgress <= 0) continue;

            const dest = project(thread.destination.lon, thread.destination.lat);
            const isLocal = thread.isLocal;

            if (!isLocal) {
                const seed = threadSeeds[i];
                const cpX = (hub.x + dest.x) / 2 + seed * 0.3;
                const cpY = (hub.y + dest.y) / 2 - 30 + seed * 0.2;

                ctx.beginPath();
                ctx.strokeStyle = thread.color;
                ctx.lineWidth = 2;
                ctx.globalAlpha = 0.6 * threadProgress;
                ctx.setLineDash([6, 4]);

                const steps = 50;
                const maxStep = Math.floor(steps * threadProgress);
                for (let s = 0; s <= maxStep; s++) {
                    const t = s / steps;
                    const x = (1-t)*(1-t)*hub.x + 2*(1-t)*t*cpX + t*t*dest.x;
                    const y = (1-t)*(1-t)*hub.y + 2*(1-t)*t*cpY + t*t*dest.y;
                    if (s === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.globalAlpha = 1;

                // Animated particle
                const particleT = ((time * 0.3 + i * 0.7) % 2) / 2;
                if (particleT <= threadProgress) {
                    const px = (1-particleT)*(1-particleT)*hub.x + 2*(1-particleT)*particleT*cpX + particleT*particleT*dest.x;
                    const py = (1-particleT)*(1-particleT)*hub.y + 2*(1-particleT)*particleT*cpY + particleT*particleT*dest.y;
                    ctx.fillStyle = thread.color;
                    ctx.globalAlpha = 0.8;
                    ctx.beginPath();
                    ctx.arc(px, py, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }

            // Destination dot and label
            if (threadProgress > 0.5) {
                const dotAlpha = (threadProgress - 0.5) * 2;
                ctx.globalAlpha = dotAlpha;

                const offsetX = isLocal ? (i * 4 - 2) : 0;
                const offsetY = isLocal ? (15 + i * 12) : 0;

                ctx.fillStyle = thread.color;
                ctx.beginPath();
                ctx.arc(dest.x + offsetX, dest.y + offsetY, 4, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = thread.color;
                ctx.font = '600 10px Poppins';
                ctx.textAlign = 'left';
                const labelX = dest.x + offsetX + (isLocal ? 8 : 10);
                const labelY = dest.y + offsetY + 4;
                ctx.fillText(thread.label, labelX, labelY);

                ctx.font = '9px "Source Serif 4"';
                ctx.fillStyle = 'rgba(232, 220, 200, 0.4)';
                ctx.fillText(thread.role, labelX, labelY + 14);

                ctx.globalAlpha = 1;
            }
        }
    }

    // ═══════════════════════════════════════════
    // MAIN RENDER LOOP
    // ═══════════════════════════════════════════
    let scrollProgress = 0;
    const startTime = Date.now();

    function getScrollProgress() {
        const scrollTop = window.scrollY;
        const maxScroll = document.querySelector('.scroll-container').scrollHeight - window.innerHeight;
        return Math.max(0, Math.min(1, scrollTop / maxScroll));
    }

    function updatePhaseIndicator(progress) {
        const phases = ['enfance', 'formation', 'navigation', 'fondateur', 'choix', 'reseau'];
        let activePhase;

        if (progress < 0.08) activePhase = 'enfance';
        else if (progress < 0.15) activePhase = 'formation';
        else if (progress < 0.45) activePhase = 'navigation';
        else if (progress < 0.55) activePhase = 'fondateur';
        else if (progress < 0.65) activePhase = 'choix';
        else activePhase = 'reseau';

        phases.forEach(p => {
            const el = document.getElementById('phase-' + p);
            el.classList.toggle('active', p === activePhase);
        });
    }

    function updateYear(progress) {
        let year;
        if (progress < 0.08) year = Math.floor(1991 + progress / 0.08 * 19);
        else if (progress < 0.65) year = Math.floor(2010 + (progress - 0.08) / 0.57 * 7);
        else year = Math.floor(2017 + (progress - 0.65) / 0.35 * 9);
        document.getElementById('year-display').textContent = year;

        if (year === 2013 && progress > 0.35 && progress < 0.5) {
            document.getElementById('year-display').style.color = 'rgba(0, 191, 99, 0.25)';
        } else if (year === 2017 && progress > 0.55 && progress < 0.7) {
            document.getElementById('year-display').style.color = 'rgba(255, 107, 107, 0.2)';
        } else {
            document.getElementById('year-display').style.color = 'rgba(232, 220, 200, 0.1)';
        }
    }

    function render() {
        requestAnimationFrame(render);

        scrollProgress = getScrollProgress();
        const time = (Date.now() - startTime) / 1000;

        // Clear
        ctx.fillStyle = COLORS.bg;
        ctx.fillRect(0, 0, W, H);

        // Adjust map view based on progress
        if (scrollProgress < 0.6) {
            mapCenter.lon = 15 + scrollProgress * 20;
            mapCenter.lat = 25;
            mapZoom = 1.0 + scrollProgress * 0.3;
        } else {
            const t = (scrollProgress - 0.6) / 0.4;
            mapCenter.lon = 15 + 12 - t * 20;
            mapCenter.lat = 25 + t * 20;
            mapZoom = 1.3 + t * 1.5;
        }

        // Draw layers
        drawGrid();
        drawCoastlines();

        // Phase 1: Sillage (0-65% scroll)
        const sillageProgress = Math.min(1, scrollProgress / 0.6);
        drawSillage(sillageProgress);

        // Phase 2: Réseau (65-100% scroll)
        const reseauProgress = scrollProgress > 0.6 ? (scrollProgress - 0.6) / 0.4 : 0;
        drawReseau(reseauProgress, time);

        // UI updates
        updatePhaseIndicator(scrollProgress);
        updateYear(scrollProgress);

        document.getElementById('legend').classList.toggle('visible', scrollProgress > 0.65);
        document.getElementById('scroll-hint').style.opacity = scrollProgress < 0.05 ? '1' : '0';
    }

    render();

    // ═══════════════════════════════════════════
    // HOVER TOOLTIP
    // ═══════════════════════════════════════════
    const tooltip = document.getElementById('tooltip');
    canvas.addEventListener('mousemove', (e) => {
        const mouseX = e.clientX;
        const mouseY = e.clientY;
        let found = false;

        const sillageProgress = Math.min(1, scrollProgress / 0.6);
        const visibleWaypoints = Math.floor(sillageProgress * sillageWaypoints.length);

        for (let i = 0; i < visibleWaypoints; i++) {
            const wp = sillageWaypoints[i];
            const p = project(wp.lon, wp.lat);
            const dist = Math.hypot(mouseX - p.x, mouseY - p.y);

            if (dist < 20) {
                // Position tooltip, keep on screen
                let tx = mouseX + 20;
                let ty = mouseY - 10;
                if (tx + 320 > W) tx = mouseX - 340;
                if (ty + 200 > H) ty = H - 210;

                tooltip.style.display = 'block';
                tooltip.style.left = tx + 'px';
                tooltip.style.top = ty + 'px';
                document.getElementById('tooltip-title').textContent = wp.name;
                document.getElementById('tooltip-date').textContent = wp.year;
                document.getElementById('tooltip-desc').innerHTML = wp.detail +
                    (wp.isFounder ? '<div class="founder-badge">Moment Fondateur — Naissance d\'Opsealog</div>' : '') +
                    (wp.isDecisive ? '<div class="founder-badge" style="background:rgba(255,107,107,0.2);border-color:rgba(255,107,107,0.3);color:#ff6b6b;">Choix Décisif</div>' : '');
                found = true;
                canvas.style.cursor = 'pointer';
                break;
            }
        }

        if (!found && scrollProgress > 0.6) {
            const reseauProg = (scrollProgress - 0.6) / 0.4;
            const visibleThreads = Math.ceil(reseauProg * reseauThreads.length);

            for (let i = 0; i < visibleThreads; i++) {
                const thread = reseauThreads[i];
                const p = project(thread.destination.lon, thread.destination.lat);
                const dist = Math.hypot(mouseX - p.x, mouseY - p.y);

                if (dist < 20) {
                    let tx = mouseX + 20;
                    let ty = mouseY - 10;
                    if (tx + 320 > W) tx = mouseX - 340;

                    tooltip.style.display = 'block';
                    tooltip.style.left = tx + 'px';
                    tooltip.style.top = ty + 'px';
                    document.getElementById('tooltip-title').textContent = thread.label;
                    document.getElementById('tooltip-date').textContent = 'Depuis ' + thread.since;
                    document.getElementById('tooltip-desc').textContent = thread.role + ' — ' + thread.axis;
                    found = true;
                    canvas.style.cursor = 'pointer';
                    break;
                }
            }
        }

        if (!found) {
            tooltip.style.display = 'none';
            canvas.style.cursor = 'default';
        }
    });
    </script>
