<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Proto 2 — Matrice Triple Transition Maritime</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e1a;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            height: 100vh;
            touch-action: none;
        }

        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* Vignette overlay */
        .vignette {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(5,7,15,0.7) 100%);
        }

        /* Detail panel */
        .detail-panel {
            position: fixed;
            right: -420px;
            top: 50%;
            transform: translateY(-50%);
            width: 380px;
            max-height: 80vh;
            background: rgba(10, 14, 26, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 32px;
            z-index: 200;
            transition: right 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
        }
        .detail-panel.open { right: 30px; }
        .detail-panel .panel-content {
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.4s ease 0.2s, transform 0.4s ease 0.2s;
        }
        .detail-panel.open .panel-content {
            opacity: 1;
            transform: translateY(0);
        }
        .detail-panel .close-btn {
            position: absolute;
            top: 16px; right: 16px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            font-size: 20px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .detail-panel .close-btn:hover { color: #fff; }
        .detail-panel h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .detail-panel .role {
            font-family: 'Source Serif 4', serif;
            font-style: italic;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            margin-bottom: 16px;
        }
        .detail-panel .description {
            font-size: 14px;
            line-height: 1.7;
            color: rgba(255,255,255,0.8);
            margin-bottom: 20px;
        }
        .detail-panel .axes-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .axis-tag {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .axis-tag.techno { background: rgba(42,85,179,0.3); color: #6b9fff; border: 1px solid rgba(42,85,179,0.4); }
        .axis-tag.enviro { background: rgba(0,191,99,0.2); color: #4dff99; border: 1px solid rgba(0,191,99,0.3); }
        .axis-tag.socio { background: rgba(179,42,85,0.3); color: #ff6b99; border: 1px solid rgba(179,42,85,0.4); }

        .panel-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .panel-nav button {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.6);
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            transition: all 0.2s;
        }
        .panel-nav button:hover {
            background: rgba(255,255,255,0.12);
            color: #fff;
        }
        .panel-nav .counter {
            font-size: 11px;
            color: rgba(255,255,255,0.35);
        }

        /* Axis legend — small, discrete, bottom-left */
        .axis-legend {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
            opacity: 0;
            animation: fadeInUp 0.8s ease 2.8s forwards;
            background: rgba(10, 14, 26, 0.6);
            backdrop-filter: blur(8px);
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .axis-legend-title {
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.35);
            margin-bottom: 2px;
        }
        .axis-legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            font-weight: 500;
            color: rgba(255,255,255,0.75);
        }
        .axis-legend-bar {
            width: 18px;
            height: 4px;
            border-radius: 2px;
        }

        /* Controls hint */
        .controls-hint {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 100;
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            text-align: right;
            line-height: 1.8;
            opacity: 0;
            animation: fadeInUp 0.8s ease 3s forwards;
        }

        /* Watermark */
        .watermark {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            font-size: 10px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .detail-panel {
                width: calc(100% - 32px);
                right: -110%;
                top: auto;
                bottom: 16px;
                transform: none;
                max-height: 55vh;
                border-radius: 16px;
            }
            .detail-panel.open { right: 16px; }
            .controls-hint { display: none; }
            .axis-legend { bottom: 16px; left: 16px; padding: 10px 14px; }
            .axis-legend-item { font-size: 11px; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="vignette"></div>

    <!-- Axis legend — small discrete corner legend -->
    <div class="axis-legend">
        <div class="axis-legend-title">Axes de transition</div>
        <div class="axis-legend-item">
            <div class="axis-legend-bar" style="background:#4080e0;box-shadow:0 0 6px #2a55b3;"></div>
            Technologique
        </div>
        <div class="axis-legend-item">
            <div class="axis-legend-bar" style="background:#00e070;box-shadow:0 0 6px #00bf63;"></div>
            Environnementale
        </div>
        <div class="axis-legend-item">
            <div class="axis-legend-bar" style="background:#d43a6a;box-shadow:0 0 6px #b32a55;"></div>
            Socioculturelle
        </div>
    </div>

    <!-- Controls hint -->
    <div class="controls-hint">
        Clic gauche : rotation<br>
        Molette : rotation<br>
        Clic sur sphere : details<br>
        Double-clic : reset vue<br>
        Fleches : naviguer
    </div>

    <div class="watermark">COLOMBAN — PROTO 2 — MATRICE 3D</div>

    <!-- Detail panel -->
    <div class="detail-panel" id="detail-panel">
        <button class="close-btn" id="close-panel-btn">&#x2715;</button>
        <div class="panel-content">
            <h2 id="panel-title"></h2>
            <div class="role" id="panel-role"></div>
            <div class="description" id="panel-desc"></div>
            <div class="axes-tags" id="panel-axes"></div>
            <div class="panel-nav">
                <button id="panel-prev">&#8592; Prec.</button>
                <span class="counter" id="panel-counter"></span>
                <button id="panel-next">Suiv. &#8594;</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script>
    // =============================================
    // DATA
    // =============================================
    const COLORS = {
        techno: 0x4080e0,   // brighter saturated blue
        enviro: 0x00e070,   // brighter saturated green
        socio:  0xd43a6a,   // brighter saturated bordeaux/rose
        bg:     0x0a0e1a,
        white:  0xffffff
    };

    // Original hex values for CSS / labels
    const AXIS_HEX = {
        techno: '#4080e0',
        enviro: '#00e070',
        socio:  '#d43a6a'
    };

    const AXIS_NAMES = {
        techno: 'TECHNOLOGIQUE',
        enviro: 'ENVIRONNEMENTALE',
        socio:  'SOCIOCULTURELLE'
    };

    const engagements = [
        {
            id: 'gaspe', name: 'GASPE', role: 'Delegue General',
            description: 'Groupement des Armateurs de Services Publics maritimes et de Passages d\'Eau. Representation et defense des interets des armateurs de service public maritime.',
            axes: ['socio'], position: { x: 3.2, y: -1.5, z: 1.8 }, size: 0.45
        },
        {
            id: 'vaiata', name: 'VAIATA Dynamics', role: 'Co-fondateur',
            description: 'Technologie au service du sauvetage en mer et sauvetage digital des compagnies maritimes. Volet cyberdefense maritime.',
            axes: ['techno'], position: { x: -2.8, y: 2.0, z: -1.2 }, size: 0.4
        },
        {
            id: 'fondation', name: 'Fondation ENSM', role: 'President du conseil de gestion',
            description: 'Former les futurs officiers de marine marchande. Assurer que la formation maritime francaise reste a la hauteur des enjeux de transition.',
            axes: ['enviro', 'socio'], position: { x: 0.5, y: -2.8, z: -2.0 }, size: 0.42
        },
        {
            id: 'enseignant', name: 'Enseignant DD', role: 'Professeur a l\'ENSM',
            description: 'Enseignement de l\'ecologie et du developpement durable aux futurs officiers de marine marchande. Transmettre la conscience environnementale.',
            axes: ['enviro'], position: { x: -1.5, y: -2.2, z: 2.5 }, size: 0.35
        },
        {
            id: 'hydros', name: 'HYDROS Alumni', role: 'Bureau',
            description: 'Reseau des anciens de l\'ENSM. Animation de la communaute maritime, transmission intergenerationnelle.',
            axes: ['socio'], position: { x: 2.5, y: 0.8, z: -2.5 }, size: 0.3
        },
        {
            id: 'propeller', name: 'Propeller Club', role: 'Membre',
            description: 'Reseau international du commerce maritime. Echange entre acteurs du maritime, promotion du transport maritime.',
            axes: ['socio'], position: { x: 3.5, y: 1.8, z: 0.5 }, size: 0.28
        },
        {
            id: 'aperitifs', name: 'Aperitifs de la Mer', role: 'Ambassadeur & animateur',
            description: 'Rendre le maritime accessible au grand public. Vulgarisation festive et culturelle des enjeux maritimes.',
            axes: ['socio'], position: { x: 1.0, y: 2.8, z: 2.2 }, size: 0.32
        },
        {
            id: 'advisory', name: 'Advisory Boards', role: 'Membre consultatif',
            description: 'Conseil strategique aupres d\'entreprises maritimes en transition (de 2 a 47 000 salaries). Strategie, digitalisation, environnement.',
            axes: ['techno', 'enviro', 'socio'], position: { x: -3.0, y: -0.5, z: -1.8 }, size: 0.38
        },
        {
            id: 'medias', name: 'Leader d\'opinion', role: 'Prises de parole & medias',
            description: 'Publications, conferences, medias (Marine & Oceans, Conflits, Jeune Marine, Le Monde). Construire le narratif de la transition maritime.',
            axes: ['techno', 'enviro', 'socio'], position: { x: 0, y: 3.0, z: -0.5 }, size: 0.5
        },
        {
            id: 'coespc', name: 'COESPC', role: 'Bureau',
            description: 'Fete villageoise caritative a Annecy-le-Vieux. Ancrage local, engagement citoyen au-dela du maritime.',
            axes: ['socio'], position: { x: -2.0, y: 1.5, z: 3.0 }, size: 0.25
        },
        {
            id: 'opsealog', name: 'Opsealog', role: 'Participation a la creation',
            description: 'Pionnier de la donnee maritime. Reduction de 15% des consommations de centaines de navires dans 17 pays. Outils reglementaires EU MRV, CII, EEXI.',
            axes: ['techno', 'enviro'], position: { x: -0.25, y: 2.8, z: -1.5 }, size: 0.4
        }
    ];

    // =============================================
    // THREE.JS SCENE SETUP
    // =============================================
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 14);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(COLORS.bg, 1);
    // Three.js r155+ uses physically-correct lighting by default,
    // which makes legacy intensity values (designed for the old model) appear black.
    // Re-enable legacy light behaviour so the original intensity values work.
    renderer.useLegacyLights = true;
    container.appendChild(renderer.domElement);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2(-999, -999);
    let hoveredObject = null;
    let selectedObject = null;
    let selectedIndex = -1;
    const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

    if (isMobile) {
        raycaster.params.Mesh = { threshold: 0.5 };
    }

    // =============================================
    // ORBIT CONTROLS (custom with touch)
    // =============================================
    let isDragging = false;
    let dragMoved = false;
    let previousMousePosition = { x: 0, y: 0 };
    let rotationTarget = { x: 0, y: 0 };
    let currentRotation = { x: 0, y: 0 };
    let zoom = 14;
    let zoomTarget = 14;
    let autoRotate = true;
    let cameraLookTarget = new THREE.Vector3(0, 0, 0);
    let cameraLookCurrent = new THREE.Vector3(0, 0, 0);
    let zoomingToSphere = false;

    // Mouse events
    container.addEventListener('mousedown', (e) => {
        isDragging = true;
        dragMoved = false;
        previousMousePosition = { x: e.clientX, y: e.clientY };
        autoRotate = false;
        resetAutoRotateTimer();
    });
    container.addEventListener('mousemove', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        if (isDragging) {
            const dx = e.clientX - previousMousePosition.x;
            const dy = e.clientY - previousMousePosition.y;
            if (Math.abs(dx) > 2 || Math.abs(dy) > 2) dragMoved = true;
            rotationTarget.y += dx * 0.005;
            rotationTarget.x += dy * 0.005;
            rotationTarget.x = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, rotationTarget.x));
            previousMousePosition = { x: e.clientX, y: e.clientY };
        }
    });
    container.addEventListener('mouseup', () => { isDragging = false; });
    container.addEventListener('wheel', (e) => {
        e.preventDefault();
        // Scroll rotates the diagram on its axis
        rotationTarget.y += e.deltaY * 0.003;
        // Horizontal scroll (shift+wheel or trackpad) rotates vertically
        if (e.deltaX) {
            rotationTarget.x += e.deltaX * 0.003;
            rotationTarget.x = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, rotationTarget.x));
        }
        autoRotate = false;
        resetAutoRotateTimer();
    }, { passive: false });

    // Touch events
    let touchStartDist = 0;
    let lastTap = 0;
    container.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
            isDragging = true;
            dragMoved = false;
            previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            mouse.x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
            autoRotate = false;
            resetAutoRotateTimer();

            // Double-tap detection
            const now = Date.now();
            if (now - lastTap < 300) { resetCameraView(); }
            lastTap = now;
        } else if (e.touches.length === 2) {
            isDragging = false;
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            touchStartDist = Math.sqrt(dx * dx + dy * dy);
        }
    }, { passive: true });
    container.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (e.touches.length === 1 && isDragging) {
            const tx = e.touches[0].clientX;
            const ty = e.touches[0].clientY;
            const dx = tx - previousMousePosition.x;
            const dy = ty - previousMousePosition.y;
            if (Math.abs(dx) > 2 || Math.abs(dy) > 2) dragMoved = true;
            rotationTarget.y += dx * 0.005;
            rotationTarget.x += dy * 0.005;
            rotationTarget.x = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, rotationTarget.x));
            previousMousePosition = { x: tx, y: ty };
            mouse.x = (tx / window.innerWidth) * 2 - 1;
            mouse.y = -(ty / window.innerHeight) * 2 + 1;
        } else if (e.touches.length === 2) {
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const delta = touchStartDist - dist;
            zoomTarget += delta * 0.02;
            zoomTarget = Math.max(5, Math.min(20, zoomTarget));
            touchStartDist = dist;
        }
    }, { passive: false });
    container.addEventListener('touchend', (e) => {
        if (e.touches.length === 0) {
            // Simulate click on touch end if no drag
            if (!dragMoved) {
                handleClick();
            }
            isDragging = false;
        }
    });

    // Double-click to reset
    container.addEventListener('dblclick', () => { resetCameraView(); });

    function resetCameraView() {
        zoomTarget = 14;
        rotationTarget.x = 0;
        rotationTarget.y = currentRotation.y;
        cameraLookTarget.set(0, 0, 0);
        zoomingToSphere = false;
        closePanel();
        autoRotate = true;
    }

    // =============================================
    // LIGHTING
    // =============================================
    scene.add(new THREE.AmbientLight(0xffffff, 0.35));

    const pointLight1 = new THREE.PointLight(COLORS.techno, 1.8, 30);
    pointLight1.position.set(-8, 5, 5);
    scene.add(pointLight1);

    const pointLight2 = new THREE.PointLight(COLORS.enviro, 1.2, 30);
    pointLight2.position.set(8, -3, -5);
    scene.add(pointLight2);

    const pointLight3 = new THREE.PointLight(COLORS.socio, 1.0, 30);
    pointLight3.position.set(0, -8, 8);
    scene.add(pointLight3);

    // =============================================
    // 3 TRANSITION PLANES (undulating) with stronger visibility
    // =============================================
    const planeSegments = 32;
    function createTransitionPlane(color, rotation, opacity) {
        const geometry = new THREE.PlaneGeometry(18, 18, planeSegments, planeSegments);
        const material = new THREE.MeshBasicMaterial({
            color: color, transparent: true, opacity: opacity || 0.08,
            side: THREE.DoubleSide, depthWrite: false
        });
        const plane = new THREE.Mesh(geometry, material);
        plane.rotation.set(rotation.x, rotation.y, rotation.z);

        const wireMaterial = new THREE.MeshBasicMaterial({
            color: color, transparent: true, opacity: (opacity || 0.08) * 2.5,
            wireframe: true, depthWrite: false
        });
        const wireframe = new THREE.Mesh(new THREE.PlaneGeometry(18, 18, planeSegments, planeSegments), wireMaterial);
        wireframe.rotation.copy(plane.rotation);

        // Store original positions for undulation
        plane.userData.origPositions = new Float32Array(geometry.attributes.position.array);
        wireframe.userData.origPositions = new Float32Array(wireframe.geometry.attributes.position.array);

        return { plane, wireframe };
    }

    const technoPlane = createTransitionPlane(COLORS.techno, { x: Math.PI * 0.4, y: 0.3, z: 0 });
    scene.add(technoPlane.plane);
    scene.add(technoPlane.wireframe);

    const enviroPlane = createTransitionPlane(COLORS.enviro, { x: 0.2, y: Math.PI * 0.35, z: 0.4 });
    scene.add(enviroPlane.plane);
    scene.add(enviroPlane.wireframe);

    const socioPlane = createTransitionPlane(COLORS.socio, { x: -0.3, y: -0.2, z: Math.PI * 0.3 });
    scene.add(socioPlane.plane);
    scene.add(socioPlane.wireframe);

    const allPlanes = [technoPlane, enviroPlane, socioPlane];

    // =============================================
    // AXIS GUIDE LINES — bold colored lines along each plane's edge
    // =============================================
    const axisKeys = ['techno', 'enviro', 'socio'];
    const planeConfigs = [
        { rotation: { x: Math.PI * 0.4, y: 0.3, z: 0 }, key: 'techno' },
        { rotation: { x: 0.2, y: Math.PI * 0.35, z: 0.4 }, key: 'enviro' },
        { rotation: { x: -0.3, y: -0.2, z: Math.PI * 0.3 }, key: 'socio' }
    ];

    // Create axis cross-lines through center for each plane
    planeConfigs.forEach(cfg => {
        const color = new THREE.Color(COLORS[cfg.key]);
        const lineLen = 10;

        // Two perpendicular lines in the plane
        for (let d = 0; d < 2; d++) {
            const pts = [];
            if (d === 0) {
                pts.push(new THREE.Vector3(-lineLen, 0, 0));
                pts.push(new THREE.Vector3(lineLen, 0, 0));
            } else {
                pts.push(new THREE.Vector3(0, -lineLen, 0));
                pts.push(new THREE.Vector3(0, lineLen, 0));
            }
            const geo = new THREE.BufferGeometry().setFromPoints(pts);
            const mat = new THREE.LineBasicMaterial({
                color: color, transparent: true, opacity: 0.35
            });
            const line = new THREE.Line(geo, mat);
            line.rotation.set(cfg.rotation.x, cfg.rotation.y, cfg.rotation.z);
            scene.add(line);
        }

        // Dashed radial guidelines (4 diagonals)
        for (let a = 0; a < 4; a++) {
            const angle = (a / 4) * Math.PI * 2 + Math.PI / 4;
            const pts = [
                new THREE.Vector3(0, 0, 0),
                new THREE.Vector3(Math.cos(angle) * lineLen, Math.sin(angle) * lineLen, 0)
            ];
            const geo = new THREE.BufferGeometry().setFromPoints(pts);
            const mat = new THREE.LineDashedMaterial({
                color: color, transparent: true, opacity: 0.12,
                dashSize: 0.5, gapSize: 0.5
            });
            const line = new THREE.Line(geo, mat);
            line.computeLineDistances();
            line.rotation.set(cfg.rotation.x, cfg.rotation.y, cfg.rotation.z);
            scene.add(line);
        }
    });

    // =============================================
    // AXIS EDGE LABELS (3D text sprites at plane edges)
    // =============================================
    function createAxisLabel3D(text, color, position) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 512;
        canvas.height = 64;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.font = 'bold 36px Poppins, Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // Glow
        ctx.shadowColor = color;
        ctx.shadowBlur = 16;
        ctx.fillStyle = color;
        ctx.fillText(text, canvas.width / 2, canvas.height / 2);

        // Crisp text on top
        ctx.shadowBlur = 0;
        ctx.fillStyle = color;
        ctx.fillText(text, canvas.width / 2, canvas.height / 2);

        const texture = new THREE.CanvasTexture(canvas);
        texture.minFilter = THREE.LinearFilter;
        const spriteMat = new THREE.SpriteMaterial({
            map: texture,
            transparent: true,
            opacity: 0.85,
            depthWrite: false
        });
        const sprite = new THREE.Sprite(spriteMat);
        sprite.scale.set(5, 0.65, 1);
        sprite.position.set(position.x, position.y, position.z);
        return sprite;
    }

    // Place axis labels at the outer edges of each plane
    // Techno plane: tilted mostly around X, put label at top-edge
    const technoLabel = createAxisLabel3D('TECHNOLOGIQUE', AXIS_HEX.techno, { x: -6, y: 5.5, z: -3.5 });
    scene.add(technoLabel);

    // Enviro plane: tilted mostly around Y, put label at right-edge
    const enviroLabel = createAxisLabel3D('ENVIRONNEMENTALE', AXIS_HEX.enviro, { x: 5.5, y: -3, z: -5 });
    scene.add(enviroLabel);

    // Socio plane: tilted differently, put label at another edge
    const socioLabel = createAxisLabel3D('SOCIOCULTURELLE', AXIS_HEX.socio, { x: -4, y: -4, z: 5.5 });
    scene.add(socioLabel);

    function undulateGeometry(geom, origPositions, time, speed, amplitude, waveLength) {
        const positions = geom.attributes.position.array;
        const count = positions.length / 3;
        for (let i = 0; i < count; i++) {
            const ox = origPositions[i * 3];
            const oy = origPositions[i * 3 + 1];
            positions[i * 3 + 2] = origPositions[i * 3 + 2] +
                Math.sin(ox * waveLength + time * speed) * amplitude +
                Math.cos(oy * waveLength * 0.7 + time * speed * 0.8) * amplitude * 0.6;
        }
        geom.attributes.position.needsUpdate = true;
    }

    // =============================================
    // ENGAGEMENT SPHERES
    // =============================================
    const sphereGroup = new THREE.Group();
    const sphereMeshes = [];
    const glowRings = [];
    const sphereStartPositions = []; // for intro animation

    // =============================================
    // CREATE GLOBE TEXTURE for pillar spheres
    // =============================================
    function createGlobeTexture(hexColor, size) {
        const canvas = document.createElement('canvas');
        canvas.width = size || 512;
        canvas.height = size || 512;
        const ctx = canvas.getContext('2d');
        const w = canvas.width, h = canvas.height;
        const cx = w / 2, cy = h / 2, r = w * 0.48;

        // Parse hex color
        const rr = parseInt(hexColor.slice(1,3), 16);
        const gg = parseInt(hexColor.slice(3,5), 16);
        const bb = parseInt(hexColor.slice(5,7), 16);

        // Base sphere gradient (dark to color)
        const baseGrad = ctx.createRadialGradient(cx * 0.7, cy * 0.65, r * 0.05, cx, cy, r);
        baseGrad.addColorStop(0, `rgba(${Math.min(255, rr + 100)}, ${Math.min(255, gg + 100)}, ${Math.min(255, bb + 100)}, 1)`);
        baseGrad.addColorStop(0.4, `rgba(${rr}, ${gg}, ${bb}, 1)`);
        baseGrad.addColorStop(0.75, `rgba(${Math.floor(rr * 0.5)}, ${Math.floor(gg * 0.5)}, ${Math.floor(bb * 0.5)}, 1)`);
        baseGrad.addColorStop(1, `rgba(${Math.floor(rr * 0.15)}, ${Math.floor(gg * 0.15)}, ${Math.floor(bb * 0.15)}, 1)`);

        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fillStyle = baseGrad;
        ctx.fill();

        // Grid lines (longitude/latitude) for globe effect
        ctx.strokeStyle = `rgba(${Math.min(255, rr + 60)}, ${Math.min(255, gg + 60)}, ${Math.min(255, bb + 60)}, 0.12)`;
        ctx.lineWidth = 1;

        // Latitude lines
        for (let lat = -3; lat <= 3; lat++) {
            const yOffset = lat * (r * 0.22);
            const latR = Math.sqrt(Math.max(0, r * r - yOffset * yOffset));
            if (latR > 0) {
                ctx.beginPath();
                ctx.ellipse(cx, cy + yOffset, latR, latR * 0.15 + 2, 0, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        // Longitude lines
        for (let lng = 0; lng < 6; lng++) {
            const angle = (lng / 6) * Math.PI;
            ctx.beginPath();
            ctx.ellipse(cx, cy, r * Math.cos(angle) * 0.3 + r * 0.05, r, angle * 0.1, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Specular highlight
        const specGrad = ctx.createRadialGradient(cx * 0.65, cy * 0.55, 0, cx * 0.65, cy * 0.55, r * 0.6);
        specGrad.addColorStop(0, 'rgba(255, 255, 255, 0.35)');
        specGrad.addColorStop(0.3, 'rgba(255, 255, 255, 0.08)');
        specGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = specGrad;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();

        // Rim light (edge glow)
        const rimGrad = ctx.createRadialGradient(cx, cy, r * 0.85, cx, cy, r);
        rimGrad.addColorStop(0, 'rgba(0,0,0,0)');
        rimGrad.addColorStop(0.5, `rgba(${rr}, ${gg}, ${bb}, 0.1)`);
        rimGrad.addColorStop(1, `rgba(${Math.min(255, rr + 40)}, ${Math.min(255, gg + 40)}, ${Math.min(255, bb + 40)}, 0.25)`);
        ctx.fillStyle = rimGrad;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();

        return canvas;
    }

    // Pre-create globe textures for each axis
    const globeTextures = {
        techno: new THREE.CanvasTexture(createGlobeTexture(AXIS_HEX.techno)),
        enviro: new THREE.CanvasTexture(createGlobeTexture(AXIS_HEX.enviro)),
        socio:  new THREE.CanvasTexture(createGlobeTexture(AXIS_HEX.socio))
    };

    // =============================================
    // 3 PILLAR GLOBES (Venn diagram nodes)
    // =============================================
    const pillarGlobeSize = 2.8;
    const pillarPositions = {
        techno: { x: -3.5, y: 2.8, z: -1.5 },
        enviro: { x: 3.0,  y: 2.8, z: -1.5 },
        socio:  { x: 0,    y: -3.0, z: 2.0 }
    };

    const pillarGlobes = {};
    ['techno', 'enviro', 'socio'].forEach(axis => {
        const geo = new THREE.SphereGeometry(pillarGlobeSize, 64, 64);
        const mat = new THREE.MeshPhongMaterial({
            map: globeTextures[axis],
            transparent: true,
            opacity: 0.22,
            emissive: new THREE.Color(COLORS[axis]),
            emissiveIntensity: 0.15,
            shininess: 60,
            depthWrite: false
        });
        const globe = new THREE.Mesh(geo, mat);
        const pos = pillarPositions[axis];
        globe.position.set(pos.x, pos.y, pos.z);
        globe.userData = { isPillarGlobe: true, axis: axis };
        sphereGroup.add(globe);
        pillarGlobes[axis] = globe;

        // Wireframe overlay for grid effect
        const wireGeo = new THREE.SphereGeometry(pillarGlobeSize * 1.002, 24, 16);
        const wireMat = new THREE.MeshBasicMaterial({
            color: COLORS[axis],
            wireframe: true,
            transparent: true,
            opacity: 0.06,
            depthWrite: false
        });
        const wire = new THREE.Mesh(wireGeo, wireMat);
        globe.add(wire);

        // Outer glow sprite
        const glowCanvas = document.createElement('canvas');
        glowCanvas.width = 256;
        glowCanvas.height = 256;
        const gctx = glowCanvas.getContext('2d');
        const ghex = AXIS_HEX[axis];
        const ggrad = gctx.createRadialGradient(128, 128, 30, 128, 128, 128);
        ggrad.addColorStop(0, ghex + '25');
        ggrad.addColorStop(0.4, ghex + '12');
        ggrad.addColorStop(0.7, ghex + '06');
        ggrad.addColorStop(1, 'rgba(0,0,0,0)');
        gctx.fillStyle = ggrad;
        gctx.fillRect(0, 0, 256, 256);

        const glowTex = new THREE.CanvasTexture(glowCanvas);
        const glowMat = new THREE.SpriteMaterial({
            map: glowTex, transparent: true, depthWrite: false,
            blending: THREE.AdditiveBlending
        });
        const glowSprite = new THREE.Sprite(glowMat);
        const gs = pillarGlobeSize * 3.5;
        glowSprite.scale.set(gs, gs, 1);
        glowSprite.position.copy(globe.position);
        glowSprite.userData = { isPillarGlow: true, parentGlobe: globe, baseScale: gs };
        sphereGroup.add(glowSprite);
        glowRings.push(glowSprite);
    });

    engagements.forEach((eng, idx) => {
        const axisColors = eng.axes.map(a => new THREE.Color(COLORS[a]));
        const mixedColor = new THREE.Color(0, 0, 0);
        axisColors.forEach(c => mixedColor.add(c));
        mixedColor.multiplyScalar(1 / axisColors.length);

        const sphereColor = mixedColor;

        // Sphere with higher segment count for smoothness
        const geometry = new THREE.SphereGeometry(eng.size, 48, 48);
        const material = new THREE.MeshPhongMaterial({
            color: sphereColor,
            transparent: true,
            opacity: 0.9,
            emissive: sphereColor,
            emissiveIntensity: 0.35,
            shininess: 80
        });
        const sphere = new THREE.Mesh(geometry, material);
        sphere.userData = eng;
        sphere.userData.baseColor = sphereColor.clone();
        sphere.userData.mixedColor = mixedColor.clone();

        // Add a colored ring around spheres to show axis more clearly
        const primaryAxis = eng.axes[0];
        const ringColor = new THREE.Color(COLORS[primaryAxis]);
        const ringGeo = new THREE.RingGeometry(eng.size * 1.15, eng.size * 1.3, 48);
        const ringMat = new THREE.MeshBasicMaterial({
            color: ringColor, transparent: true, opacity: 0.5,
            side: THREE.DoubleSide, depthWrite: false
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.userData = { isAxisRing: true, parentSphere: sphere, axis: primaryAxis };
        sphere.add(ring);

        // Start far away for intro animation
        const angle = (idx / engagements.length) * Math.PI * 2;
        const startDist = 25 + Math.random() * 15;
        sphere.position.set(
            Math.cos(angle) * startDist,
            (Math.random() - 0.5) * startDist,
            Math.sin(angle) * startDist
        );
        sphereStartPositions.push(sphere.position.clone());

        sphereGroup.add(sphere);
        sphereMeshes.push(sphere);

        // Billboard glow ring
        const ringCanvas = document.createElement('canvas');
        ringCanvas.width = 128;
        ringCanvas.height = 128;
        const ctx = ringCanvas.getContext('2d');
        const hexColor = '#' + sphereColor.getHexString();
        const grad = ctx.createRadialGradient(64, 64, 30, 64, 64, 64);
        grad.addColorStop(0, 'rgba(0,0,0,0)');
        grad.addColorStop(0.5, hexColor + '30');
        grad.addColorStop(0.7, hexColor + '18');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 128, 128);

        const spriteTex = new THREE.CanvasTexture(ringCanvas);
        const spriteMat = new THREE.SpriteMaterial({
            map: spriteTex, transparent: true, depthWrite: false,
            blending: THREE.AdditiveBlending
        });
        const sprite = new THREE.Sprite(spriteMat);
        const glowSize = eng.size * 3.5;
        sprite.scale.set(glowSize, glowSize, 1);
        sprite.position.copy(sphere.position);
        sprite.userData = { isGlow: true, parentSphere: sphere, baseScale: glowSize };
        sphereGroup.add(sprite);
        glowRings.push(sprite);
    });

    scene.add(sphereGroup);

    // =============================================
    // CONNECTIONS with flowing particles
    // =============================================
    const connections = [];
    const connectionMeshes = [];
    const connectionCurves = [];
    const flowParticleGroups = [];

    for (let i = 0; i < engagements.length; i++) {
        for (let j = i + 1; j < engagements.length; j++) {
            const shared = engagements[i].axes.filter(a => engagements[j].axes.includes(a));
            if (shared.length > 0) {
                connections.push({ from: engagements[i], to: engagements[j], sharedAxes: shared });
            }
        }
    }

    connections.forEach((conn, ci) => {
        const from = conn.from.position;
        const to = conn.to.position;

        const mid = {
            x: (from.x + to.x) / 2 + (Math.random() - 0.5) * 1.5,
            y: (from.y + to.y) / 2 + (Math.random() - 0.5) * 1.5,
            z: (from.z + to.z) / 2 + (Math.random() - 0.5) * 1.5
        };

        const curve = new THREE.QuadraticBezierCurve3(
            new THREE.Vector3(from.x, from.y, from.z),
            new THREE.Vector3(mid.x, mid.y, mid.z),
            new THREE.Vector3(to.x, to.y, to.z)
        );
        connectionCurves.push(curve);

        const points = curve.getPoints(60);
        const geometry = new THREE.BufferGeometry().setFromPoints(points);

        const axisColor = new THREE.Color(COLORS[conn.sharedAxes[0]]);
        const material = new THREE.LineBasicMaterial({
            color: axisColor, transparent: true, opacity: 0.2
        });

        const line = new THREE.Line(geometry, material);
        line.userData = { connection: conn, baseOpacity: 0.2, color: axisColor };
        connectionMeshes.push(line);
        scene.add(line);

        // Flow particles along connection
        const flowCount = 3 + Math.floor(Math.random() * 3);
        const flowGeo = new THREE.BufferGeometry();
        const flowPositions = new Float32Array(flowCount * 3);
        const flowSizes = new Float32Array(flowCount);
        const flowOffsets = new Float32Array(flowCount);

        for (let f = 0; f < flowCount; f++) {
            flowOffsets[f] = Math.random();
            flowSizes[f] = 0.04 + Math.random() * 0.04;
        }

        flowGeo.setAttribute('position', new THREE.BufferAttribute(flowPositions, 3));
        flowGeo.setAttribute('size', new THREE.BufferAttribute(flowSizes, 1));

        const flowMat = new THREE.PointsMaterial({
            color: axisColor, size: 0.08, transparent: true, opacity: 0.8,
            depthWrite: false, sizeAttenuation: true,
            blending: THREE.AdditiveBlending
        });

        const flowPoints = new THREE.Points(flowGeo, flowMat);
        flowPoints.userData = { curveIndex: ci, offsets: flowOffsets, speed: 0.15 + Math.random() * 0.15 };
        flowParticleGroups.push(flowPoints);
        scene.add(flowPoints);
    });

    // =============================================
    // AMBIENT PARTICLE FIELD
    // =============================================
    const particlesCount = 1500;
    const particlesGeometry = new THREE.BufferGeometry();
    const particlesPositions = new Float32Array(particlesCount * 3);
    const particlesColors = new Float32Array(particlesCount * 3);

    const axisColorsList = [
        new THREE.Color(COLORS.techno),
        new THREE.Color(COLORS.enviro),
        new THREE.Color(COLORS.socio)
    ];

    for (let i = 0; i < particlesCount; i++) {
        particlesPositions[i * 3] = (Math.random() - 0.5) * 30;
        particlesPositions[i * 3 + 1] = (Math.random() - 0.5) * 30;
        particlesPositions[i * 3 + 2] = (Math.random() - 0.5) * 30;
        const col = axisColorsList[Math.floor(Math.random() * 3)];
        particlesColors[i * 3] = col.r;
        particlesColors[i * 3 + 1] = col.g;
        particlesColors[i * 3 + 2] = col.b;
    }

    particlesGeometry.setAttribute('position', new THREE.BufferAttribute(particlesPositions, 3));
    particlesGeometry.setAttribute('color', new THREE.BufferAttribute(particlesColors, 3));

    const particles = new THREE.Points(particlesGeometry, new THREE.PointsMaterial({
        size: 0.03, vertexColors: true, transparent: true, opacity: 0.5,
        depthWrite: false, sizeAttenuation: true
    }));
    scene.add(particles);

    // =============================================
    // LABELS (HTML overlays)
    // =============================================
    const labelsContainer = document.createElement('div');
    labelsContainer.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:80;';
    document.body.appendChild(labelsContainer);

    const labelElements = {};
    engagements.forEach(eng => {
        // Determine the primary axis color for the label
        let labelColor = 'rgba(255,255,255,0.7)';
        if (eng.axes.length === 1) {
            labelColor = AXIS_HEX[eng.axes[0]];
        }

        const label = document.createElement('div');
        label.style.cssText = `
            position: absolute;
            font-family: 'Poppins', sans-serif;
            font-size: ${isMobile ? '10px' : '11px'};
            font-weight: 600;
            color: ${labelColor};
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            transform: translate(-50%, -50%);
            text-shadow: 0 0 10px rgba(10,14,26,1), 0 0 20px rgba(10,14,26,0.8);
            transition: color 0.3s, font-size 0.3s, opacity 0.5s;
            opacity: 0;
        `;
        label.textContent = eng.name;
        labelsContainer.appendChild(label);
        labelElements[eng.id] = label;
    });

    // =============================================
    // CLICK / PANEL INTERACTION
    // =============================================
    container.addEventListener('click', (e) => {
        if (dragMoved) return;
        handleClick();
    });

    function handleClick() {
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(sphereMeshes);

        if (intersects.length > 0) {
            const eng = intersects[0].object.userData;
            const idx = engagements.findIndex(e => e.id === eng.id);
            openPanel(eng, idx);
            selectedObject = intersects[0].object;
            selectedIndex = idx;

            // Smooth camera zoom toward sphere
            const pos = intersects[0].object.position;
            cameraLookTarget.copy(pos).multiplyScalar(0.3);
            zoomTarget = Math.max(6, zoom - 3);
            zoomingToSphere = true;
        } else {
            closePanel();
        }
    }

    function openPanel(eng, idx) {
        const panel = document.getElementById('detail-panel');
        document.getElementById('panel-title').textContent = eng.name;
        document.getElementById('panel-role').textContent = eng.role;
        document.getElementById('panel-desc').textContent = eng.description;
        document.getElementById('panel-counter').textContent = (idx + 1) + ' / ' + engagements.length;

        const axesDiv = document.getElementById('panel-axes');
        axesDiv.innerHTML = '';
        eng.axes.forEach(axis => {
            const tag = document.createElement('span');
            tag.className = 'axis-tag ' + axis;
            tag.textContent = axis === 'techno' ? 'Technologique' : axis === 'enviro' ? 'Environnementale' : 'Socioculturelle';
            axesDiv.appendChild(tag);
        });

        panel.classList.add('open');
        selectedIndex = idx;

        // Highlight connections
        highlightConnections(eng.id);
    }

    function closePanel() {
        document.getElementById('detail-panel').classList.remove('open');
        selectedObject = null;
        selectedIndex = -1;
        zoomingToSphere = false;
        cameraLookTarget.set(0, 0, 0);

        // Restore all connections
        connectionMeshes.forEach(line => { line.userData.highlighted = false; });
        sphereMeshes.forEach(s => { s.userData.dimmed = false; });
    }

    function highlightConnections(engId) {
        const connectedIds = new Set([engId]);
        connectionMeshes.forEach(line => {
            const conn = line.userData.connection;
            if (conn.from.id === engId || conn.to.id === engId) {
                line.userData.highlighted = true;
                connectedIds.add(conn.from.id);
                connectedIds.add(conn.to.id);
            } else {
                line.userData.highlighted = false;
            }
        });
        sphereMeshes.forEach(s => {
            s.userData.dimmed = !connectedIds.has(s.userData.id);
        });
    }

    // Panel navigation
    document.getElementById('close-panel-btn').addEventListener('click', closePanel);
    document.getElementById('panel-prev').addEventListener('click', () => navigatePanel(-1));
    document.getElementById('panel-next').addEventListener('click', () => navigatePanel(1));

    function navigatePanel(dir) {
        if (selectedIndex < 0) return;
        selectedIndex = (selectedIndex + dir + engagements.length) % engagements.length;
        const eng = engagements[selectedIndex];
        selectedObject = sphereMeshes[selectedIndex];
        openPanel(eng, selectedIndex);

        // Move camera to new sphere
        const pos = sphereMeshes[selectedIndex].position;
        cameraLookTarget.copy(pos).multiplyScalar(0.3);
        zoomingToSphere = true;
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') { navigatePanel(1); }
        else if (e.key === 'ArrowLeft') { navigatePanel(-1); }
        else if (e.key === 'Escape') { closePanel(); resetCameraView(); }
    });

    // =============================================
    // INTRO ANIMATION STATE
    // =============================================
    let introProgress = 0;
    const introDuration = 2.0; // seconds
    let introComplete = false;

    // =============================================
    // ANIMATION LOOP
    // =============================================
    const clock = new THREE.Clock();
    let prevHoveredId = null;

    function animate() {
        requestAnimationFrame(animate);
        const elapsed = clock.getElapsedTime();

        // -- Intro animation: spheres fly to positions --
        if (!introComplete) {
            introProgress = Math.min(elapsed / introDuration, 1);
            const ease = 1 - Math.pow(1 - introProgress, 3); // ease-out cubic
            sphereMeshes.forEach((sphere, i) => {
                const eng = sphere.userData;
                const start = sphereStartPositions[i];
                const target = eng.position;
                sphere.position.x = start.x + (target.x - start.x) * ease;
                sphere.position.y = start.y + (target.y - start.y) * ease;
                sphere.position.z = start.z + (target.z - start.z) * ease;
            });
            if (introProgress >= 1) {
                introComplete = true;
                // Fade in labels
                Object.values(labelElements).forEach((l, i) => {
                    setTimeout(() => { l.style.opacity = '1'; }, i * 80);
                });
            }
        }

        // Auto-rotate
        if (autoRotate) {
            rotationTarget.y += 0.0015;
        }

        // Smooth rotation
        currentRotation.x += (rotationTarget.x - currentRotation.x) * 0.05;
        currentRotation.y += (rotationTarget.y - currentRotation.y) * 0.05;

        // Smooth zoom
        zoom += (zoomTarget - zoom) * 0.06;

        // Camera look target smooth
        cameraLookCurrent.lerp(cameraLookTarget, 0.04);

        // Camera orbit
        camera.position.x = Math.sin(currentRotation.y) * Math.cos(currentRotation.x) * zoom;
        camera.position.y = Math.sin(currentRotation.x) * zoom;
        camera.position.z = Math.cos(currentRotation.y) * Math.cos(currentRotation.x) * zoom;
        camera.lookAt(cameraLookCurrent);

        // -- Sphere animations --
        if (introComplete) {
            sphereMeshes.forEach((sphere, i) => {
                const eng = sphere.userData;
                const basePos = eng.position;

                // Pronounced breathing
                const breatheAmp = 0.18;
                const breathe = Math.sin(elapsed * 1.0 + i * 0.8) * breatheAmp;
                const orbit = Math.sin(elapsed * 0.4 + i * 1.5) * 0.2;
                const drift = Math.cos(elapsed * 0.5 + i * 1.1) * 0.15;

                sphere.position.x = basePos.x + orbit;
                sphere.position.y = basePos.y + breathe;
                sphere.position.z = basePos.z + drift;

                // Scale pulse (breathing effect)
                const breathScale = 1.0 + Math.sin(elapsed * 1.2 + i * 0.9) * 0.06;
                const isHovered = hoveredObject === sphere;
                const isDimmed = eng.dimmed;
                let targetScale = breathScale;
                if (isHovered) targetScale = 1.35;
                if (isDimmed) targetScale = 0.85;
                sphere.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.1);

                // Emissive pulse
                sphere.material.emissiveIntensity = 0.35 + Math.sin(elapsed * 1.8 + i) * 0.2;

                // Dimming
                const targetOpacity = isDimmed ? 0.3 : 0.9;
                sphere.material.opacity += (targetOpacity - sphere.material.opacity) * 0.08;
            });

            // Animate pillar globes (slow rotation + breathing)
            ['techno', 'enviro', 'socio'].forEach((axis, pi) => {
                const globe = pillarGlobes[axis];
                globe.rotation.y = elapsed * 0.08 + pi * 2.1;
                const pulse = 1.0 + Math.sin(elapsed * 0.5 + pi * 1.5) * 0.03;
                globe.scale.set(pulse, pulse, pulse);
                globe.material.opacity = 0.22 + Math.sin(elapsed * 0.7 + pi) * 0.04;
            });
        }

        // -- Glow rings follow spheres (billboard via Sprite) --
        glowRings.forEach(sprite => {
            if (sprite.userData.isPillarGlow) {
                // Pillar globe glow follows its globe
                const parent = sprite.userData.parentGlobe;
                sprite.position.copy(parent.position);
                const pulse = 1.0 + Math.sin(elapsed * 0.8) * 0.05;
                const base = sprite.userData.baseScale;
                sprite.scale.set(base * pulse, base * pulse, 1);
            } else {
                const parent = sprite.userData.parentSphere;
                sprite.position.copy(parent.position);
                // Pulse glow scale
                const pulse = 1.0 + Math.sin(elapsed * 1.5 + parent.userData.size * 10) * 0.08;
                const base = sprite.userData.baseScale;
                sprite.scale.set(base * pulse, base * pulse, 1);

                // Dim if parent is dimmed
                if (parent.userData.dimmed) {
                    sprite.material.opacity = Math.max(0.05, sprite.material.opacity - 0.02);
                } else {
                    sprite.material.opacity = Math.min(1, sprite.material.opacity + 0.02);
                }
            }
        });

        // -- Plane undulation --
        allPlanes.forEach((p, pi) => {
            const speed = 0.5 + pi * 0.15;
            const amp = 0.25 + pi * 0.05;
            const wl = 0.4 + pi * 0.1;
            undulateGeometry(p.plane.geometry, p.plane.userData.origPositions, elapsed, speed, amp, wl);
            undulateGeometry(p.wireframe.geometry, p.wireframe.userData.origPositions, elapsed, speed, amp, wl);
        });

        // Slight plane rotation drift
        technoPlane.plane.rotation.z = Math.sin(elapsed * 0.15) * 0.1;
        enviroPlane.plane.rotation.z = Math.cos(elapsed * 0.12) * 0.1;
        socioPlane.plane.rotation.x += Math.sin(elapsed * 0.18) * 0.0003;
        technoPlane.wireframe.rotation.copy(technoPlane.plane.rotation);
        enviroPlane.wireframe.rotation.copy(enviroPlane.plane.rotation);
        socioPlane.wireframe.rotation.copy(socioPlane.plane.rotation);

        // -- Connection animations --
        connectionMeshes.forEach((line, i) => {
            const data = line.userData;
            if (selectedObject) {
                const targetOp = data.highlighted ? 0.8 : 0.04;
                line.material.opacity += (targetOp - line.material.opacity) * 0.1;
            } else {
                // Pulse along constellation lines
                const basePulse = 0.15 + Math.sin(elapsed * 0.8 + i * 0.6) * 0.1;
                line.material.opacity += (basePulse - line.material.opacity) * 0.1;
            }
        });

        // -- Flow particles along connections --
        flowParticleGroups.forEach(fp => {
            const curve = connectionCurves[fp.userData.curveIndex];
            const positions = fp.geometry.attributes.position.array;
            const offsets = fp.userData.offsets;
            const speed = fp.userData.speed;

            for (let f = 0; f < offsets.length; f++) {
                offsets[f] = (offsets[f] + speed * 0.005) % 1;
                const pt = curve.getPoint(offsets[f]);
                positions[f * 3] = pt.x;
                positions[f * 3 + 1] = pt.y;
                positions[f * 3 + 2] = pt.z;
            }
            fp.geometry.attributes.position.needsUpdate = true;

            // Dim flow particles when connection is dimmed
            if (selectedObject) {
                const conn = connectionMeshes[fp.userData.curveIndex];
                fp.material.opacity = conn.userData.highlighted ? 0.9 : 0.05;
            } else {
                fp.material.opacity = 0.6;
            }
        });

        // -- Ambient particles drift --
        particles.rotation.y = elapsed * 0.02;
        particles.rotation.x = Math.sin(elapsed * 0.01) * 0.1;

        // -- Labels --
        engagements.forEach((eng, idx) => {
            const sphere = sphereMeshes[idx];
            const vector = sphere.position.clone().project(camera);
            const label = labelElements[eng.id];
            if (vector.z < 1) {
                const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                const y = (-vector.y * 0.5 + 0.5) * window.innerHeight;
                label.style.left = x + 'px';
                label.style.top = (y - sphere.userData.size * 40 - 15) + 'px';
                label.style.display = 'block';
                // Dim label if sphere is dimmed
                if (introComplete) {
                    if (eng.dimmed) {
                        label.style.color = 'rgba(255,255,255,0.15)';
                    } else if (hoveredObject === sphere) {
                        label.style.color = '#ffffff';
                        label.style.fontSize = '13px';
                    } else {
                        // Use axis color for single-axis spheres, white for multi
                        if (eng.axes.length === 1) {
                            label.style.color = AXIS_HEX[eng.axes[0]];
                        } else {
                            label.style.color = 'rgba(255,255,255,0.7)';
                        }
                        label.style.fontSize = isMobile ? '10px' : '11px';
                    }
                }
            } else {
                label.style.display = 'none';
            }
        });

        // -- Raycaster hover detection --
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(sphereMeshes);

        if (intersects.length > 0) {
            const hitObj = intersects[0].object;
            if (hoveredObject !== hitObj) {
                hoveredObject = hitObj;
                container.style.cursor = 'pointer';

                // Hover highlight connections if no panel is open
                if (!selectedObject) {
                    highlightConnections(hitObj.userData.id);
                }
            }
        } else {
            if (hoveredObject) {
                hoveredObject = null;
                container.style.cursor = 'default';
                // Un-highlight if no panel
                if (!selectedObject) {
                    connectionMeshes.forEach(l => { l.userData.highlighted = false; });
                    sphereMeshes.forEach(s => { s.userData.dimmed = false; });
                }
            }
        }

        renderer.render(scene, camera);
    }

    animate();

    // =============================================
    // RESIZE
    // =============================================
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Auto-rotate resume timer
    let autoRotateTimer;
    function resetAutoRotateTimer() {
        clearTimeout(autoRotateTimer);
        autoRotateTimer = setTimeout(() => {
            if (!selectedObject) autoRotate = true;
        }, 6000);
    }
    </script>
</body>
</html>
