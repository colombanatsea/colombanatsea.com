<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proto 2 — Matrice Triple Transition Maritime</title>
<link rel="preload" href="https://unpkg.com/three@0.152.0/build/three.module.js" as="script" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0e1a;
  color:#fff;
  font-family:'Poppins',sans-serif;
  overflow:auto;
  height:400vh;
  touch-action:none;
}
canvas{display:block;position:fixed;top:0;left:0;z-index:1}

/* ── UI Overlay ── */
.ui{position:fixed;z-index:10;pointer-events:none}
.ui *{pointer-events:auto}

/* Header */
.header{
  top:0;left:0;right:0;
  text-align:center;
  padding:28px 20px 0;
}
.header h1{
  font-size:clamp(1.1rem,2.5vw,1.6rem);
  font-weight:600;
  letter-spacing:.04em;
  text-transform:uppercase;
  color:#ffffffdd;
}
.header p{
  font-family:'Source Serif 4',serif;
  font-style:italic;
  font-size:clamp(.8rem,1.5vw,1rem);
  color:#ffffff77;
  margin-top:4px;
}

/* Legend */
.legend{
  bottom:28px;left:28px;
  display:flex;flex-direction:column;gap:8px;
  background:rgba(10,14,26,.7);
  backdrop-filter:blur(8px);
  padding:14px 18px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.08);
  font-size:.75rem;
}
.legend-item{display:flex;align-items:center;gap:8px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* Detail Panel */
.detail-panel{
  position:fixed;
  right:-420px;
  top:50%;
  transform:translateY(-50%);
  width:380px;
  max-height:80vh;
  overflow-y:auto;
  background:rgba(10,14,26,.95);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.1);
  border-radius:16px;
  padding:32px;
  z-index:200;
  transition:right .45s cubic-bezier(.22,1,.36,1);
}
.detail-panel.open{right:24px}
.detail-panel .close-btn{
  position:absolute;top:12px;right:14px;
  background:none;border:none;color:#fff9;font-size:1.3rem;cursor:pointer;
}
.detail-panel .close-btn:hover{color:#fff}
.detail-panel h2{font-size:1.2rem;margin-bottom:6px}
.detail-panel .role{
  font-family:'Source Serif 4',serif;
  font-style:italic;color:#ffffffaa;
  font-size:.9rem;margin-bottom:14px;
}
.detail-panel .axes-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.detail-panel .axes-tags span{
  font-size:.7rem;
  padding:3px 10px;
  border-radius:20px;
  border:1px solid;
  color:inherit;
}
.detail-panel .desc{
  font-size:.85rem;
  line-height:1.6;
  color:#ffffffcc;
}

/* Sphere Labels (CSS overlay) */
.label{
  position:absolute;
  font-size:.65rem;
  color:#ffffffaa;
  white-space:nowrap;
  pointer-events:none;
  text-shadow:0 0 6px #0a0e1a,0 0 12px #0a0e1a;
  transition:opacity .3s;
  transform:translate(-50%,12px);
  font-weight:400;
  letter-spacing:.02em;
}

#label-container{
  position:fixed;top:0;left:0;
  width:100%;height:100%;
  z-index:5;pointer-events:none;
  overflow:hidden;
}

/* Tooltip on hover */
.tooltip{
  position:fixed;
  padding:6px 14px;
  background:rgba(10,14,26,.9);
  border:1px solid rgba(255,255,255,.15);
  border-radius:8px;
  font-size:.75rem;
  color:#fffc;
  pointer-events:none;
  z-index:300;
  opacity:0;
  transition:opacity .2s;
  white-space:nowrap;
}
.tooltip.show{opacity:1}

/* Loading */
#loader{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:999;background:#0a0e1a;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .8s;
}
#loader span{
  font-size:.9rem;color:#ffffff55;
  animation:pulse-text 1.5s infinite;
}
@keyframes pulse-text{0%,100%{opacity:.4}50%{opacity:1}}
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.152.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.152.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="loader"><span>Chargement de la matrice...</span></div>

<div class="ui header">
  <h1>Construire le monde maritime de demain</h1>
  <p>Des engagements au service d'une cause unique</p>
</div>

<div class="ui legend">
  <div class="legend-item"><div class="legend-dot" style="background:#2a55b3"></div>Technologique</div>
  <div class="legend-item"><div class="legend-dot" style="background:#00bf63"></div>Environnementale</div>
  <div class="legend-item"><div class="legend-dot" style="background:#b32a55"></div>Socioculturelle</div>
  <div class="legend-item"><div class="legend-dot" style="background:linear-gradient(135deg,#b32a55,#00bf63)"></div>Socio + Enviro</div>
</div>

<div id="label-container"></div>

<div class="detail-panel" id="detail-panel">
  <button class="close-btn" id="close-panel">&times;</button>
  <h2 id="panel-name"></h2>
  <div class="role" id="panel-role"></div>
  <div class="axes-tags" id="panel-axes"></div>
  <div class="desc" id="panel-desc"></div>
</div>

<div class="tooltip" id="tooltip"></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── CONSTANTS ───
const BG = 0x0a0e1a;
const COLORS = {
  techno: 0x2a55b3,
  enviro: 0x00bf63,
  socio:  0xb32a55,
  purple: 0x8b2fc6,
  teal:   0x00d4d4,
};
const AXIS_HEX = {
  Technologique:     '#2a55b3',
  Environnementale:  '#00bf63',
  Socioculturelle:   '#b32a55',
};

// ─── DATA ───
const engagements = [
  { id:0,  name:'Opsealog',              role:'Conception initiale, maritime data analytics',
    axes:['Technologique','Environnementale'], size:1.1,
    pos:[3, 2.5, 1.5],
    desc:'Plateforme de data analytics pour optimiser la performance et la consommation \u00e9nerg\u00e9tique des navires.' },
  { id:1,  name:'Fondation ENSM',        role:'Pr\u00e9sident du conseil, rayonnement de l\'ENSM',
    axes:['Socioculturelle','Environnementale'], size:0.9,
    pos:[-2, -2.5, 2],
    desc:'Pr\u00e9sidence de la Fondation de l\'\u00c9cole Nationale Sup\u00e9rieure Maritime, qui forme les futurs officiers et ing\u00e9nieurs maritimes.' },
  { id:2,  name:'ENSM',                  role:'Enseignant d\u00e9veloppement durable',
    axes:['Environnementale'], size:0.8,
    pos:[1, 3, 2.5],
    desc:'Enseignement du d\u00e9veloppement durable et de la transition \u00e9cologique au sein de l\'ENSM.' },
  { id:3,  name:'Propeller Club',        role:'Membre actif, networking maritime',
    axes:['Socioculturelle'], size:0.7,
    pos:[-3, -1, -2],
    desc:'R\u00e9seau international de professionnels du secteur maritime et portuaire.' },
  { id:4,  name:'HYDROS Alumni',         role:'Membre du bureau, R\u00e9seau Alumni',
    axes:['Socioculturelle'], size:0.65,
    pos:[-1.5, -3, 1],
    desc:'Animation du r\u00e9seau des \u00e9l\u00e8ves et anciens \u00e9l\u00e8ves de l\'ENSM.' },
  { id:5,  name:'VAIATA Dynamics',       role:'Cofondateur, Intelligence artificielle',
    axes:['Technologique'], size:1.0,
    pos:[4, -1, 1.5],
    desc:'D\u00e9veloppement de l\'IA au service des grandes causes du maritime (sauvegarde de la vie humaine en mer, intelligence sectorielle, cybers\u00e9curit\u00e9).' },
  { id:6,  name:'GASPE',                 role:'D\u00e9l\u00e9gu\u00e9 g\u00e9n\u00e9ral, service public maritime',
    axes:['Socioculturelle'], size:0.85,
    pos:[-2.5, 1.5, -2.5],
    desc:'Groupement des Armateurs de Service Public Maritime et de Passages d\'Eau, d\u00e9fense du service public maritime.' },
  { id:7,  name:'Ap\u00e9ritifs de la Mer',   role:'Ambassadeur, \u00e9v\u00e8nementiel',
    axes:['Socioculturelle'], size:0.75,
    pos:[-1, -1, -3.5],
    desc:'\u00c9v\u00e8nements de networking informels r\u00e9unissant les acteurs de l\'\u00e9conomie maritime.' },
  { id:8,  name:'Acad\u00e9mie de Marine',    role:'Auditeur',
    axes:['Socioculturelle'], size:0.8,
    pos:[-4, 2, 0.5],
    desc:'Institution s\u00e9culaire de r\u00e9flexion et de prospective sur les enjeux maritimes.' },
  { id:9,  name:'Conf\u00e9rences',           role:'Intervenant, sensibilisation maritime',
    axes:['Environnementale'], size:0.7,
    pos:[2, 3.5, -1],
    desc:'Interventions et conf\u00e9rences sur les transitions du monde maritime.' },
  { id:10, name:'F\u00e9d\u00e9ration Nationale du M\u00e9rite Maritime', role:'Membre, reconnaissance maritime',
    axes:['Socioculturelle'], size:0.75,
    pos:[-3.5, -2.5, -1],
    desc:'F\u00e9d\u00e9ration valorisant les m\u00e9rites et contributions au monde maritime.' },
  { id:11, name:'Aventure entrepreneuriale', role:'Cofondateur, aventures entrepreneuriales',
    axes:['Technologique'], size:0.55, ghosted:true,
    pos:[1.5, -0.5, -2],
    desc:'Cr\u00e9ation d\'entreprises dans le secteur maritime, de la sant\u00e9 et de l\'achat responsable.' },
  { id:12, name:'Aventure entrepreneuriale', role:'Cofondateur, aventures entrepreneuriales',
    axes:['Technologique'], size:0.55, ghosted:true,
    pos:[-0.5, -2.5, -2.5],
    desc:'Cr\u00e9ation d\'entreprises dans le secteur maritime, de la sant\u00e9 et de l\'achat responsable.' },
  { id:13, name:'Aventure entrepreneuriale', role:'Cofondateur, aventures entrepreneuriales',
    axes:['Technologique'], size:0.55, ghosted:true,
    pos:[-1, -3.5, -3.5],
    desc:'Cr\u00e9ation d\'entreprises dans le secteur maritime, de la sant\u00e9 et de l\'achat responsable.' },
];

// ─── CONNECTIONS ───
const connections = [
  [6, 8],   // GASPE <-> Académie de Marine
  [9, 2],   // Conférences <-> ENSM
  [9, 3],   // Conférences <-> Propeller Club
  [9, 0],   // Conférences <-> Opsealog
  [9, 5],   // Conférences <-> VAIATA
  [7, 4],   // Apéritifs <-> HYDROS Alumni
  [7, 2],   // Apéritifs <-> ENSM
  [7, 0],   // Apéritifs <-> Opsealog
  [5, 6],   // VAIATA <-> GASPE
  [5, 8],   // VAIATA <-> Académie de Marine
  [10, 4],  // Fédération <-> HYDROS Alumni
  [10, 1],  // Fédération <-> Fondation ENSM
  [10, 6],  // Fédération <-> GASPE
  [10, 7],  // Fédération <-> Apéritifs
  [11, 7],  // Aventure 1 <-> Apéritifs
  [11, 0],  // Aventure 1 <-> Opsealog
  [12, 4],  // Aventure 2 <-> HYDROS Alumni
  [12, 7],  // Aventure 2 <-> Apéritifs
  [13, 12], // Aventure 3 <-> Aventure 2
];

// ─── RENDERER ───
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: 'high-performance' });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setClearColor(BG, 1);
renderer.useLegacyLights = true;
renderer.toneMapping = THREE.NoToneMapping;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ─── SCENE ───
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(BG, 0.025);

// ─── CAMERA ───
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(8, 6, 10);
camera.lookAt(0, 0, 0);

// ─── CONTROLS ───
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.4;
controls.minDistance = 5;
controls.maxDistance = 25;
controls.enablePan = false;

let interactionTimer = null;
function pauseAutoRotate() {
  controls.autoRotate = false;
  clearTimeout(interactionTimer);
  interactionTimer = setTimeout(() => { controls.autoRotate = true; }, 3000);
}
controls.addEventListener('start', pauseAutoRotate);

// ─── LIGHTS ───
scene.add(new THREE.AmbientLight(0xffffff, 0.4));

const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
dirLight.position.set(5, 5, 5);
scene.add(dirLight);

const pointLight = new THREE.PointLight(COLORS.teal, 0.3, 30);
scene.add(pointLight);

// ─── AXIS PLANES ───
function createAxisPlane(color, rotation) {
  const geo = new THREE.PlaneGeometry(14, 14);
  const mat = new THREE.MeshBasicMaterial({
    color, transparent: true, opacity: 0.06,
    side: THREE.DoubleSide, depthWrite: false,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.set(...rotation);
  scene.add(mesh);
}
createAxisPlane(COLORS.techno, [0, 0, 0]);
createAxisPlane(COLORS.enviro, [Math.PI / 2, 0, 0]);
createAxisPlane(COLORS.socio,  [0, Math.PI / 2, 0]);

// ─── HELPER: primary color for engagement ───
function primaryColor(eng) {
  const axes = eng.axes;
  if (axes.includes('Socioculturelle') && axes.includes('Environnementale')) return COLORS.purple;
  if (axes.includes('Technologique') && axes.includes('Environnementale')) return 0x1590a0;
  if (axes.includes('Technologique')) return COLORS.techno;
  if (axes.includes('Environnementale')) return COLORS.enviro;
  return COLORS.socio;
}

// ─── SHARED GEOMETRIES (perf) ───
const sphereGeoCache = {};
function getSphereGeo(radius, detail) {
  const key = `${radius.toFixed(3)}_${detail}`;
  if (!sphereGeoCache[key]) sphereGeoCache[key] = new THREE.SphereGeometry(radius, detail, detail);
  return sphereGeoCache[key];
}

// ─── SPHERE CREATION ───
const sphereGroup = new THREE.Group();
scene.add(sphereGroup);

const sphereMeshes = [];
const sphereData = [];
const labelEls = [];
const labelContainer = document.getElementById('label-container');

engagements.forEach((eng) => {
  const radius = eng.size * 0.42;
  const color = primaryColor(eng);
  const isGhosted = eng.ghosted === true;
  const baseOpacity = isGhosted ? 0.10 : 0.35;
  const coreOpacity = isGhosted ? 0.25 : 0.8;

  // Outer glass sphere
  const geo = getSphereGeo(radius, 24);
  const mat = new THREE.MeshPhongMaterial({
    color, transparent: true, opacity: baseOpacity,
    shininess: 120, specular: 0x444444, depthWrite: false,
  });
  const mesh = new THREE.Mesh(geo, mat);

  // Inner solid core
  const coreGeo = getSphereGeo(radius * 0.45, 12);
  const coreMat = new THREE.MeshPhongMaterial({
    color, emissive: color, emissiveIntensity: isGhosted ? 0.1 : 0.25,
    transparent: true, opacity: coreOpacity,
  });
  const core = new THREE.Mesh(coreGeo, coreMat);
  mesh.add(core);

  // Glow ring
  const ringGeo = new THREE.RingGeometry(radius * 1.1, radius * 1.35, 24);
  const ringMat = new THREE.MeshBasicMaterial({
    color, transparent: true, opacity: 0.0,
    side: THREE.DoubleSide, depthWrite: false,
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.lookAt(camera.position);
  mesh.add(ring);

  // Start scattered for intro animation
  const target = new THREE.Vector3(...eng.pos);
  mesh.position.set(
    (Math.random() - 0.5) * 40,
    (Math.random() - 0.5) * 40,
    (Math.random() - 0.5) * 40
  );
  mesh.userData = { target, eng, radius, ring, core, originalOpacity: baseOpacity };

  sphereGroup.add(mesh);
  sphereMeshes.push(mesh);
  sphereData.push(eng);

  // CSS label
  const lbl = document.createElement('div');
  lbl.className = 'label';
  lbl.textContent = eng.name;
  if (isGhosted) lbl.style.opacity = '0.35';
  labelContainer.appendChild(lbl);
  labelEls.push(lbl);
});

// ─── CONNECTION LINES ───
const lineMeshes = [];
connections.forEach(([idA, idB]) => {
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(6);
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const isGhostedLink = (engagements[idA].ghosted || engagements[idB].ghosted);
  const mat = new THREE.LineBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: isGhostedLink ? 0.06 : 0.12,
    depthWrite: false,
  });
  const line = new THREE.Line(geo, mat);
  line.userData = { idA, idB };
  sphereGroup.add(line);
  lineMeshes.push(line);
});

// ─── BACKGROUND DUST PARTICLES ───
const dustCount = 300;
const dustGeo = new THREE.BufferGeometry();
const dustPos = new Float32Array(dustCount * 3);
for (let i = 0; i < dustCount; i++) {
  dustPos[i * 3]     = (Math.random() - 0.5) * 30;
  dustPos[i * 3 + 1] = (Math.random() - 0.5) * 30;
  dustPos[i * 3 + 2] = (Math.random() - 0.5) * 30;
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
const dustMat = new THREE.PointsMaterial({
  color: 0xffffff, size: 0.03, transparent: true,
  opacity: 0.2, sizeAttenuation: true, depthWrite: false,
});
scene.add(new THREE.Points(dustGeo, dustMat));

// ─── RAYCASTER (hover & click) ───
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2(-999, -999);
let hoveredSphere = null;
const tooltip = document.getElementById('tooltip');

renderer.domElement.addEventListener('pointermove', (e) => {
  pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top = (e.clientY - 10) + 'px';
});

renderer.domElement.addEventListener('click', () => {
  if (hoveredSphere) {
    openPanel(hoveredSphere.userData.eng);
    pauseAutoRotate();
  }
});

// ─── DETAIL PANEL ───
const panel = document.getElementById('detail-panel');
document.getElementById('close-panel').addEventListener('click', closePanel);

function openPanel(eng) {
  document.getElementById('panel-name').textContent = eng.name;
  document.getElementById('panel-role').textContent = eng.role;
  const axesContainer = document.getElementById('panel-axes');
  axesContainer.innerHTML = '';
  eng.axes.forEach(a => {
    const tag = document.createElement('span');
    tag.textContent = a;
    tag.style.borderColor = AXIS_HEX[a];
    tag.style.color = AXIS_HEX[a];
    axesContainer.appendChild(tag);
  });
  document.getElementById('panel-desc').textContent = eng.desc;
  panel.classList.add('open');
}

function closePanel() {
  panel.classList.remove('open');
}

renderer.domElement.addEventListener('click', () => {
  if (!hoveredSphere && panel.classList.contains('open')) closePanel();
});

// ─── RESIZE ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── SCROLL ROTATION ───
let scrollRotation = 0;
window.addEventListener('scroll', () => {
  scrollRotation = window.scrollY * 0.002;
}, { passive: true });

// ─── INTRO ANIMATION STATE ───
let introProgress = 0;
const introDuration = 2.0;
const startTime = performance.now();
let introComplete = false;

// ─── ANIMATION LOOP ───
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  // Intro fly-in
  if (!introComplete) {
    introProgress = Math.min((performance.now() - startTime) / (introDuration * 1000), 1);
    const ease = 1 - Math.pow(1 - introProgress, 3);
    sphereMeshes.forEach(mesh => {
      mesh.position.lerpVectors(mesh.position, mesh.userData.target, ease * 0.08 + 0.02);
    });
    if (introProgress >= 1) {
      introComplete = true;
      sphereMeshes.forEach(mesh => mesh.position.copy(mesh.userData.target));
      const loader = document.getElementById('loader');
      loader.style.opacity = '0';
      setTimeout(() => loader.style.display = 'none', 800);
    }
  }

  // Breathing animation
  sphereMeshes.forEach((mesh, i) => {
    const breath = 1 + Math.sin(elapsed * 1.2 + i * 0.7) * 0.04;
    mesh.scale.setScalar(breath);
    mesh.userData.ring.quaternion.copy(camera.quaternion);
  });

  // Update connection line positions
  lineMeshes.forEach(line => {
    const posA = sphereMeshes[line.userData.idA].position;
    const posB = sphereMeshes[line.userData.idB].position;
    const attr = line.geometry.attributes.position;
    attr.array[0] = posA.x; attr.array[1] = posA.y; attr.array[2] = posA.z;
    attr.array[3] = posB.x; attr.array[4] = posB.y; attr.array[5] = posB.z;
    attr.needsUpdate = true;
  });

  // Raycasting for hover
  raycaster.setFromCamera(pointer, camera);
  const intersects = raycaster.intersectObjects(sphereMeshes, false);

  if (hoveredSphere) {
    const ud = hoveredSphere.userData;
    hoveredSphere.material.opacity = ud.originalOpacity;
    ud.ring.material.opacity = 0;
    hoveredSphere.scale.setScalar(1);
    hoveredSphere = null;
    tooltip.classList.remove('show');
    document.body.style.cursor = 'default';
  }

  if (intersects.length > 0) {
    hoveredSphere = intersects[0].object;
    const ud = hoveredSphere.userData;
    hoveredSphere.material.opacity = Math.min(ud.originalOpacity + 0.25, 0.6);
    ud.ring.material.opacity = 0.15;
    tooltip.textContent = ud.eng.name;
    tooltip.classList.add('show');
    document.body.style.cursor = 'pointer';
  }

  // Update CSS labels
  sphereMeshes.forEach((mesh, i) => {
    const v = mesh.position.clone().project(camera);
    const x = (v.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-v.y * 0.5 + 0.5) * window.innerHeight;
    const lbl = labelEls[i];
    if (v.z > 1) {
      lbl.style.opacity = '0';
    } else {
      lbl.style.opacity = engagements[i].ghosted ? '0.35' : '0.7';
      lbl.style.left = x + 'px';
      lbl.style.top = y + 'px';
    }
  });

  sphereGroup.rotation.y = scrollRotation;

  controls.update();
  renderer.render(scene, camera);
}

// ─── KICK OFF ───
setTimeout(() => {
  const loader = document.getElementById('loader');
  if (loader.style.opacity !== '0') {
    loader.style.opacity = '0';
    setTimeout(() => loader.style.display = 'none', 800);
  }
}, 4000);

animate();
</script>
</body>
