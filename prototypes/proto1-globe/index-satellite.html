<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZEE de France — Globe Interactif (Satellite) | Colomban at Sea</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0e1a;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      width: 100vw;
    }

    #globe-container {
      width: 100%;
      height: 100vh;
      position: relative;
      overflow: hidden;
      cursor: grab;
    }

    #globe-container:active {
      cursor: grabbing;
    }

    canvas {
      display: block;
    }

    /* Header overlay */
    #header-overlay {
      position: absolute;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
      pointer-events: none;
      width: 90%;
      max-width: 720px;
    }

    /* Total counter bottom right */
    #total-counter {
      position: absolute;
      bottom: 32px;
      right: 36px;
      z-index: 10;
      pointer-events: none;
      text-align: right;
    }

    #total-counter .label {
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    #total-counter .value {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      color: #00d4d4;
      text-shadow: 0 0 30px rgba(0, 212, 212, 0.4);
      line-height: 1.1;
    }

    #total-counter .unit {
      font-family: 'Source Serif 4', serif;
      font-weight: 400;
      font-style: italic;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }

    /* Tooltip */
    #tooltip {
      position: absolute;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      background: rgba(10, 14, 30, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 200, 200, 0.35);
      border-radius: 10px;
      padding: 14px 20px;
      min-width: 180px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px rgba(0,180,180,0.1);
    }

    #tooltip.visible {
      opacity: 1;
    }

    #tooltip .zone-name {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      color: #fff;
      margin-bottom: 4px;
    }

    #tooltip .zone-area {
      font-family: 'Source Serif 4', serif;
      font-style: italic;
      font-size: 0.85rem;
      color: #00d4d4;
    }

    #tooltip .zone-detail {
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
    }

    /* Legend bottom left */
    #legend {
      position: absolute;
      bottom: 32px;
      left: 36px;
      z-index: 10;
      pointer-events: auto;
    }

    #legend .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      user-select: none;
      transition: opacity 0.25s ease;
    }

    #legend .legend-item:hover {
      opacity: 0.85;
    }

    #legend .legend-item.disabled {
      opacity: 0.35;
    }

    #legend .legend-item.disabled .legend-label {
      text-decoration: line-through;
    }

    #legend .swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    #legend .swatch.zee {
      border: 1px solid rgba(0,200,200,0.5);
      background: rgba(0, 180, 180, 0.35);
    }

    #legend .swatch.cables {
      border: 1px solid rgba(0, 180, 180, 0.5);
      background: rgba(0, 180, 180, 0.30);
    }

    #legend .swatch.traffic {
      border: 1px solid rgba(255, 100, 50, 0.5);
      background: rgba(255, 100, 50, 0.30);
    }

    #legend .legend-label {
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.5);
    }

    /* Loading screen */
    #loading {
      position: absolute;
      inset: 0;
      z-index: 999;
      background: #0a0e1a;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      transition: opacity 0.8s ease;
    }

    #loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #loading .spinner {
      width: 40px;
      height: 40px;
      border: 2px solid rgba(0,212,212,0.15);
      border-top-color: #00d4d4;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    #loading .load-text {
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="globe-container">
    <div id="header-overlay"></div>

    <div id="total-counter">
      <div class="label">Surface totale ZEE</div>
      <div class="value">11 691 000</div>
      <div class="unit">km&#178;</div>
    </div>

    <div id="legend">
      <div class="legend-item" data-layer="zee">
        <div class="swatch zee"></div>
        <span class="legend-label">Zone &Eacute;conomique Exclusive fran&ccedil;aise</span>
      </div>
      <div class="legend-item" data-layer="cables">
        <div class="swatch cables"></div>
        <span class="legend-label">C&acirc;bles sous-marins (Telegeography)</span>
      </div>
      <div class="legend-item" data-layer="traffic">
        <div class="swatch traffic"></div>
        <span class="legend-label">Densit&eacute; du trafic maritime</span>
      </div>
    </div>

    <div id="tooltip">
      <div class="zone-name"></div>
      <div class="zone-area"></div>
      <div class="zone-detail"></div>
    </div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <div class="load-text">Chargement du globe...</div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ====================================================
    // CONFIG
    // ====================================================
    const GLOBE_RADIUS = 1.0;
    const ZEE_HEIGHT = 1.003;
    const AUTO_ROTATE_SPEED = 0.08;

    // ====================================================
    // SCENE SETUP
    // ====================================================
    const container = document.getElementById('globe-container');
    const tooltip = document.getElementById('tooltip');
    const tooltipName = tooltip.querySelector('.zone-name');
    const tooltipArea = tooltip.querySelector('.zone-area');
    const tooltipDetail = tooltip.querySelector('.zone-detail');

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      45,
      container.clientWidth / container.clientHeight,
      0.01,
      100
    );
    camera.position.set(0, 0.4, 2.8);

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: false,
      powerPreference: 'high-performance'
    });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x0a0e1a, 1);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    // ====================================================
    // CONTROLS
    // ====================================================
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.rotateSpeed = 0.5;
    controls.enableZoom = false;
    controls.minDistance = 1.5;
    controls.maxDistance = 5;
    controls.enablePan = false;
    controls.autoRotate = true;
    controls.autoRotateSpeed = AUTO_ROTATE_SPEED;

    // ====================================================
    // LIGHTING
    // ====================================================
    const ambientLight = new THREE.AmbientLight(0x666666, 1.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 3, 5);
    scene.add(dirLight);

    const backLight = new THREE.DirectionalLight(0x334455, 0.4);
    backLight.position.set(-3, -2, -5);
    scene.add(backLight);

    // ====================================================
    // GLOBE -- satellite textured sphere
    // ====================================================
    const textureLoader = new THREE.TextureLoader();

    const EARTH_TEXTURE_URL = 'https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg';
    const EARTH_BUMP_URL = 'https://unpkg.com/three-globe/example/img/earth-topology.png';

    let globeReady = false;

    const globeGeometry = new THREE.SphereGeometry(GLOBE_RADIUS, 96, 96);
    const globeMaterial = new THREE.MeshPhongMaterial({
      color: 0xffffff,
      shininess: 25,
      bumpScale: 0.015
    });
    const globe = new THREE.Mesh(globeGeometry, globeMaterial);
    scene.add(globe);

    // Load textures
    let loadedCount = 0;
    const totalLoads = 2;

    function checkAllLoaded() {
      loadedCount++;
      if (loadedCount >= totalLoads) {
        globeReady = true;
        const loadingEl = document.getElementById('loading');
        loadingEl.classList.add('fade-out');
        setTimeout(() => loadingEl.remove(), 900);
      }
    }

    textureLoader.load(EARTH_TEXTURE_URL, (texture) => {
      texture.colorSpace = THREE.SRGBColorSpace;
      globeMaterial.map = texture;
      globeMaterial.needsUpdate = true;
      checkAllLoaded();
    }, undefined, () => {
      globeMaterial.color.set(0x0f1d30);
      globeMaterial.emissive = new THREE.Color(0x050a14);
      globeMaterial.emissiveIntensity = 0.3;
      globeMaterial.needsUpdate = true;
      checkAllLoaded();
    });

    textureLoader.load(EARTH_BUMP_URL, (texture) => {
      globeMaterial.bumpMap = texture;
      globeMaterial.needsUpdate = true;
      checkAllLoaded();
    }, undefined, () => {
      checkAllLoaded();
    });

    // ====================================================
    // ATMOSPHERE GLOW
    // ====================================================
    const atmosphereVS = `
      varying vec3 vNormal;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;
    const atmosphereFS = `
      varying vec3 vNormal;
      void main() {
        float intensity = pow(0.65 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 3.0);
        gl_FragColor = vec4(0.15, 0.55, 0.7, 1.0) * intensity * 0.7;
      }
    `;
    const atmosphereMaterial = new THREE.ShaderMaterial({
      vertexShader: atmosphereVS,
      fragmentShader: atmosphereFS,
      blending: THREE.AdditiveBlending,
      side: THREE.BackSide,
      transparent: true,
      depthWrite: false
    });
    const atmosphere = new THREE.Mesh(
      new THREE.SphereGeometry(GLOBE_RADIUS * 1.12, 64, 64),
      atmosphereMaterial
    );
    scene.add(atmosphere);

    // ====================================================
    // UTILITY: lat/lon to Vector3
    // ====================================================
    function latLonToVec3(lat, lon, radius) {
      const phi = (90 - lat) * Math.PI / 180;
      const theta = -lon * Math.PI / 180;
      return new THREE.Vector3(
        radius * Math.sin(phi) * Math.cos(theta),
        radius * Math.cos(phi),
        radius * Math.sin(phi) * Math.sin(theta)
      );
    }

    // ====================================================
    // ZEE ZONES -- Real GeoJSON polygons from marineregions.org
    // ====================================================
    const zoneMeshes = [];
    const zoneGroup = new THREE.Group();
    scene.add(zoneGroup);
    const zoneObjects = [];

    // Earcut: robust 2D polygon triangulation (minified, from https://github.com/mapbox/earcut)
    // Supports holes, handles concave polygons correctly
    function earcut(data, holeIndices, dim) {
      dim = dim || 2;
      const hasHoles = holeIndices && holeIndices.length;
      const outerLen = hasHoles ? holeIndices[0] * dim : data.length;
      let outerNode = linkedList(data, 0, outerLen, dim, true);
      const triangles = [];
      if (!outerNode || outerNode.next === outerNode.prev) return triangles;
      if (hasHoles) outerNode = eliminateHoles(data, holeIndices, outerNode, dim);
      let minX, minY, maxX, maxY, invSize;
      if (data.length > 80 * dim) {
        minX = maxX = data[0]; minY = maxY = data[1];
        for (let i = dim; i < outerLen; i += dim) {
          const x = data[i], y = data[i + 1];
          if (x < minX) minX = x; if (y < minY) minY = y;
          if (x > maxX) maxX = x; if (y > maxY) maxY = y;
        }
        invSize = Math.max(maxX - minX, maxY - minY);
        invSize = invSize !== 0 ? 32767 / invSize : 0;
      }
      earcutLinked(outerNode, triangles, dim, minX, minY, invSize, 0);
      return triangles;
    }
    function linkedList(data, start, end, dim, cw) {
      let last;
      if (cw === (signedArea(data, start, end, dim) > 0)) {
        for (let i = start; i < end; i += dim) last = insertNode(i, data[i], data[i + 1], last);
      } else {
        for (let i = end - dim; i >= start; i -= dim) last = insertNode(i, data[i], data[i + 1], last);
      }
      if (last && equals(last, last.next)) { removeNode(last); last = last.next; }
      if (!last) return null;
      last.next.prev = last; last.prev.next = last;
      return last.next;
    }
    function filterPoints(start, end) {
      if (!start) return start;
      if (!end) end = start;
      let p = start, again;
      do {
        again = false;
        if (!p.steiner && (equals(p, p.next) || area(p.prev, p, p.next) === 0)) {
          removeNode(p); p = end = p.prev; if (p === p.next) break;
          again = true;
        } else { p = p.next; }
      } while (again || p !== end);
      return end;
    }
    function earcutLinked(ear, triangles, dim, minX, minY, invSize, pass) {
      if (!ear) return;
      if (!pass && invSize) indexCurve(ear, minX, minY, invSize);
      let stop = ear, prev, next;
      while (ear.prev !== ear.next) {
        prev = ear.prev; next = ear.next;
        if (invSize ? isEarHashed(ear, minX, minY, invSize) : isEar(ear)) {
          triangles.push(prev.i / dim | 0, ear.i / dim | 0, next.i / dim | 0);
          removeNode(ear); ear = next.next; stop = next.next; continue;
        }
        ear = next;
        if (ear === stop) {
          if (!pass) earcutLinked(filterPoints(ear), triangles, dim, minX, minY, invSize, 1);
          else if (pass === 1) { ear = cureLocalIntersections(filterPoints(ear), triangles, dim); earcutLinked(ear, triangles, dim, minX, minY, invSize, 2); }
          else if (pass === 2) splitEarcut(ear, triangles, dim, minX, minY, invSize);
          break;
        }
      }
    }
    function isEar(ear) {
      const a = ear.prev, b = ear, c = ear.next;
      if (area(a, b, c) >= 0) return false;
      const ax = a.x, bx = b.x, cx = c.x, ay = a.y, by = b.y, cy = c.y;
      const x0 = ax < bx ? (ax < cx ? ax : cx) : (bx < cx ? bx : cx);
      const y0 = ay < by ? (ay < cy ? ay : cy) : (by < cy ? by : cy);
      const x1 = ax > bx ? (ax > cx ? ax : cx) : (bx > cx ? bx : cx);
      const y1 = ay > by ? (ay > cy ? ay : cy) : (by > cy ? by : cy);
      let p = c.next;
      while (p !== a) {
        if (p.x >= x0 && p.x <= x1 && p.y >= y0 && p.y <= y1 &&
            pointInTriangle(ax, ay, bx, by, cx, cy, p.x, p.y) &&
            area(p.prev, p, p.next) >= 0) return false;
        p = p.next;
      }
      return true;
    }
    function isEarHashed(ear, minX, minY, invSize) {
      const a = ear.prev, b = ear, c = ear.next;
      if (area(a, b, c) >= 0) return false;
      const ax = a.x, bx = b.x, cx = c.x, ay = a.y, by = b.y, cy = c.y;
      const x0 = ax < bx ? (ax < cx ? ax : cx) : (bx < cx ? bx : cx);
      const y0 = ay < by ? (ay < cy ? ay : cy) : (by < cy ? by : cy);
      const x1 = ax > bx ? (ax > cx ? ax : cx) : (bx > cx ? bx : cx);
      const y1 = ay > by ? (ay > cy ? ay : cy) : (by > cy ? by : cy);
      const minZ = zOrder(x0, y0, minX, minY, invSize);
      const maxZ = zOrder(x1, y1, minX, minY, invSize);
      let p = ear.prevZ, n = ear.nextZ;
      while (p && p.z >= minZ && n && n.z <= maxZ) {
        if (p.x >= x0 && p.x <= x1 && p.y >= y0 && p.y <= y1 && p !== a && p !== c &&
            pointInTriangle(ax, ay, bx, by, cx, cy, p.x, p.y) && area(p.prev, p, p.next) >= 0) return false;
        p = p.prevZ;
        if (n.x >= x0 && n.x <= x1 && n.y >= y0 && n.y <= y1 && n !== a && n !== c &&
            pointInTriangle(ax, ay, bx, by, cx, cy, n.x, n.y) && area(n.prev, n, n.next) >= 0) return false;
        n = n.nextZ;
      }
      while (p && p.z >= minZ) {
        if (p.x >= x0 && p.x <= x1 && p.y >= y0 && p.y <= y1 && p !== a && p !== c &&
            pointInTriangle(ax, ay, bx, by, cx, cy, p.x, p.y) && area(p.prev, p, p.next) >= 0) return false;
        p = p.prevZ;
      }
      while (n && n.z <= maxZ) {
        if (n.x >= x0 && n.x <= x1 && n.y >= y0 && n.y <= y1 && n !== a && n !== c &&
            pointInTriangle(ax, ay, bx, by, cx, cy, n.x, n.y) && area(n.prev, n, n.next) >= 0) return false;
        n = n.nextZ;
      }
      return true;
    }
    function cureLocalIntersections(start, triangles, dim) {
      let p = start;
      do {
        const a = p.prev, b = p.next.next;
        if (!equals(a, b) && intersects(a, p, p.next, b) && locallyInside(a, b) && locallyInside(b, a)) {
          triangles.push(a.i / dim | 0, p.i / dim | 0, b.i / dim | 0);
          removeNode(p); removeNode(p.next);
          p = start = b;
        }
        p = p.next;
      } while (p !== start);
      return filterPoints(p);
    }
    function splitEarcut(start, triangles, dim, minX, minY, invSize) {
      let a = start;
      do {
        let b = a.next.next;
        while (b !== a.prev) {
          if (a.i !== b.i && isValidDiagonal(a, b)) {
            let c = splitPolygon(a, b);
            a = filterPoints(a, a.next); c = filterPoints(c, c.next);
            earcutLinked(a, triangles, dim, minX, minY, invSize, 0);
            earcutLinked(c, triangles, dim, minX, minY, invSize, 0);
            return;
          }
          b = b.next;
        }
        a = a.next;
      } while (a !== start);
    }
    function eliminateHoles(data, holeIndices, outerNode, dim) {
      const queue = [];
      for (let i = 0, len = holeIndices.length; i < len; i++) {
        const start = holeIndices[i] * dim;
        const end = i < len - 1 ? holeIndices[i + 1] * dim : data.length;
        const list = linkedList(data, start, end, dim, false);
        if (list === list.next) list.steiner = true;
        queue.push(getLeftmost(list));
      }
      queue.sort((a, b) => a.x - b.x);
      for (let i = 0; i < queue.length; i++) {
        outerNode = eliminateHole(queue[i], outerNode);
      }
      return outerNode;
    }
    function eliminateHole(hole, outerNode) {
      const bridge = findHoleBridge(hole, outerNode);
      if (!bridge) return outerNode;
      const bridgeReverse = splitPolygon(bridge, hole);
      filterPoints(bridgeReverse, bridgeReverse.next);
      return filterPoints(bridge, bridge.next);
    }
    function findHoleBridge(hole, outerNode) {
      let p = outerNode, hx = hole.x, hy = hole.y, qx = -Infinity, m;
      do {
        if (hy <= p.y && hy >= p.next.y && p.next.y !== p.y) {
          const x = p.x + (hy - p.y) / (p.next.y - p.y) * (p.next.x - p.x);
          if (x <= hx && x > qx) { qx = x; m = p.x < p.next.x ? p : p.next; if (x === hx) return m; }
        }
        p = p.next;
      } while (p !== outerNode);
      if (!m) return null;
      const stop = m; let tanMin = Infinity;
      p = m;
      do {
        if (hx >= p.x && p.x >= m.x && hx !== p.x &&
            pointInTriangle(hy < m.y ? hx : qx, hy, m.x, m.y, hy >= m.y ? hx : qx, hy, p.x, p.y)) {
          const tan = Math.abs(hy - p.y) / (hx - p.x);
          if (locallyInside(p, hole) && (tan < tanMin || (tan === tanMin && (p.x > m.x || sectorContainsSector(m, p))))) { m = p; tanMin = tan; }
        }
        p = p.next;
      } while (p !== stop);
      return m;
    }
    function sectorContainsSector(m, p) { return area(m.prev, m, p.prev) < 0 && area(p.next, m, m.next) < 0; }
    function indexCurve(start, minX, minY, invSize) {
      let p = start;
      do { if (p.z === 0) p.z = zOrder(p.x, p.y, minX, minY, invSize); p.prevZ = p.prev; p.nextZ = p.next; p = p.next; } while (p !== start);
      p.prevZ.nextZ = null; p.prevZ = null; sortLinked(p);
    }
    function sortLinked(list) {
      let inSize = 1, numMerges, p, q, e, tail, pSize, qSize;
      do {
        p = list; list = null; tail = null; numMerges = 0;
        while (p) {
          numMerges++; q = p; pSize = 0;
          for (let i = 0; i < inSize; i++) { pSize++; q = q.nextZ; if (!q) break; }
          qSize = inSize;
          while (pSize > 0 || (qSize > 0 && q)) {
            if (pSize !== 0 && (qSize === 0 || !q || p.z <= q.z)) { e = p; p = p.nextZ; pSize--; }
            else { e = q; q = q.nextZ; qSize--; }
            if (tail) tail.nextZ = e; else list = e;

    // ── Normalize longitude for antimeridian handling ──

        maxJump = Math.max(maxJump, Math.abs(ring[i][0] - ring[i - 1][0]));

    function createZeePolygon(coordsArray, properties) {
      // coordsArray: array of rings [outerRing, hole1, hole2, ...]
      // Each ring is array of [lon, lat]
      const outerRing = coordsArray[0];
      if (!outerRing || outerRing.length < 3) return [];

      const normalizedOuter = normalizeLon(outerRing);

      // Simplify: Douglas-Peucker-like reduction for very large polygons
      const simplified = simplifyRing(normalizedOuter, 400);

      // Build flat 2D array for earcut (lon, lat)
      const flatCoords = [];
      for (const pt of simplified) {
        flatCoords.push(pt[0], pt[1]);
      }

      // Handle holes
      const holeIndices = [];
      for (let h = 1; h < coordsArray.length; h++) {
        const hole = coordsArray[h];
        if (!hole || hole.length < 3) continue;
        const normHole = normalizeLon(hole);
        const simpHole = simplifyRing(normHole, 100);
        holeIndices.push(flatCoords.length / 2);
        for (const pt of simpHole) {
          flatCoords.push(pt[0], pt[1]);
        }
      }

      // Triangulate with earcut
      const triIndices = earcut(flatCoords, holeIndices.length > 0 ? holeIndices : null, 2);
      if (triIndices.length === 0) return [];

      // Build 3D vertices on globe
      const vertCount = flatCoords.length / 2;
      const vertices3D = new Float32Array(vertCount * 3);
      for (let i = 0; i < vertCount; i++) {
        let lon = flatCoords[i * 2];
        const lat = flatCoords[i * 2 + 1];
        // Un-normalize longitude back to [-180, 180] for correct 3D placement
        if (lon > 180) lon -= 360;
        const v = latLonToVec3(lat, lon, ZEE_HEIGHT);
        vertices3D[i * 3] = v.x;
        vertices3D[i * 3 + 1] = v.y;
        vertices3D[i * 3 + 2] = v.z;
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.BufferAttribute(vertices3D, 3));
      geometry.setIndex(triIndices);
      geometry.computeVertexNormals();

      const fillMaterial = new THREE.MeshBasicMaterial({
        color: 0x00b4b4, transparent: true, opacity: 0.22,
        side: THREE.DoubleSide, depthWrite: false
      });

      const mesh = new THREE.Mesh(geometry, fillMaterial);
      mesh.userData = {
        isZEE: true,
        zone: {
          name: properties.geoname || properties.territory1 || 'ZEE France',
          detail: properties.sovereign1 || 'France',
          area: properties.area_km2 || 0
        }
      };
      mesh.renderOrder = 1;
      zoneGroup.add(mesh);
      zoneMeshes.push(mesh);

      // Border line from outer ring only
      const borderPoints = [];
      for (const pt of simplified) {
        let lon = pt[0];
        if (lon > 180) lon -= 360;
        const v = latLonToVec3(pt[1], lon, ZEE_HEIGHT * 1.0005);
        borderPoints.push(v);
      }
      // Close the border loop
      if (borderPoints.length > 2) {
        borderPoints.push(borderPoints[0].clone());
      }

      let borderLine = null;
      if (borderPoints.length >= 2) {
        const borderGeo = new THREE.BufferGeometry().setFromPoints(borderPoints);
        const borderMaterial = new THREE.LineBasicMaterial({
          color: 0x00e0e0, transparent: true, opacity: 0.55, linewidth: 1
        });
        borderLine = new THREE.Line(borderGeo, borderMaterial);
        borderLine.renderOrder = 2;
        zoneGroup.add(borderLine);
      }

      return [{ mesh, borderLine }];
    }

    // Simplify a ring: keep every Nth point but always preserve angular "corners"
    function simplifyRing(ring, maxPoints) {
      if (ring.length <= maxPoints) return ring;
      const step = Math.ceil(ring.length / maxPoints);
      const result = [];
      for (let i = 0; i < ring.length; i++) {

        }

      if (result.length > 0 && (result[0][0] !== result[result.length - 1][0] || result[0][1] !== result[result.length - 1][1])) {
        result.push(result[0]);
      }
      return result.length >= 3 ? result : ring;

    function processEEZGeoJSON(geojson) {
      if (!geojson || !geojson.features) {
        console.warn('EEZ GeoJSON: invalid data');
        return;
      }

      let polyCount = 0;
      for (const feature of geojson.features) {
        const geom = feature.geometry;
        const props = feature.properties || {};
        if (!geom) continue;

        const polygonCoords = [];
        if (geom.type === 'Polygon') {
          polygonCoords.push(geom.coordinates);
        } else if (geom.type === 'MultiPolygon') {
          for (const poly of geom.coordinates) {
            polygonCoords.push(poly);
          }
        }

        for (const coords of polygonCoords) {
          const results = createZeePolygon(coords, props);
          for (const result of results) {
            zoneObjects.push(result);
            polyCount++;
          }
        }
      }
      console.log(`EEZ: loaded ${polyCount} polygons from ${geojson.features.length} features`);
    }

    // Fetch real French EEZ polygons from marineregions.org
    const EEZ_URL = "https://geo.vliz.be/geoserver/MarineRegions/wfs?service=WFS&version=1.0.0&request=GetFeature&typeName=MarineRegions:eez&outputFormat=application/json&CQL_FILTER=sovereign1=%27France%27&maxFeatures=50";

    fetch(EEZ_URL)
      .then(res => {
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();

      .then(geojson => processEEZGeoJSON(geojson))
      .catch(err => {

    // Fallback: disc approximation if GeoJSON fetch fails
    function loadFallbackZEE() {
      const EARTH_RADIUS_KM = 6371;
      const ZONE_SEGMENTS = 64;
      const ZEE_ZONES = [
        { name: 'Metropole', detail: 'Atlantique + Mediterranee', lat: 46, lng: -3, area: 350000 },
        { name: 'Guyane', detail: 'Amerique du Sud', lat: 5, lng: -52, area: 130000 },
        { name: 'Martinique', detail: 'Antilles', lat: 14.6, lng: -61, area: 50000 },
        { name: 'Guadeloupe', detail: 'Antilles', lat: 16.2, lng: -61.5, area: 90000 },
        { name: 'La Reunion', detail: 'Ocean Indien', lat: -21, lng: 55.5, area: 315000 },
        { name: 'Mayotte', detail: 'Ocean Indien', lat: -12.8, lng: 45.2, area: 74000 },
        { name: 'Nouvelle-Caledonie', detail: 'Ocean Pacifique', lat: -21, lng: 165, area: 1740000 },
        { name: 'Polynesie francaise', detail: 'Ocean Pacifique', lat: -17, lng: -149, area: 4800000 },
        { name: 'Wallis-et-Futuna', detail: 'Ocean Pacifique', lat: -13.3, lng: -176.2, area: 260000 },
        { name: 'Kerguelen', detail: 'TAAF -- Ocean Indien austral', lat: -49.5, lng: 69.5, area: 570000 },
        { name: 'Crozet', detail: 'TAAF -- Ocean Indien austral', lat: -46, lng: 51, area: 570000 },
        { name: 'Saint-Pierre-et-Miquelon', detail: 'Atlantique Nord', lat: 46.8, lng: -56.2, area: 12000 },
        { name: 'Saint-Martin / Saint-Barthelemy', detail: 'Antilles', lat: 18, lng: -63, area: 10000 },
        { name: 'Clipperton', detail: 'Ocean Pacifique', lat: 10.3, lng: -109.2, area: 440000 },
        { name: 'Amsterdam / Saint-Paul', detail: 'TAAF -- Ocean Indien austral', lat: -37.8, lng: 77.5, area: 500000 },
        { name: 'Iles Eparses', detail: 'Glorieuses, Juan de Nova, Europa, Bassas da India', lat: -15, lng: 43, area: 640000 }
      ];

      function areaToAngularRadius(areaKm2) {
        return Math.sqrt(areaKm2 / Math.PI) / EARTH_RADIUS_KM;
      }

      for (const zone of ZEE_ZONES) {
        const angularRadius = areaToAngularRadius(zone.area);
        const displayRadius = Math.min(angularRadius, 0.35);
        const centerPhi = (90 - zone.lat) * Math.PI / 180;
        const centerTheta = -zone.lng * Math.PI / 180;

        const vertices = [];
        const cx = ZEE_HEIGHT * Math.sin(centerPhi) * Math.cos(centerTheta);
        const cy = ZEE_HEIGHT * Math.cos(centerPhi);
        const cz = ZEE_HEIGHT * Math.sin(centerPhi) * Math.sin(centerTheta);
        vertices.push(cx, cy, cz);

        for (let i = 0; i <= ZONE_SEGMENTS; i++) {
          const bearing = (i / ZONE_SEGMENTS) * Math.PI * 2;
          const lat1 = zone.lat * Math.PI / 180;
          const lon1 = zone.lng * Math.PI / 180;
          const lat2 = Math.asin(
            Math.sin(lat1) * Math.cos(displayRadius) +
            Math.cos(lat1) * Math.sin(displayRadius) * Math.cos(bearing)
          );
          const lon2 = lon1 + Math.atan2(
            Math.sin(bearing) * Math.sin(displayRadius) * Math.cos(lat1),
            Math.cos(displayRadius) - Math.sin(lat1) * Math.sin(lat2)
          );
          const phi = (Math.PI / 2) - lat2;
          const theta = -lon2;
          vertices.push(
            ZEE_HEIGHT * Math.sin(phi) * Math.cos(theta),
            ZEE_HEIGHT * Math.cos(phi),
            ZEE_HEIGHT * Math.sin(phi) * Math.sin(theta)
          );
        }

        const indices = [];
        for (let i = 1; i <= ZONE_SEGMENTS; i++) {
          indices.push(0, i, i + 1);
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        geometry.setIndex(indices);
        geometry.computeVertexNormals();

        const fillMaterial = new THREE.MeshBasicMaterial({
          color: 0x00b4b4, transparent: true, opacity: 0.22,
          side: THREE.DoubleSide, depthWrite: false
        });
        const mesh = new THREE.Mesh(geometry, fillMaterial);
        mesh.userData = { zone, isZEE: true };
        mesh.renderOrder = 1;
        zoneGroup.add(mesh);
        zoneMeshes.push(mesh);

        const borderPoints = [];
        for (let i = 1; i <= ZONE_SEGMENTS + 1; i++) {
          const idx = i * 3;
          if (idx + 2 < vertices.length) {
            borderPoints.push(new THREE.Vector3(
              vertices[idx] * 1.0005, vertices[idx + 1] * 1.0005, vertices[idx + 2] * 1.0005

        }
        const borderGeo = new THREE.BufferGeometry().setFromPoints(borderPoints);
        const borderMaterial = new THREE.LineBasicMaterial({
          color: 0x00e0e0, transparent: true, opacity: 0.55
        });
        const borderLine = new THREE.Line(borderGeo, borderMaterial);
        borderLine.renderOrder = 2;
        zoneGroup.add(borderLine);

        zoneObjects.push({ mesh, borderLine });
      }
    }

    // ====================================================
    // STARFIELD
    // ====================================================
    function createStarfield() {
      const starCount = 2000;
      const positions = new Float32Array(starCount * 3);
      const sizes = new Float32Array(starCount);

      for (let i = 0; i < starCount; i++) {
        const r = 15 + Math.random() * 35;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);

        positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i * 3 + 2] = r * Math.cos(phi);
        sizes[i] = 0.3 + Math.random() * 1.2;
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geo.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));

      const mat = new THREE.PointsMaterial({
        color: 0xaabbdd,

    scene.add(createStarfield());

    // ====================================================
    // SUBMARINE CABLES LAYER
    // ====================================================
    const cableGroup = new THREE.Group();
    scene.add(cableGroup);
    const CABLE_RADIUS = GLOBE_RADIUS + 0.005;

    // Split cable coordinates at antimeridian crossings and large longitude gaps.
    // Returns an array of coordinate arrays, each safe to render as a single line.
    function splitCableCoords(coords) {
      const segments = [];
      let current = [];

      for (let i = 0; i < coords.length; i++) {
        const lon = coords[i][0];
        const lat = coords[i][1];
        if (isNaN(lat) || isNaN(lon)) continue;

        if (current.length > 0) {
          const prevLon = current[current.length - 1][0];
          const lonDiff = Math.abs(lon - prevLon);

          // If longitude jump > 90°, this segment crosses the antimeridian or wraps
          if (lonDiff > 90) {
            // Interpolate the crossing point at ±180
            const prevCoord = current[current.length - 1];
            const lon1 = prevCoord[0];
            const lat1 = prevCoord[1];
            let lon2 = lon;
            const lat2 = lat;

            // Unwrap lon2 to be continuous with lon1
            if (lon2 - lon1 > 180) lon2 -= 360;
            else if (lon1 - lon2 > 180) lon2 += 360;

            const crossLon = lon1 > 0 ? 180 : -180;
            const t = (lon2 - lon1) !== 0 ? (crossLon - lon1) / (lon2 - lon1) : 0.5;
            const crossLat = lat1 + t * (lat2 - lat1);

            // End current segment at the crossing
            current.push([crossLon, crossLat]);
            if (current.length >= 2) segments.push(current);

            // Start new segment from the other side of the antimeridian
            current = [[-crossLon, crossLat], [lon, lat]];
            continue;
          }
        }

        current.push([lon, lat]);
      }

      if (current.length >= 2) segments.push(current);
      return segments;
    }

    function buildCableLine(coords, color) {
      const points = [];
      for (let i = 0; i < coords.length; i++) {
        const lon = coords[i][0];
        const lat = coords[i][1];
        if (isNaN(lat) || isNaN(lon)) continue;
        points.push(latLonToVec3(lat, lon, CABLE_RADIUS));
      }
      if (points.length < 2) return null;
      const geo = new THREE.BufferGeometry().setFromPoints(points);
      const mat = new THREE.LineBasicMaterial({
        color: color,
        transparent: true,
        opacity: 0.35,
        depthWrite: false
      });
      return new THREE.Line(geo, mat);
    }

    function processCableGeoJSON(geojson) {
      if (!geojson || !geojson.features) {
        console.warn('Submarine cables: invalid GeoJSON data');
        return;
      }
      let lineCount = 0;
      for (const feature of geojson.features) {
        const geom = feature.geometry;
        if (!geom) continue;

        let cableColor;
        if (feature.properties && feature.properties.color) {
          try {
            cableColor = new THREE.Color(feature.properties.color);
          } catch(e) {
            cableColor = new THREE.Color(0x00b4b4);
          }
        } else {
          cableColor = new THREE.Color(0x00b4b4);
        }

        const coordSets = [];
        if (geom.type === 'MultiLineString') {
          for (const lineCoords of geom.coordinates) {
            coordSets.push(lineCoords);
          }
        } else if (geom.type === 'LineString') {
          coordSets.push(geom.coordinates);
        }

        for (const coords of coordSets) {
          // Split at antimeridian crossings before building lines
          const splitSegments = splitCableCoords(coords);
          for (const segCoords of splitSegments) {
            const line = buildCableLine(segCoords, cableColor);
            if (line) {
              line.renderOrder = 3;
              cableGroup.add(line);
              lineCount++;
            }
          }
        }
      }
      console.log(`Submarine cables: loaded ${lineCount} line segments`);
    }

    // Fetch submarine cables from Telegeography
    const CABLE_URL = 'https://www.submarinecablemap.com/api/v3/cable/cable-geo.json';

    fetch(CABLE_URL)
      .then(res => {
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();

      .then(geojson => processCableGeoJSON(geojson))
      .catch(err => {

    const densityImg = new Image();

    densityImg.onload = function() {

        });

    };
    densityImg.onerror = function() {

    densityImg.src = GMTDS_WMS_URL;

    // ====================================================
    // LAYER TOGGLES
    // ====================================================
    const layerVisibility = { zee: true, cables: true, traffic: true };

    document.querySelectorAll('#legend .legend-item[data-layer]').forEach(item => {
      item.addEventListener('click', () => {
        const layer = item.dataset.layer;
        layerVisibility[layer] = !layerVisibility[layer];

    // ====================================================
    // RAYCASTING
    // ====================================================
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2(-999, -999);
    let hoveredZone = null;
    let isUserInteracting = false;

    container.addEventListener('pointermove', (e) => {
      const rect = container.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

      tooltip.style.left = (e.clientX + 18) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';

      const tooltipRect = tooltip.getBoundingClientRect();
      if (tooltipRect.right > window.innerWidth - 10) {
        tooltip.style.left = (e.clientX - tooltipRect.width - 18) + 'px';
      }
      if (tooltipRect.bottom > window.innerHeight - 10) {
        tooltip.style.top = (e.clientY - tooltipRect.height - 10) + 'px';
      }
    });

    container.addEventListener('pointerdown', () => {
      isUserInteracting = true;
      controls.autoRotate = false;
    });

    container.addEventListener('pointerup', () => {
      isUserInteracting = false;
      clearTimeout(window._resumeTimer);
      window._resumeTimer = setTimeout(() => {
        if (!isUserInteracting) {
          controls.autoRotate = true;
        }
      }, 3000);
    });

    function formatArea(km2) {
      if (!km2 || km2 === 0) return '';
      if (km2 >= 1000000) {
        return (km2 / 1000000).toFixed(1).replace('.', ',') + ' M km\u00B2';
      }
      return km2.toLocaleString('fr-FR') + ' km\u00B2';
    }

    function checkHover() {
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(zoneMeshes);

      if (intersects.length > 0) {
        const hit = intersects[0].object;
        const zone = hit.userData.zone;

        if (hoveredZone !== zone) {
          if (hoveredZone) {
            resetZoneHighlight(hoveredZone);
          }
          hoveredZone = zone;
          highlightZone(zone);

          tooltipName.textContent = zone.name;
          tooltipArea.textContent = formatArea(zone.area);
          tooltipDetail.textContent = zone.detail;
        }

        tooltip.classList.add('visible');
        container.style.cursor = 'pointer';
      } else {
        if (hoveredZone) {
          resetZoneHighlight(hoveredZone);
          hoveredZone = null;
        }
        tooltip.classList.remove('visible');
        container.style.cursor = isUserInteracting ? 'grabbing' : 'grab';
      }
    }

    function highlightZone(zone) {
      for (const obj of zoneObjects) {
        if (obj.mesh.userData.zone === zone) {
          obj.mesh.material.opacity = 0.45;
          obj.mesh.material.color.set(0x00e8e8);
          if (obj.borderLine) {
            obj.borderLine.material.opacity = 0.9;
            obj.borderLine.material.color.set(0x00ffff);
          }
          break;
        }
      }
    }

    function resetZoneHighlight(zone) {
      for (const obj of zoneObjects) {
        if (obj.mesh.userData.zone === zone) {
          obj.mesh.material.opacity = 0.22;
          obj.mesh.material.color.set(0x00b4b4);
          if (obj.borderLine) {
            obj.borderLine.material.opacity = 0.55;
            obj.borderLine.material.color.set(0x00e0e0);
          }
          break;
        }
      }
    }

    // ====================================================
    // ANIMATION LOOP
    // ====================================================
    let frameCount = 0;

    function animate(time) {
      requestAnimationFrame(animate);
      frameCount++;

      controls.update();

      // Pulse ZEE zones
      if (frameCount % 2 === 0) {
        const pulse = 0.18 + Math.sin(frameCount * 0.015) * 0.04;
        for (const obj of zoneObjects) {
          if (obj.mesh.userData.zone !== hoveredZone) {
            obj.mesh.material.opacity = pulse;
          }
        }
      }



      checkHover();
      renderer.render(scene, camera);
    }

    // ====================================================
    // RESIZE HANDLER
    // ====================================================
    window.addEventListener('resize', () => {
      const w = container.clientWidth;
      const h = container.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    });

    // ====================================================
    // START
    // ====================================================
    animate();

  </script>
</body>
</html>
