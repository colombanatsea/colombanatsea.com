<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZEE de France — Globe Interactif (Satellite) | Colomban at Sea</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0e1a;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      width: 100vw;
    }

    #globe-container {
      width: 100%;
      height: 100vh;
      position: relative;
      overflow: hidden;
      cursor: grab;
    }

    #globe-container:active {
      cursor: grabbing;
    }

    canvas {
      display: block;
    }

    /* Header overlay */
    #header-overlay {
      position: absolute;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
      pointer-events: none;
      width: 90%;
      max-width: 720px;
    }

    /* Total counter bottom right */
    #total-counter {
      position: absolute;
      bottom: 32px;
      right: 36px;
      z-index: 10;
      pointer-events: none;
      text-align: right;
    }

    #total-counter .label {
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    #total-counter .value {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      color: #00d4d4;
      text-shadow: 0 0 30px rgba(0, 212, 212, 0.4);
      line-height: 1.1;
    }

    #total-counter .unit {
      font-family: 'Source Serif 4', serif;
      font-weight: 400;
      font-style: italic;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }

    /* Tooltip */
    #tooltip {
      position: absolute;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      background: rgba(10, 14, 30, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 200, 200, 0.35);
      border-radius: 10px;
      padding: 14px 20px;
      min-width: 180px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px rgba(0,180,180,0.1);
    }

    #tooltip.visible {
      opacity: 1;
    }

    #tooltip .zone-name {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      color: #fff;
      margin-bottom: 4px;
    }

    #tooltip .zone-area {
      font-family: 'Source Serif 4', serif;
      font-style: italic;
      font-size: 0.85rem;
      color: #00d4d4;
    }

    #tooltip .zone-detail {
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
    }

    /* Legend bottom left */
    #legend {
      position: absolute;
      bottom: 32px;
      left: 36px;
      z-index: 10;
      pointer-events: none;
    }

    #legend .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    #legend .swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border: 1px solid rgba(0,200,200,0.5);
      background: rgba(0, 180, 180, 0.35);
    }

    #legend .legend-label {
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.5);
    }

    /* Loading screen */
    #loading {
      position: absolute;
      inset: 0;
      z-index: 999;
      background: #0a0e1a;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      transition: opacity 0.8s ease;
    }

    #loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #loading .spinner {
      width: 40px;
      height: 40px;
      border: 2px solid rgba(0,212,212,0.15);
      border-top-color: #00d4d4;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    #loading .load-text {
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="globe-container">
    <div id="header-overlay"></div>

    <div id="total-counter">
      <div class="label">Surface totale ZEE</div>
      <div class="value">11 691 000</div>
      <div class="unit">km&#178;</div>
    </div>

    <div id="legend">
      <div class="legend-item">
        <div class="swatch"></div>
        <span class="legend-label">Zone &Eacute;conomique Exclusive fran&ccedil;aise</span>
      </div>
    </div>

    <div id="tooltip">
      <div class="zone-name"></div>
      <div class="zone-area"></div>
      <div class="zone-detail"></div>
    </div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <div class="load-text">Chargement du globe...</div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ====================================================
    // ZEE DATA
    // ====================================================
    const ZEE_ZONES = [
      { name: 'Metropole', detail: 'Atlantique + Mediterranee', lat: 46, lng: -3, area: 350000 },
      { name: 'Guyane', detail: 'Amerique du Sud', lat: 5, lng: -52, area: 130000 },
      { name: 'Martinique', detail: 'Antilles', lat: 14.6, lng: -61, area: 50000 },
      { name: 'Guadeloupe', detail: 'Antilles', lat: 16.2, lng: -61.5, area: 90000 },
      { name: 'La Reunion', detail: 'Ocean Indien', lat: -21, lng: 55.5, area: 315000 },
      { name: 'Mayotte', detail: 'Ocean Indien', lat: -12.8, lng: 45.2, area: 74000 },
      { name: 'Nouvelle-Caledonie', detail: 'Ocean Pacifique', lat: -21, lng: 165, area: 1740000 },
      { name: 'Polynesie francaise', detail: 'Ocean Pacifique', lat: -17, lng: -149, area: 4800000 },
      { name: 'Wallis-et-Futuna', detail: 'Ocean Pacifique', lat: -13.3, lng: -176.2, area: 260000 },
      { name: 'Kerguelen', detail: 'TAAF -- Ocean Indien austral', lat: -49.5, lng: 69.5, area: 570000 },
      { name: 'Crozet', detail: 'TAAF -- Ocean Indien austral', lat: -46, lng: 51, area: 570000 },
      { name: 'Saint-Pierre-et-Miquelon', detail: 'Atlantique Nord', lat: 46.8, lng: -56.2, area: 12000 },
      { name: 'Saint-Martin / Saint-Barthelemy', detail: 'Antilles', lat: 18, lng: -63, area: 10000 },
      { name: 'Clipperton', detail: 'Ocean Pacifique', lat: 10.3, lng: -109.2, area: 440000 },
      { name: 'Amsterdam / Saint-Paul', detail: 'TAAF -- Ocean Indien austral', lat: -37.8, lng: 77.5, area: 500000 },
      { name: 'Iles Eparses', detail: 'Glorieuses, Juan de Nova, Europa, Bassas da India', lat: -15, lng: 43, area: 640000 }
    ];

    // ====================================================
    // CONFIG
    // ====================================================
    const GLOBE_RADIUS = 1.0;
    const ZEE_HEIGHT = 1.003;
    const ZONE_SEGMENTS = 64;
    const AUTO_ROTATE_SPEED = 0.08;
    const EARTH_RADIUS_KM = 6371;

    function areaToAngularRadius(areaKm2) {
      return Math.sqrt(areaKm2 / Math.PI) / EARTH_RADIUS_KM;
    }

    // ====================================================
    // SCENE SETUP
    // ====================================================
    const container = document.getElementById('globe-container');
    const tooltip = document.getElementById('tooltip');
    const tooltipName = tooltip.querySelector('.zone-name');
    const tooltipArea = tooltip.querySelector('.zone-area');
    const tooltipDetail = tooltip.querySelector('.zone-detail');

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      45,
      container.clientWidth / container.clientHeight,
      0.01,
      100
    );
    camera.position.set(0, 0.4, 2.8);

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: false,
      powerPreference: 'high-performance'
    });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x0a0e1a, 1);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    // ====================================================
    // CONTROLS
    // ====================================================
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.rotateSpeed = 0.5;
    controls.enableZoom = false;
    controls.minDistance = 1.5;
    controls.maxDistance = 5;
    controls.enablePan = false;
    controls.autoRotate = true;
    controls.autoRotateSpeed = AUTO_ROTATE_SPEED;

    // ====================================================
    // LIGHTING -- stronger for textured globe
    // ====================================================
    const ambientLight = new THREE.AmbientLight(0x666666, 1.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 3, 5);
    scene.add(dirLight);

    const backLight = new THREE.DirectionalLight(0x334455, 0.4);
    backLight.position.set(-3, -2, -5);
    scene.add(backLight);

    // ====================================================
    // GLOBE -- satellite textured sphere
    // ====================================================
    const textureLoader = new THREE.TextureLoader();

    const EARTH_TEXTURE_URL = 'https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg';
    const EARTH_BUMP_URL = 'https://unpkg.com/three-globe/example/img/earth-topology.png';

    let globeReady = false;

    const globeGeometry = new THREE.SphereGeometry(GLOBE_RADIUS, 96, 96);
    const globeMaterial = new THREE.MeshPhongMaterial({
      color: 0xffffff,
      shininess: 25,
      bumpScale: 0.015
    });
    const globe = new THREE.Mesh(globeGeometry, globeMaterial);
    scene.add(globe);

    // Load textures
    let loadedCount = 0;
    const totalLoads = 2;

    function checkAllLoaded() {
      loadedCount++;
      if (loadedCount >= totalLoads) {
        globeReady = true;
        const loadingEl = document.getElementById('loading');
        loadingEl.classList.add('fade-out');
        setTimeout(() => loadingEl.remove(), 900);
      }
    }

    textureLoader.load(EARTH_TEXTURE_URL, (texture) => {
      texture.colorSpace = THREE.SRGBColorSpace;
      globeMaterial.map = texture;
      globeMaterial.needsUpdate = true;
      checkAllLoaded();
    }, undefined, () => {
      // Fallback: if texture fails, use a solid color
      globeMaterial.color.set(0x0f1d30);
      globeMaterial.emissive = new THREE.Color(0x050a14);
      globeMaterial.emissiveIntensity = 0.3;
      globeMaterial.needsUpdate = true;
      checkAllLoaded();
    });

    textureLoader.load(EARTH_BUMP_URL, (texture) => {
      globeMaterial.bumpMap = texture;
      globeMaterial.needsUpdate = true;
      checkAllLoaded();
    }, undefined, () => {
      checkAllLoaded();
    });

    // ====================================================
    // ATMOSPHERE GLOW
    // ====================================================
    const atmosphereVS = `
      varying vec3 vNormal;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;
    const atmosphereFS = `
      varying vec3 vNormal;
      void main() {
        float intensity = pow(0.65 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 3.0);
        gl_FragColor = vec4(0.15, 0.55, 0.7, 1.0) * intensity * 0.7;
      }
    `;
    const atmosphereMaterial = new THREE.ShaderMaterial({
      vertexShader: atmosphereVS,
      fragmentShader: atmosphereFS,
      blending: THREE.AdditiveBlending,
      side: THREE.BackSide,
      transparent: true,
      depthWrite: false
    });
    const atmosphere = new THREE.Mesh(
      new THREE.SphereGeometry(GLOBE_RADIUS * 1.12, 64, 64),
      atmosphereMaterial
    );
    scene.add(atmosphere);

    // ====================================================
    // ZEE ZONES
    // ====================================================
    const zoneMeshes = [];
    const zoneGroup = new THREE.Group();
    scene.add(zoneGroup);

    function createZoneDisc(zone) {
      const angularRadius = areaToAngularRadius(zone.area);
      const maxAngularRadius = 0.35;
      const displayRadius = Math.min(angularRadius, maxAngularRadius);

      const centerPhi = (90 - zone.lat) * Math.PI / 180;
      const centerTheta = -zone.lng * Math.PI / 180;

      const vertices = [];
      const indices = [];

      const cx = ZEE_HEIGHT * Math.sin(centerPhi) * Math.cos(centerTheta);
      const cy = ZEE_HEIGHT * Math.cos(centerPhi);
      const cz = ZEE_HEIGHT * Math.sin(centerPhi) * Math.sin(centerTheta);
      vertices.push(cx, cy, cz);

      for (let i = 0; i <= ZONE_SEGMENTS; i++) {
        const bearing = (i / ZONE_SEGMENTS) * Math.PI * 2;
        const lat1 = zone.lat * Math.PI / 180;
        const lon1 = zone.lng * Math.PI / 180;

        const lat2 = Math.asin(
          Math.sin(lat1) * Math.cos(displayRadius) +
          Math.cos(lat1) * Math.sin(displayRadius) * Math.cos(bearing)
        );
        const lon2 = lon1 + Math.atan2(
          Math.sin(bearing) * Math.sin(displayRadius) * Math.cos(lat1),
          Math.cos(displayRadius) - Math.sin(lat1) * Math.sin(lat2)
        );

        const phi = (Math.PI / 2) - lat2;
        const theta = -lon2;
        const fx = ZEE_HEIGHT * Math.sin(phi) * Math.cos(theta);
        const fy = ZEE_HEIGHT * Math.cos(phi);
        const fz = ZEE_HEIGHT * Math.sin(phi) * Math.sin(theta);

        vertices.push(fx, fy, fz);

        if (i > 0) {
          indices.push(0, i, i + 1);
        }
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
      geometry.setIndex(indices);
      geometry.computeVertexNormals();

      const fillMaterial = new THREE.MeshBasicMaterial({
        color: 0x00b4b4,
        transparent: true,
        opacity: 0.22,
        side: THREE.DoubleSide,
        depthWrite: false
      });

      const mesh = new THREE.Mesh(geometry, fillMaterial);
      mesh.userData = { zone: zone, isZEE: true };
      mesh.renderOrder = 1;
      zoneGroup.add(mesh);
      zoneMeshes.push(mesh);

      const borderPoints = [];
      for (let i = 0; i <= ZONE_SEGMENTS; i++) {
        const idx = (i + 1) * 3;
        if (idx + 2 < vertices.length) {
          borderPoints.push(new THREE.Vector3(
            vertices[idx] * 1.0005,
            vertices[idx + 1] * 1.0005,
            vertices[idx + 2] * 1.0005
          ));
        }
      }

      const borderGeo = new THREE.BufferGeometry().setFromPoints(borderPoints);
      const borderMaterial = new THREE.LineBasicMaterial({
        color: 0x00e0e0,
        transparent: true,
        opacity: 0.55,
        linewidth: 1
      });
      const borderLine = new THREE.Line(borderGeo, borderMaterial);
      borderLine.renderOrder = 2;
      zoneGroup.add(borderLine);

      const dotGeo = new THREE.SphereGeometry(0.006, 8, 8);
      const dotMat = new THREE.MeshBasicMaterial({
        color: 0x00ffff,
        transparent: true,
        opacity: 0.7
      });
      const dot = new THREE.Mesh(dotGeo, dotMat);
      dot.position.set(cx * 1.005, cy * 1.005, cz * 1.005);
      zoneGroup.add(dot);

      return { mesh, borderLine, dot };
    }

    const zoneObjects = ZEE_ZONES.map(zone => createZoneDisc(zone));

    // ====================================================
    // STARFIELD
    // ====================================================
    function createStarfield() {
      const starCount = 2000;
      const positions = new Float32Array(starCount * 3);
      const sizes = new Float32Array(starCount);

      for (let i = 0; i < starCount; i++) {
        const r = 15 + Math.random() * 35;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);

        positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i * 3 + 2] = r * Math.cos(phi);
        sizes[i] = 0.3 + Math.random() * 1.2;
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geo.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));

      const mat = new THREE.PointsMaterial({
        color: 0xaabbdd,
        size: 0.04,
        transparent: true,
        opacity: 0.6,
        sizeAttenuation: true,
        depthWrite: false
      });

      return new THREE.Points(geo, mat);
    }
    scene.add(createStarfield());

    // ====================================================
    // RAYCASTING
    // ====================================================
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2(-999, -999);
    let hoveredZone = null;
    let isUserInteracting = false;

    container.addEventListener('pointermove', (e) => {
      const rect = container.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

      tooltip.style.left = (e.clientX + 18) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';

      const tooltipRect = tooltip.getBoundingClientRect();
      if (tooltipRect.right > window.innerWidth - 10) {
        tooltip.style.left = (e.clientX - tooltipRect.width - 18) + 'px';
      }
      if (tooltipRect.bottom > window.innerHeight - 10) {
        tooltip.style.top = (e.clientY - tooltipRect.height - 10) + 'px';
      }
    });

    container.addEventListener('pointerdown', () => {
      isUserInteracting = true;
      controls.autoRotate = false;
    });

    container.addEventListener('pointerup', () => {
      isUserInteracting = false;
      clearTimeout(window._resumeTimer);
      window._resumeTimer = setTimeout(() => {
        if (!isUserInteracting) {
          controls.autoRotate = true;
        }
      }, 3000);
    });

    function formatArea(km2) {
      if (km2 >= 1000000) {
        return (km2 / 1000000).toFixed(1).replace('.', ',') + ' M km\u00B2';
      }
      return km2.toLocaleString('fr-FR') + ' km\u00B2';
    }

    function checkHover() {
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(zoneMeshes);

      if (intersects.length > 0) {
        const hit = intersects[0].object;
        const zone = hit.userData.zone;

        if (hoveredZone !== zone) {
          if (hoveredZone) {
            resetZoneHighlight(hoveredZone);
          }
          hoveredZone = zone;
          highlightZone(zone);

          tooltipName.textContent = zone.name;
          tooltipArea.textContent = formatArea(zone.area);
          tooltipDetail.textContent = zone.detail;
        }

        tooltip.classList.add('visible');
        container.style.cursor = 'pointer';
      } else {
        if (hoveredZone) {
          resetZoneHighlight(hoveredZone);
          hoveredZone = null;
        }
        tooltip.classList.remove('visible');
        container.style.cursor = isUserInteracting ? 'grabbing' : 'grab';
      }
    }

    function highlightZone(zone) {
      for (const obj of zoneObjects) {
        if (obj.mesh.userData.zone === zone) {
          obj.mesh.material.opacity = 0.45;
          obj.mesh.material.color.set(0x00e8e8);
          obj.borderLine.material.opacity = 0.9;
          obj.borderLine.material.color.set(0x00ffff);
          obj.dot.material.opacity = 1.0;
          obj.dot.scale.set(1.5, 1.5, 1.5);
          break;
        }
      }
    }

    function resetZoneHighlight(zone) {
      for (const obj of zoneObjects) {
        if (obj.mesh.userData.zone === zone) {
          obj.mesh.material.opacity = 0.22;
          obj.mesh.material.color.set(0x00b4b4);
          obj.borderLine.material.opacity = 0.55;
          obj.borderLine.material.color.set(0x00e0e0);
          obj.dot.material.opacity = 0.7;
          obj.dot.scale.set(1, 1, 1);
          break;
        }
      }
    }

    // ====================================================
    // ANIMATION LOOP
    // ====================================================
    let frameCount = 0;

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      controls.update();

      if (frameCount % 2 === 0) {
        const pulse = 0.18 + Math.sin(frameCount * 0.015) * 0.04;
        for (const obj of zoneObjects) {
          if (obj.mesh.userData.zone !== hoveredZone) {
            obj.mesh.material.opacity = pulse;
          }
        }
      }

      checkHover();
      renderer.render(scene, camera);
    }

    // ====================================================
    // RESIZE HANDLER
    // ====================================================
    window.addEventListener('resize', () => {
      const w = container.clientWidth;
      const h = container.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    });

    // ====================================================
    // START
    // ====================================================
    animate();

  </script>
</body>
</html>
