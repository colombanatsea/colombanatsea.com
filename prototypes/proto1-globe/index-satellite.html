<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZEE de France — Globe Interactif (Satellite) | Colomban at Sea</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0e1a;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      width: 100vw;
    }

    #globe-container {
      width: 100%;
      height: 100vh;
      position: relative;
      overflow: hidden;
      cursor: grab;
    }

    #globe-container:active {
      cursor: grabbing;
    }

    canvas {
      display: block;
    }

    /* Header overlay */
    #header-overlay {
      position: absolute;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
      pointer-events: none;
      width: 90%;
      max-width: 720px;
    }

    /* Total counter bottom right */
    #total-counter {
      position: absolute;
      bottom: 32px;
      right: 36px;
      z-index: 10;
      pointer-events: none;
      text-align: right;
    }

    #total-counter .label {
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    #total-counter .value {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      color: #00d4d4;
      text-shadow: 0 0 30px rgba(0, 212, 212, 0.4);
      line-height: 1.1;
    }

    #total-counter .unit {
      font-family: 'Source Serif 4', serif;
      font-weight: 400;
      font-style: italic;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }

    /* Tooltip */
    #tooltip {
      position: absolute;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      background: rgba(10, 14, 30, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 200, 200, 0.35);
      border-radius: 10px;
      padding: 14px 20px;
      min-width: 180px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px rgba(0,180,180,0.1);
    }

    #tooltip.visible {
      opacity: 1;
    }

    #tooltip .zone-name {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      color: #fff;
      margin-bottom: 4px;
    }

    #tooltip .zone-area {
      font-family: 'Source Serif 4', serif;
      font-style: italic;
      font-size: 0.85rem;
      color: #00d4d4;
    }

    #tooltip .zone-detail {
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
    }

    /* Legend bottom left */
    #legend {
      position: absolute;
      bottom: 32px;
      left: 36px;
      z-index: 10;
      pointer-events: auto;
    }

    #legend .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      user-select: none;
      transition: opacity 0.25s ease;
    }

    #legend .legend-item:hover {
      opacity: 0.85;
    }

    #legend .legend-item.disabled {
      opacity: 0.35;
    }

    #legend .legend-item.disabled .legend-label {
      text-decoration: line-through;
    }

    #legend .swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    #legend .swatch.zee {
      border: 1px solid rgba(0,200,200,0.5);
      background: rgba(0, 180, 180, 0.35);
    }

    #legend .swatch.cables {
      border: 1px solid rgba(0, 180, 180, 0.5);
      background: rgba(0, 180, 180, 0.30);
    }

    #legend .swatch.traffic {
      border: 1px solid rgba(255, 100, 50, 0.5);
      background: rgba(255, 100, 50, 0.30);
    }

    #legend .legend-label {
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.5);
    }

    /* Loading screen */
    #loading {
      position: absolute;
      inset: 0;
      z-index: 999;
      background: #0a0e1a;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      transition: opacity 0.8s ease;
    }

    #loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #loading .spinner {
      width: 40px;
      height: 40px;
      border: 2px solid rgba(0,212,212,0.15);
      border-top-color: #00d4d4;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    #loading .load-text {
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="globe-container">
    <div id="header-overlay"></div>

    <div id="total-counter">
      <div class="label">Surface totale ZEE</div>
      <div class="value">11 691 000</div>
      <div class="unit">km&#178;</div>
    </div>

    <div id="legend">
      <div class="legend-item" data-layer="zee">
        <div class="swatch zee"></div>
        <span class="legend-label">Zone &Eacute;conomique Exclusive fran&ccedil;aise</span>
      </div>
      <div class="legend-item" data-layer="cables">
        <div class="swatch cables"></div>
        <span class="legend-label">C&acirc;bles sous-marins</span>
      </div>
      <div class="legend-item" data-layer="traffic">
        <div class="swatch traffic"></div>
        <span class="legend-label">Densit&eacute; du trafic maritime (GMTDS)</span>
      </div>
    </div>

    <div id="tooltip">
      <div class="zone-name"></div>
      <div class="zone-area"></div>
      <div class="zone-detail"></div>
    </div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <div class="load-text">Chargement du globe...</div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ====================================================
    // CONFIG
    // ====================================================
    const GLOBE_RADIUS = 1.0;
    const ZEE_HEIGHT = 1.003;
    const AUTO_ROTATE_SPEED = 0.08;

    // ====================================================
    // SCENE SETUP
    // ====================================================
    const container = document.getElementById('globe-container');
    const tooltip = document.getElementById('tooltip');
    const tooltipName = tooltip.querySelector('.zone-name');
    const tooltipArea = tooltip.querySelector('.zone-area');
    const tooltipDetail = tooltip.querySelector('.zone-detail');

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      45,
      container.clientWidth / container.clientHeight,
      0.01,
      100
    );
    camera.position.set(0, 0.4, 2.8);

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: false,
      powerPreference: 'high-performance'
    });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x0a0e1a, 1);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    // ====================================================
    // CONTROLS
    // ====================================================
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.rotateSpeed = 0.5;
    controls.enableZoom = false;
    controls.minDistance = 1.5;
    controls.maxDistance = 5;
    controls.enablePan = false;
    controls.autoRotate = true;
    controls.autoRotateSpeed = AUTO_ROTATE_SPEED;

    // ====================================================
    // LIGHTING
    // ====================================================
    const ambientLight = new THREE.AmbientLight(0x666666, 1.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 3, 5);
    scene.add(dirLight);

    const backLight = new THREE.DirectionalLight(0x334455, 0.4);
    backLight.position.set(-3, -2, -5);
    scene.add(backLight);

    // ====================================================
    // GLOBE -- satellite textured sphere
    // ====================================================
    const textureLoader = new THREE.TextureLoader();

    const EARTH_TEXTURE_URL = 'https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg';
    const EARTH_BUMP_URL = 'https://unpkg.com/three-globe/example/img/earth-topology.png';

    let globeReady = false;

    const globeGeometry = new THREE.SphereGeometry(GLOBE_RADIUS, 96, 96);
    const globeMaterial = new THREE.MeshPhongMaterial({
      color: 0xffffff,
      shininess: 25,
      bumpScale: 0.015
    });
    const globe = new THREE.Mesh(globeGeometry, globeMaterial);
    scene.add(globe);

    // Load textures
    let loadedCount = 0;
    const totalLoads = 2;

    function checkAllLoaded() {
      loadedCount++;
      if (loadedCount >= totalLoads) {
        globeReady = true;
        const loadingEl = document.getElementById('loading');
        loadingEl.classList.add('fade-out');
        setTimeout(() => loadingEl.remove(), 900);
      }
    }

    textureLoader.load(EARTH_TEXTURE_URL, (texture) => {
      texture.colorSpace = THREE.SRGBColorSpace;
      globeMaterial.map = texture;
      globeMaterial.needsUpdate = true;
      checkAllLoaded();
    }, undefined, () => {
      globeMaterial.color.set(0x0f1d30);
      globeMaterial.emissive = new THREE.Color(0x050a14);
      globeMaterial.emissiveIntensity = 0.3;
      globeMaterial.needsUpdate = true;
      checkAllLoaded();
    });

    textureLoader.load(EARTH_BUMP_URL, (texture) => {
      globeMaterial.bumpMap = texture;
      globeMaterial.needsUpdate = true;
      checkAllLoaded();
    }, undefined, () => {
      checkAllLoaded();
    });

    // ====================================================
    // ATMOSPHERE GLOW
    // ====================================================
    const atmosphereVS = `
      varying vec3 vNormal;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;
    const atmosphereFS = `
      varying vec3 vNormal;
      void main() {
        float intensity = pow(0.65 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 3.0);
        gl_FragColor = vec4(0.15, 0.55, 0.7, 1.0) * intensity * 0.7;
      }
    `;
    const atmosphereMaterial = new THREE.ShaderMaterial({
      vertexShader: atmosphereVS,
      fragmentShader: atmosphereFS,
      blending: THREE.AdditiveBlending,
      side: THREE.BackSide,
      transparent: true,
      depthWrite: false
    });
    const atmosphere = new THREE.Mesh(
      new THREE.SphereGeometry(GLOBE_RADIUS * 1.12, 64, 64),
      atmosphereMaterial
    );
    scene.add(atmosphere);

    // ====================================================
    // UTILITY: lat/lon to Vector3
    // ====================================================
    function latLonToVec3(lat, lon, radius) {
      const phi = (90 - lat) * Math.PI / 180;
      const theta = -lon * Math.PI / 180;
      return new THREE.Vector3(
        radius * Math.sin(phi) * Math.cos(theta),
        radius * Math.cos(phi),
        radius * Math.sin(phi) * Math.sin(theta)
      );
    }

    // ====================================================
    // ZEE ZONES -- Real GeoJSON polygons from marineregions.org
    // ====================================================
    const zoneMeshes = [];
    const zoneGroup = new THREE.Group();
    scene.add(zoneGroup);

    // Store zone objects for highlight/unhighlight
    const zoneObjects = [];

    function triangulatePolygon(ring) {
      // Simple ear-clipping-style fan triangulation from first vertex
      // Works well for convex and mildly concave polygons
      const indices = [];
      for (let i = 1; i < ring.length - 1; i++) {
        indices.push(0, i, i + 1);
      }
      return indices;
    }

    function createZeePolygon(coords, properties) {
      // coords is an array of [lon, lat] rings; first ring is outer boundary
      const outerRing = coords[0];
      if (!outerRing || outerRing.length < 3) return null;

      // Simplify if too many vertices (keep every Nth point to stay under ~500 pts)
      let ring = outerRing;
      const MAX_PTS = 500;
      if (ring.length > MAX_PTS) {
        const step = Math.ceil(ring.length / MAX_PTS);
        const simplified = [];
        for (let i = 0; i < ring.length; i += step) {
          simplified.push(ring[i]);
        }
        // Ensure last point matches first for closed ring
        if (simplified[simplified.length - 1] !== ring[ring.length - 1]) {
          simplified.push(ring[ring.length - 1]);
        }
        ring = simplified;
      }

      // Build 3D vertices on globe surface
      const vertices = [];
      for (let i = 0; i < ring.length; i++) {
        const lon = ring[i][0];
        const lat = ring[i][1];
        if (isNaN(lat) || isNaN(lon)) continue;
        const v = latLonToVec3(lat, lon, ZEE_HEIGHT);
        vertices.push(v.x, v.y, v.z);
      }

      const vertCount = vertices.length / 3;
      if (vertCount < 3) return null;

      // Triangulate using fan from first vertex
      const indices = [];
      for (let i = 1; i < vertCount - 1; i++) {
        indices.push(0, i, i + 1);
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
      geometry.setIndex(indices);
      geometry.computeVertexNormals();

      const fillMaterial = new THREE.MeshBasicMaterial({
        color: 0x00b4b4,
        transparent: true,
        opacity: 0.22,
        side: THREE.DoubleSide,
        depthWrite: false
      });

      const mesh = new THREE.Mesh(geometry, fillMaterial);
      mesh.userData = {
        isZEE: true,
        zone: {
          name: properties.geoname || properties.territory1 || 'ZEE France',
          detail: properties.sovereign1 || 'France',
          area: properties.area_km2 || 0
        }
      };
      mesh.renderOrder = 1;
      zoneGroup.add(mesh);
      zoneMeshes.push(mesh);

      // Border line
      const borderPoints = [];
      for (let i = 0; i < ring.length; i++) {
        const lon = ring[i][0];
        const lat = ring[i][1];
        if (isNaN(lat) || isNaN(lon)) continue;
        const v = latLonToVec3(lat, lon, ZEE_HEIGHT * 1.0005);
        borderPoints.push(v);
      }

      let borderLine = null;
      if (borderPoints.length >= 2) {
        const borderGeo = new THREE.BufferGeometry().setFromPoints(borderPoints);
        const borderMaterial = new THREE.LineBasicMaterial({
          color: 0x00e0e0,
          transparent: true,
          opacity: 0.55,
          linewidth: 1
        });
        borderLine = new THREE.Line(borderGeo, borderMaterial);
        borderLine.renderOrder = 2;
        zoneGroup.add(borderLine);
      }

      return { mesh, borderLine };
    }

    function processEEZGeoJSON(geojson) {
      if (!geojson || !geojson.features) {
        console.warn('EEZ GeoJSON: invalid data');
        return;
      }

      let polyCount = 0;
      for (const feature of geojson.features) {
        const geom = feature.geometry;
        const props = feature.properties || {};
        if (!geom) continue;

        const polygonCoords = [];
        if (geom.type === 'Polygon') {
          polygonCoords.push(geom.coordinates);
        } else if (geom.type === 'MultiPolygon') {
          for (const poly of geom.coordinates) {
            polygonCoords.push(poly);
          }
        }

        for (const coords of polygonCoords) {
          const result = createZeePolygon(coords, props);
          if (result) {
            zoneObjects.push(result);
            polyCount++;
          }
        }
      }
      console.log(`EEZ: loaded ${polyCount} polygons from ${geojson.features.length} features`);
    }

    // Fetch real French EEZ polygons from marineregions.org
    const EEZ_URL = "https://geo.vliz.be/geoserver/MarineRegions/wfs?service=WFS&version=1.0.0&request=GetFeature&typeName=MarineRegions:eez&outputFormat=application/json&CQL_FILTER=sovereign1=%27France%27&maxFeatures=50";

    fetch(EEZ_URL)
      .then(res => {
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      })
      .then(geojson => processEEZGeoJSON(geojson))
      .catch(err => {
        console.warn('EEZ fetch failed:', err);
        console.log('Loading fallback EEZ disc approximations...');
        loadFallbackZEE();
      });

    // Fallback: disc approximation if GeoJSON fetch fails
    function loadFallbackZEE() {
      const EARTH_RADIUS_KM = 6371;
      const ZONE_SEGMENTS = 64;
      const ZEE_ZONES = [
        { name: 'Metropole', detail: 'Atlantique + Mediterranee', lat: 46, lng: -3, area: 350000 },
        { name: 'Guyane', detail: 'Amerique du Sud', lat: 5, lng: -52, area: 130000 },
        { name: 'Martinique', detail: 'Antilles', lat: 14.6, lng: -61, area: 50000 },
        { name: 'Guadeloupe', detail: 'Antilles', lat: 16.2, lng: -61.5, area: 90000 },
        { name: 'La Reunion', detail: 'Ocean Indien', lat: -21, lng: 55.5, area: 315000 },
        { name: 'Mayotte', detail: 'Ocean Indien', lat: -12.8, lng: 45.2, area: 74000 },
        { name: 'Nouvelle-Caledonie', detail: 'Ocean Pacifique', lat: -21, lng: 165, area: 1740000 },
        { name: 'Polynesie francaise', detail: 'Ocean Pacifique', lat: -17, lng: -149, area: 4800000 },
        { name: 'Wallis-et-Futuna', detail: 'Ocean Pacifique', lat: -13.3, lng: -176.2, area: 260000 },
        { name: 'Kerguelen', detail: 'TAAF -- Ocean Indien austral', lat: -49.5, lng: 69.5, area: 570000 },
        { name: 'Crozet', detail: 'TAAF -- Ocean Indien austral', lat: -46, lng: 51, area: 570000 },
        { name: 'Saint-Pierre-et-Miquelon', detail: 'Atlantique Nord', lat: 46.8, lng: -56.2, area: 12000 },
        { name: 'Saint-Martin / Saint-Barthelemy', detail: 'Antilles', lat: 18, lng: -63, area: 10000 },
        { name: 'Clipperton', detail: 'Ocean Pacifique', lat: 10.3, lng: -109.2, area: 440000 },
        { name: 'Amsterdam / Saint-Paul', detail: 'TAAF -- Ocean Indien austral', lat: -37.8, lng: 77.5, area: 500000 },
        { name: 'Iles Eparses', detail: 'Glorieuses, Juan de Nova, Europa, Bassas da India', lat: -15, lng: 43, area: 640000 }
      ];

      function areaToAngularRadius(areaKm2) {
        return Math.sqrt(areaKm2 / Math.PI) / EARTH_RADIUS_KM;
      }

      for (const zone of ZEE_ZONES) {
        const angularRadius = areaToAngularRadius(zone.area);
        const displayRadius = Math.min(angularRadius, 0.35);
        const centerPhi = (90 - zone.lat) * Math.PI / 180;
        const centerTheta = -zone.lng * Math.PI / 180;

        const vertices = [];
        const cx = ZEE_HEIGHT * Math.sin(centerPhi) * Math.cos(centerTheta);
        const cy = ZEE_HEIGHT * Math.cos(centerPhi);
        const cz = ZEE_HEIGHT * Math.sin(centerPhi) * Math.sin(centerTheta);
        vertices.push(cx, cy, cz);

        for (let i = 0; i <= ZONE_SEGMENTS; i++) {
          const bearing = (i / ZONE_SEGMENTS) * Math.PI * 2;
          const lat1 = zone.lat * Math.PI / 180;
          const lon1 = zone.lng * Math.PI / 180;
          const lat2 = Math.asin(
            Math.sin(lat1) * Math.cos(displayRadius) +
            Math.cos(lat1) * Math.sin(displayRadius) * Math.cos(bearing)
          );
          const lon2 = lon1 + Math.atan2(
            Math.sin(bearing) * Math.sin(displayRadius) * Math.cos(lat1),
            Math.cos(displayRadius) - Math.sin(lat1) * Math.sin(lat2)
          );
          const phi = (Math.PI / 2) - lat2;
          const theta = -lon2;
          vertices.push(
            ZEE_HEIGHT * Math.sin(phi) * Math.cos(theta),
            ZEE_HEIGHT * Math.cos(phi),
            ZEE_HEIGHT * Math.sin(phi) * Math.sin(theta)
          );
        }

        const indices = [];
        for (let i = 1; i <= ZONE_SEGMENTS; i++) {
          indices.push(0, i, i + 1);
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        geometry.setIndex(indices);
        geometry.computeVertexNormals();

        const fillMaterial = new THREE.MeshBasicMaterial({
          color: 0x00b4b4, transparent: true, opacity: 0.22,
          side: THREE.DoubleSide, depthWrite: false
        });
        const mesh = new THREE.Mesh(geometry, fillMaterial);
        mesh.userData = { zone, isZEE: true };
        mesh.renderOrder = 1;
        zoneGroup.add(mesh);
        zoneMeshes.push(mesh);

        const borderPoints = [];
        for (let i = 1; i <= ZONE_SEGMENTS + 1; i++) {
          const idx = i * 3;
          if (idx + 2 < vertices.length) {
            borderPoints.push(new THREE.Vector3(
              vertices[idx] * 1.0005, vertices[idx + 1] * 1.0005, vertices[idx + 2] * 1.0005
            ));
          }
        }
        const borderGeo = new THREE.BufferGeometry().setFromPoints(borderPoints);
        const borderMaterial = new THREE.LineBasicMaterial({
          color: 0x00e0e0, transparent: true, opacity: 0.55
        });
        const borderLine = new THREE.Line(borderGeo, borderMaterial);
        borderLine.renderOrder = 2;
        zoneGroup.add(borderLine);

        zoneObjects.push({ mesh, borderLine });
      }
    }

    // ====================================================
    // STARFIELD
    // ====================================================
    function createStarfield() {
      const starCount = 2000;
      const positions = new Float32Array(starCount * 3);
      const sizes = new Float32Array(starCount);

      for (let i = 0; i < starCount; i++) {
        const r = 15 + Math.random() * 35;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);

        positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i * 3 + 2] = r * Math.cos(phi);
        sizes[i] = 0.3 + Math.random() * 1.2;
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geo.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));

      const mat = new THREE.PointsMaterial({
        color: 0xaabbdd,
        size: 0.04,
        transparent: true,
        opacity: 0.6,
        sizeAttenuation: true,
        depthWrite: false
      });

      return new THREE.Points(geo, mat);
    }
    scene.add(createStarfield());

    // ====================================================
    // SUBMARINE CABLES LAYER
    // ====================================================
    const cableGroup = new THREE.Group();
    scene.add(cableGroup);
    const CABLE_RADIUS = GLOBE_RADIUS + 0.005;

    function buildCableLine(coords, color) {
      const points = [];
      for (let i = 0; i < coords.length; i++) {
        const lon = coords[i][0];
        const lat = coords[i][1];
        if (isNaN(lat) || isNaN(lon)) continue;
        points.push(latLonToVec3(lat, lon, CABLE_RADIUS));
      }
      if (points.length < 2) return null;
      const geo = new THREE.BufferGeometry().setFromPoints(points);
      const mat = new THREE.LineBasicMaterial({
        color: color,
        transparent: true,
        opacity: 0.35,
        depthWrite: false
      });
      return new THREE.Line(geo, mat);
    }

    function processCableGeoJSON(geojson) {
      if (!geojson || !geojson.features) {
        console.warn('Submarine cables: invalid GeoJSON data');
        return;
      }
      let lineCount = 0;
      for (const feature of geojson.features) {
        const geom = feature.geometry;
        if (!geom) continue;

        let cableColor;
        if (feature.properties && feature.properties.color) {
          try {
            cableColor = new THREE.Color(feature.properties.color);
          } catch(e) {
            cableColor = new THREE.Color(0x00b4b4);
          }
        } else {
          cableColor = new THREE.Color(0x00b4b4);
        }

        const coordSets = [];
        if (geom.type === 'MultiLineString') {
          for (const lineCoords of geom.coordinates) {
            coordSets.push(lineCoords);
          }
        } else if (geom.type === 'LineString') {
          coordSets.push(geom.coordinates);
        }

        for (const coords of coordSets) {
          const line = buildCableLine(coords, cableColor);
          if (line) {
            line.renderOrder = 3;
            cableGroup.add(line);
            lineCount++;
          }
        }
      }
      console.log(`Submarine cables: loaded ${lineCount} line segments`);
    }

    // Fetch submarine cables from GitHub
    const CABLE_URL = 'https://raw.githubusercontent.com/lifewinning/submarine-cable-taps/master/data/submarine_cables.geojson';

    fetch(CABLE_URL)
      .then(res => {
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      })
      .then(geojson => processCableGeoJSON(geojson))
      .catch(err => {
        console.warn('Cable fetch failed:', err);
      });

    // ====================================================
    // MARITIME TRAFFIC -- Animated particle system (Windy-style)
    // ====================================================
    const trafficGroup = new THREE.Group();
    scene.add(trafficGroup);

    const TRAFFIC_PARTICLE_RADIUS = GLOBE_RADIUS + 0.008;

    // Major shipping routes defined as polylines with density weights
    // Each route: { points: [[lat, lon], ...], density: 0-1, direction: [dlat, dlon] normalized }
    const SHIPPING_ROUTES = [
      // Strait of Malacca / Singapore
      { points: [[5.5, 95], [3.0, 100], [1.3, 103.8], [1.0, 104.5]], density: 1.0 },
      { points: [[1.3, 104], [3.5, 107], [7, 110], [10, 112]], density: 0.8 },
      // South China Sea
      { points: [[1.3, 104], [5, 109], [10, 114], [15, 117], [20, 118], [22, 114.5]], density: 0.9 },
      { points: [[22, 114.5], [25, 121], [30, 125], [34, 130], [35, 135]], density: 0.8 },
      // East China Sea / Japan
      { points: [[30, 125], [33, 130], [35, 135], [35, 140]], density: 0.7 },
      // English Channel
      { points: [[48.5, -5.5], [49.5, -3], [50, -1], [50.5, 0.5], [51, 1.5], [51.5, 2.5], [52, 3.5]], density: 1.0 },
      // North Sea
      { points: [[51.5, 2.5], [52.5, 3.5], [53.5, 5], [54, 7], [56, 8], [57, 10]], density: 0.7 },
      // Suez Canal approach (Mediterranean side)
      { points: [[35, -1], [36, 3], [36, 8], [35.5, 12], [34, 16], [33, 20], [32, 25], [31.5, 30], [31, 32.3]], density: 0.9 },
      // Suez Canal approach (Red Sea side)
      { points: [[30, 32.5], [28, 33.5], [25, 35], [20, 38], [15, 42], [12.5, 43.3]], density: 0.9 },
      // Strait of Gibraltar
      { points: [[36.5, -8], [36, -5.8], [36, -5.3], [36.2, -4]], density: 0.95 },
      // Western Mediterranean
      { points: [[36.2, -4], [37, -1], [38, 1], [39, 3], [40, 5], [41, 8]], density: 0.7 },
      // Persian Gulf / Strait of Hormuz
      { points: [[26, 50], [26.5, 52], [26, 54], [25.5, 56], [24.5, 57.5], [23.5, 58.5]], density: 0.85 },
      { points: [[23.5, 58.5], [20, 60], [15, 55], [12.5, 43.3]], density: 0.8 },
      // Gulf of Aden / Arabian Sea
      { points: [[12.5, 43.3], [12, 45], [13, 48], [15, 55], [18, 60], [20, 65], [22, 68], [22.5, 70]], density: 0.75 },
      // Indian Ocean to Malacca
      { points: [[22.5, 70], [18, 75], [12, 80], [8, 85], [6, 90], [5.5, 95]], density: 0.7 },
      // Cape of Good Hope
      { points: [[0, 42], [-5, 40], [-15, 38], [-25, 34], [-30, 30], [-34, 25], [-35, 18]], density: 0.6 },
      { points: [[-35, 18], [-34.5, 16], [-33, 15], [-30, 12], [-25, 5], [-15, -5], [-5, -15], [5, -20]], density: 0.5 },
      // North Atlantic (Europe to US East Coast)
      { points: [[48, -5], [50, -10], [51, -20], [49, -30], [46, -40], [42, -50], [40, -60], [40, -70], [40.5, -74]], density: 0.7 },
      // US East Coast
      { points: [[40.5, -74], [38, -75], [33, -78], [30, -80], [27, -80], [25, -80]], density: 0.6 },
      // Panama approach (Caribbean)
      { points: [[25, -80], [22, -80], [18, -78], [15, -76], [12, -75], [9.5, -79.5]], density: 0.65 },
      // Panama approach (Pacific)
      { points: [[9, -79.5], [5, -82], [0, -85], [-5, -82], [-10, -78], [-12, -77]], density: 0.5 },
      // Pacific routes (trans-Pacific)
      { points: [[35, 140], [35, 150], [35, 160], [34, 170], [33, 180], [32, -170], [30, -160], [28, -150], [25, -140], [22, -130], [20, -120]], density: 0.5 },
      // East Africa coast
      { points: [[-34, 26], [-30, 31], [-25, 35], [-20, 37], [-15, 40], [-10, 40], [-5, 40], [0, 42]], density: 0.4 },
      // Baltic Sea
      { points: [[54, 10], [55, 13], [55.5, 15], [56, 17], [57, 19], [58, 20], [59.5, 22], [60, 25]], density: 0.55 },
      // Bay of Biscay
      { points: [[43, -9], [44, -5], [45, -2], [46, -1], [47, -2], [48, -4], [48.5, -5.5]], density: 0.5 },
      // West Africa coast
      { points: [[5, -20], [10, -17], [14, -17], [20, -17], [25, -15], [30, -10], [35, -7], [36.5, -8]], density: 0.45 },
      // Taiwan Strait
      { points: [[22, 114.5], [23, 117], [24, 118.5], [25, 120], [25.5, 121.5]], density: 0.8 },
      // Korea Strait
      { points: [[33, 128], [34, 130], [35, 132], [34.5, 135]], density: 0.65 },
    ];

    // Particle system
    const PARTICLE_COUNT = 5000;
    const particlePositions = new Float32Array(PARTICLE_COUNT * 3);
    const particleColors = new Float32Array(PARTICLE_COUNT * 3);
    const particleSizes = new Float32Array(PARTICLE_COUNT);

    // Per-particle state (not uploaded to GPU, used for animation)
    const particleState = [];

    // Compute total density weight for distributing particles
    let totalDensity = 0;
    for (const route of SHIPPING_ROUTES) {
      // Weight by route length * density
      let routeLength = 0;
      for (let i = 1; i < route.points.length; i++) {
        const dlat = route.points[i][0] - route.points[i - 1][0];
        const dlon = route.points[i][1] - route.points[i - 1][1];
        routeLength += Math.sqrt(dlat * dlat + dlon * dlon);
      }
      route._length = routeLength;
      route._weight = routeLength * route.density;
      totalDensity += route._weight;
    }

    // Distribute particles across routes proportionally
    let particleIdx = 0;
    for (const route of SHIPPING_ROUTES) {
      const count = Math.max(1, Math.round((route._weight / totalDensity) * PARTICLE_COUNT));
      for (let i = 0; i < count && particleIdx < PARTICLE_COUNT; i++) {
        // Random position along route
        const t = Math.random(); // 0..1 along route
        const totalLen = route._length;
        let targetDist = t * totalLen;
        let segIdx = 0;
        let segT = 0;

        let accum = 0;
        for (let s = 1; s < route.points.length; s++) {
          const dlat = route.points[s][0] - route.points[s - 1][0];
          const dlon = route.points[s][1] - route.points[s - 1][1];
          const segLen = Math.sqrt(dlat * dlat + dlon * dlon);
          if (accum + segLen >= targetDist) {
            segIdx = s - 1;
            segT = (targetDist - accum) / segLen;
            break;
          }
          accum += segLen;
          segIdx = s - 1;
          segT = 1.0;
        }

        const lat0 = route.points[segIdx][0];
        const lon0 = route.points[segIdx][1];
        const lat1 = route.points[Math.min(segIdx + 1, route.points.length - 1)][0];
        const lon1 = route.points[Math.min(segIdx + 1, route.points.length - 1)][1];

        const lat = lat0 + (lat1 - lat0) * segT;
        const lon = lon0 + (lon1 - lon0) * segT;

        // Add some lateral spread (perpendicular to route)
        const spread = (Math.random() - 0.5) * 2.5;
        const dlat = lat1 - lat0;
        const dlon = lon1 - lon0;
        const len = Math.sqrt(dlat * dlat + dlon * dlon) || 1;
        const perpLat = -dlon / len;
        const perpLon = dlat / len;

        const finalLat = lat + perpLat * spread;
        const finalLon = lon + perpLon * spread;

        const v = latLonToVec3(finalLat, finalLon, TRAFFIC_PARTICLE_RADIUS);
        particlePositions[particleIdx * 3] = v.x;
        particlePositions[particleIdx * 3 + 1] = v.y;
        particlePositions[particleIdx * 3 + 2] = v.z;

        // Color: orange to red gradient based on density
        const densityFactor = route.density;
        const r = 1.0;
        const g = 0.3 + (1.0 - densityFactor) * 0.35;
        const b = 0.05 + (1.0 - densityFactor) * 0.1;
        particleColors[particleIdx * 3] = r;
        particleColors[particleIdx * 3 + 1] = g;
        particleColors[particleIdx * 3 + 2] = b;

        particleSizes[particleIdx] = 0.003 + densityFactor * 0.002;

        // Store animation state
        particleState.push({
          routeIdx: SHIPPING_ROUTES.indexOf(route),
          t: t,                        // position along route [0,1]
          speed: 0.0002 + Math.random() * 0.0004, // speed along route
          spread: spread,              // lateral offset
          phase: Math.random() * Math.PI * 2, // for fade pulsing
          opacity: Math.random()
        });

        particleIdx++;
      }
    }

    // Fill remaining particles if any
    while (particleIdx < PARTICLE_COUNT) {
      particlePositions[particleIdx * 3] = 0;
      particlePositions[particleIdx * 3 + 1] = 0;
      particlePositions[particleIdx * 3 + 2] = 0;
      particleColors[particleIdx * 3] = 0;
      particleColors[particleIdx * 3 + 1] = 0;
      particleColors[particleIdx * 3 + 2] = 0;
      particleSizes[particleIdx] = 0;
      particleState.push({
        routeIdx: 0, t: 0, speed: 0, spread: 0, phase: 0, opacity: 0
      });
      particleIdx++;
    }

    // Create particle geometry
    const trafficParticleGeo = new THREE.BufferGeometry();
    trafficParticleGeo.setAttribute('position', new THREE.Float32BufferAttribute(particlePositions, 3));
    trafficParticleGeo.setAttribute('color', new THREE.Float32BufferAttribute(particleColors, 3));
    trafficParticleGeo.setAttribute('size', new THREE.Float32BufferAttribute(particleSizes, 1));

    // Custom shader for glow particles with per-vertex color and opacity
    const trafficVertexShader = `
      attribute float size;
      attribute float alpha;
      varying vec3 vColor;
      varying float vAlpha;
      void main() {
        vColor = color;
        vAlpha = alpha;
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = size * (200.0 / -mvPosition.z);
        gl_PointSize = max(gl_PointSize, 1.0);
        gl_Position = projectionMatrix * mvPosition;
      }
    `;

    const trafficFragmentShader = `
      varying vec3 vColor;
      varying float vAlpha;
      void main() {
        vec2 center = gl_PointCoord - vec2(0.5);
        float dist = length(center);
        if (dist > 0.5) discard;
        float glow = 1.0 - smoothstep(0.0, 0.5, dist);
        glow = pow(glow, 1.5);
        gl_FragColor = vec4(vColor * glow, glow * vAlpha);
      }
    `;

    // Alpha attribute for fading
    const particleAlphas = new Float32Array(PARTICLE_COUNT);
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particleAlphas[i] = particleState[i].opacity;
    }
    trafficParticleGeo.setAttribute('alpha', new THREE.Float32BufferAttribute(particleAlphas, 1));

    const trafficParticleMat = new THREE.ShaderMaterial({
      vertexShader: trafficVertexShader,
      fragmentShader: trafficFragmentShader,
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      vertexColors: true
    });

    const trafficParticles = new THREE.Points(trafficParticleGeo, trafficParticleMat);
    trafficParticles.renderOrder = 4;
    trafficGroup.add(trafficParticles);

    // Try to load GMTDS density tile to modulate particle density
    const GMTDS_WMS_URL = 'https://gmtds.maplarge.com/ogc/ais:density/wms?SERVICE=WMS&VERSION=1.3.0&REQUEST=GetMap&LAYERS=ais:density&STYLES=&FORMAT=image/png&TRANSPARENT=TRUE&CRS=EPSG:4326&WIDTH=2048&HEIGHT=1024&BBOX=-90,-180,90,180&time=2020-10-01T00:00:00Z';
    let densityData = null;
    let densityWidth = 0;
    let densityHeight = 0;

    // Load density image via canvas to read pixel data
    const densityImg = new Image();
    densityImg.crossOrigin = 'anonymous';
    densityImg.onload = function() {
      try {
        const canvas = document.createElement('canvas');
        canvas.width = 512;  // downscale for performance
        canvas.height = 256;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(densityImg, 0, 0, 512, 256);
        const imgData = ctx.getImageData(0, 0, 512, 256);
        densityData = imgData.data;
        densityWidth = 512;
        densityHeight = 256;
        console.log('GMTDS density data loaded for particle modulation');
      } catch (e) {
        console.warn('Could not read GMTDS pixel data (CORS):', e);
      }
    };
    densityImg.onerror = function() {
      console.warn('Could not load GMTDS density image');
    };
    densityImg.src = GMTDS_WMS_URL;

    function getDensityAt(lat, lon) {
      if (!densityData) return 1.0;
      // Map lat/lon to pixel coordinates
      // Image: BBOX=-90,-180,90,180 => x: lon, y: lat (flipped)
      const u = ((lon + 180) / 360) * densityWidth;
      const v = ((90 - lat) / 180) * densityHeight;
      const px = Math.floor(Math.max(0, Math.min(densityWidth - 1, u)));
      const py = Math.floor(Math.max(0, Math.min(densityHeight - 1, v)));
      const idx = (py * densityWidth + px) * 4;
      const r = densityData[idx];
      const g = densityData[idx + 1];
      const b = densityData[idx + 2];
      const a = densityData[idx + 3];
      // Use brightness as density (0..1)
      if (a < 10) return 0.2; // transparent = low density
      return Math.max(0.1, (r + g + b) / (255 * 3));
    }

    // ====================================================
    // Update traffic particles in animation loop
    // ====================================================
    function updateTrafficParticles(time) {
      const positions = trafficParticleGeo.attributes.position.array;
      const alphas = trafficParticleGeo.attributes.alpha.array;

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const state = particleState[i];
        if (state.speed === 0) continue;

        const route = SHIPPING_ROUTES[state.routeIdx];

        // Advance along route
        state.t += state.speed;
        if (state.t > 1.0) {
          state.t -= 1.0;
          state.phase = Math.random() * Math.PI * 2;
        }

        // Compute position on route
        const totalLen = route._length;
        const targetDist = state.t * totalLen;
        let segIdx = 0;
        let segT = 0;
        let accum = 0;

        for (let s = 1; s < route.points.length; s++) {
          const dlat = route.points[s][0] - route.points[s - 1][0];
          const dlon = route.points[s][1] - route.points[s - 1][1];
          const segLen = Math.sqrt(dlat * dlat + dlon * dlon);
          if (accum + segLen >= targetDist) {
            segIdx = s - 1;
            segT = (targetDist - accum) / segLen;
            break;
          }
          accum += segLen;
          segIdx = s - 1;
          segT = 1.0;
        }

        const p0 = route.points[segIdx];
        const p1 = route.points[Math.min(segIdx + 1, route.points.length - 1)];
        const lat = p0[0] + (p1[0] - p0[0]) * segT;
        const lon = p0[1] + (p1[1] - p0[1]) * segT;

        // Lateral spread
        const dlat = p1[0] - p0[0];
        const dlon = p1[1] - p0[1];
        const len = Math.sqrt(dlat * dlat + dlon * dlon) || 1;
        const perpLat = -dlon / len;
        const perpLon = dlat / len;

        const finalLat = lat + perpLat * state.spread;
        const finalLon = lon + perpLon * state.spread;

        const v = latLonToVec3(finalLat, finalLon, TRAFFIC_PARTICLE_RADIUS);
        positions[i * 3] = v.x;
        positions[i * 3 + 1] = v.y;
        positions[i * 3 + 2] = v.z;

        // Smooth fade in/out using sine pulse
        const fadeBase = 0.4 + 0.6 * Math.sin(state.phase + time * 0.001) * 0.5 + 0.5;
        // Modulate by GMTDS density if available
        const locDensity = getDensityAt(finalLat, finalLon);
        alphas[i] = fadeBase * Math.max(0.15, locDensity);
      }

      trafficParticleGeo.attributes.position.needsUpdate = true;
      trafficParticleGeo.attributes.alpha.needsUpdate = true;
    }

    // ====================================================
    // LAYER TOGGLES
    // ====================================================
    const layerVisibility = { zee: true, cables: true, traffic: true };

    document.querySelectorAll('#legend .legend-item[data-layer]').forEach(item => {
      item.addEventListener('click', () => {
        const layer = item.dataset.layer;
        layerVisibility[layer] = !layerVisibility[layer];
        item.classList.toggle('disabled', !layerVisibility[layer]);

        if (layer === 'zee') {
          zoneGroup.visible = layerVisibility.zee;
        } else if (layer === 'cables') {
          cableGroup.visible = layerVisibility.cables;
        } else if (layer === 'traffic') {
          trafficGroup.visible = layerVisibility.traffic;
        }
      });
    });

    // ====================================================
    // RAYCASTING
    // ====================================================
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2(-999, -999);
    let hoveredZone = null;
    let isUserInteracting = false;

    container.addEventListener('pointermove', (e) => {
      const rect = container.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

      tooltip.style.left = (e.clientX + 18) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';

      const tooltipRect = tooltip.getBoundingClientRect();
      if (tooltipRect.right > window.innerWidth - 10) {
        tooltip.style.left = (e.clientX - tooltipRect.width - 18) + 'px';
      }
      if (tooltipRect.bottom > window.innerHeight - 10) {
        tooltip.style.top = (e.clientY - tooltipRect.height - 10) + 'px';
      }
    });

    container.addEventListener('pointerdown', () => {
      isUserInteracting = true;
      controls.autoRotate = false;
    });

    container.addEventListener('pointerup', () => {
      isUserInteracting = false;
      clearTimeout(window._resumeTimer);
      window._resumeTimer = setTimeout(() => {
        if (!isUserInteracting) {
          controls.autoRotate = true;
        }
      }, 3000);
    });

    function formatArea(km2) {
      if (!km2 || km2 === 0) return '';
      if (km2 >= 1000000) {
        return (km2 / 1000000).toFixed(1).replace('.', ',') + ' M km\u00B2';
      }
      return km2.toLocaleString('fr-FR') + ' km\u00B2';
    }

    function checkHover() {
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(zoneMeshes);

      if (intersects.length > 0) {
        const hit = intersects[0].object;
        const zone = hit.userData.zone;

        if (hoveredZone !== zone) {
          if (hoveredZone) {
            resetZoneHighlight(hoveredZone);
          }
          hoveredZone = zone;
          highlightZone(zone);

          tooltipName.textContent = zone.name;
          tooltipArea.textContent = formatArea(zone.area);
          tooltipDetail.textContent = zone.detail;
        }

        tooltip.classList.add('visible');
        container.style.cursor = 'pointer';
      } else {
        if (hoveredZone) {
          resetZoneHighlight(hoveredZone);
          hoveredZone = null;
        }
        tooltip.classList.remove('visible');
        container.style.cursor = isUserInteracting ? 'grabbing' : 'grab';
      }
    }

    function highlightZone(zone) {
      for (const obj of zoneObjects) {
        if (obj.mesh.userData.zone === zone) {
          obj.mesh.material.opacity = 0.45;
          obj.mesh.material.color.set(0x00e8e8);
          if (obj.borderLine) {
            obj.borderLine.material.opacity = 0.9;
            obj.borderLine.material.color.set(0x00ffff);
          }
          break;
        }
      }
    }

    function resetZoneHighlight(zone) {
      for (const obj of zoneObjects) {
        if (obj.mesh.userData.zone === zone) {
          obj.mesh.material.opacity = 0.22;
          obj.mesh.material.color.set(0x00b4b4);
          if (obj.borderLine) {
            obj.borderLine.material.opacity = 0.55;
            obj.borderLine.material.color.set(0x00e0e0);
          }
          break;
        }
      }
    }

    // ====================================================
    // ANIMATION LOOP
    // ====================================================
    let frameCount = 0;

    function animate(time) {
      requestAnimationFrame(animate);
      frameCount++;

      controls.update();

      // Pulse ZEE zones
      if (frameCount % 2 === 0) {
        const pulse = 0.18 + Math.sin(frameCount * 0.015) * 0.04;
        for (const obj of zoneObjects) {
          if (obj.mesh.userData.zone !== hoveredZone) {
            obj.mesh.material.opacity = pulse;
          }
        }
      }

      // Update traffic particles
      if (layerVisibility.traffic) {
        updateTrafficParticles(time || 0);
      }

      checkHover();
      renderer.render(scene, camera);
    }

    // ====================================================
    // RESIZE HANDLER
    // ====================================================
    window.addEventListener('resize', () => {
      const w = container.clientWidth;
      const h = container.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    });

    // ====================================================
    // START
    // ====================================================
    animate();

  </script>
</body>
