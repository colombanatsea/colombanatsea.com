  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0e1a;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #globe-container {
      width: 100vw;
      height: 100vh;
      position: relative;
      cursor: grab;
    }

    #globe-container:active {
      cursor: grabbing;
    }

    canvas {
      display: block;
    }

    /* Header overlay */
    #header-overlay {
      position: absolute;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
      pointer-events: none;
      width: 90%;
      max-width: 720px;
    }

    #header-overlay h1 {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: clamp(1.3rem, 3vw, 2rem);
      color: #fff;
      text-shadow: 0 2px 24px rgba(0,0,0,0.9);
      letter-spacing: 0.03em;
      line-height: 1.3;
    }

    #header-overlay h1 span {
      color: #00d4d4;
    }

    #header-overlay .subtitle {
      font-family: 'Source Serif 4', serif;
      font-weight: 400;
      font-style: italic;
      font-size: clamp(0.85rem, 1.4vw, 1.05rem);
      color: rgba(255,255,255,0.6);
      margin-top: 6px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.7);
    }

    /* Total counter bottom right */
    #total-counter {
      position: absolute;
      bottom: 32px;
      right: 36px;
      z-index: 10;
      pointer-events: none;
      text-align: right;
    }

    #total-counter .label {
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    #total-counter .value {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      color: #00d4d4;
      text-shadow: 0 0 30px rgba(0, 212, 212, 0.4);
      line-height: 1.1;
    }

    #total-counter .unit {
      font-family: 'Source Serif 4', serif;
      font-weight: 400;
      font-style: italic;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }

    /* Tooltip */
    #tooltip {
      position: absolute;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      background: rgba(10, 14, 30, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 200, 200, 0.35);
      border-radius: 10px;
      padding: 14px 20px;
      min-width: 180px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px rgba(0,180,180,0.1);
    }

    #tooltip.visible {
      opacity: 1;
    }

    #tooltip .zone-name {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      color: #fff;
      margin-bottom: 4px;
    }

    #tooltip .zone-area {
      font-family: 'Source Serif 4', serif;
      font-style: italic;
      font-size: 0.85rem;
      color: #00d4d4;
    }

    #tooltip .zone-detail {
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
    }

    /* Legend bottom left */
    #legend {
      position: absolute;
      bottom: 32px;
      left: 36px;
      z-index: 10;
      pointer-events: none;
    }

    #legend .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    #legend .swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border: 1px solid rgba(0,200,200,0.5);
      background: rgba(0, 180, 180, 0.35);
    }

    #legend .legend-label {
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.5);
    }

    /* Loading screen */
    #loading {
      position: absolute;
      inset: 0;
      z-index: 999;
      background: #0a0e1a;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      transition: opacity 0.8s ease;
    }

    #loading.fade-out {

    }

    #loading .spinner {

      border: 2px solid rgba(0,212,212,0.15);

      font-weight: 300;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

    // CONFIG
    // ====================================================
    const GLOBE_RADIUS = 1.0;
    const ATMOSPHERE_RADIUS = 1.015;

    const ZONE_SEGMENTS = 64;       // circle resolution
    const AUTO_ROTATE_SPEED = 0.08; // degrees per frame

    // Compute radius on the sphere for each zone from area
    // real earth radius ~6371 km, sphere radius = 1.0
    // angular radius in radians: r = sqrt(area / pi) / 6371
    const EARTH_RADIUS_KM = 6371;

    function areaToAngularRadius(areaKm2) {
      return Math.sqrt(areaKm2 / Math.PI) / EARTH_RADIUS_KM;
    }

    // ====================================================
    // SCENE SETUP
    // ====================================================

    const tooltip = document.getElementById('tooltip');
    const tooltipName = tooltip.querySelector('.zone-name');
    const tooltipArea = tooltip.querySelector('.zone-area');
    const tooltipDetail = tooltip.querySelector('.zone-detail');

    const scene = new THREE.Scene();

      window.innerWidth / window.innerHeight,
      0.01,
      100
    );
    camera.position.set(0, 0.4, 2.8);

      antialias: true,
      alpha: false,
      powerPreference: 'high-performance'

    renderer.setSize(window.innerWidth, window.innerHeight);

    renderer.setClearColor(0x0a0e1a, 1);
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    // ====================================================

    controls.enableDamping = true;
    controls.dampingFactor = 0.06;

    controls.enableZoom = true;

    // GLOBE — dark ocean sphere
    // ====================================================

    const globeMaterial = new THREE.MeshPhongMaterial({
      color: 0x0b1525,
      emissive: 0x050a14,
      emissiveIntensity: 0.3,
      shininess: 15,
      transparent: false

    const globe = new THREE.Mesh(globeGeometry, globeMaterial);
    scene.add(globe);

    // ====================================================
    // SUBTLE GRID LINES (latitude/longitude)
    // ====================================================
    function createGridLines() {
      const gridGroup = new THREE.Group();
      const gridMaterial = new THREE.LineBasicMaterial({
        color: 0x1a2540,
        transparent: true,
        opacity: 0.25
      });

      const R = GLOBE_RADIUS + 0.001;

      // Latitude lines every 30 degrees
      for (let lat = -60; lat <= 60; lat += 30) {
        const phi = (90 - lat) * Math.PI / 180;
        const points = [];
        for (let lng = 0; lng <= 360; lng += 3) {
          const theta = lng * Math.PI / 180;
          points.push(new THREE.Vector3(
            R * Math.sin(phi) * Math.cos(theta),
            R * Math.cos(phi),
            -R * Math.sin(phi) * Math.sin(theta)
          ));
        }
        const geo = new THREE.BufferGeometry().setFromPoints(points);
        gridGroup.add(new THREE.Line(geo, gridMaterial));
      }

      // Longitude lines every 30 degrees
      for (let lng = 0; lng < 360; lng += 30) {
        const theta = lng * Math.PI / 180;
        const points = [];
        for (let lat = -90; lat <= 90; lat += 3) {
          const phi = (90 - lat) * Math.PI / 180;
          points.push(new THREE.Vector3(
            R * Math.sin(phi) * Math.cos(theta),
            R * Math.cos(phi),
            -R * Math.sin(phi) * Math.sin(theta)
          ));
        }
        const geo = new THREE.BufferGeometry().setFromPoints(points);
        gridGroup.add(new THREE.Line(geo, gridMaterial));
      }

      return gridGroup;
    }
    scene.add(createGridLines());

    // ====================================================
    // CONTINENT OUTLINES
    // ====================================================
    function latLngToVec3(lat, lng, radius) {
      const phi = (90 - lat) * Math.PI / 180;
      const theta = -lng * Math.PI / 180;
      return new THREE.Vector3(
        radius * Math.sin(phi) * Math.cos(theta),
        radius * Math.cos(phi),
        radius * Math.sin(phi) * Math.sin(theta)
      );
    }

    function createContinentOutlines() {
      const group = new THREE.Group();
      const R = GLOBE_RADIUS + 0.002;
      const material = new THREE.LineBasicMaterial({
        color: 0x2a3550,
        transparent: true,
        opacity: 0.55
      });

      for (const outline of CONTINENT_OUTLINES) {
        const points = outline.map(([lng, lat]) => latLngToVec3(lat, lng, R));
        const geo = new THREE.BufferGeometry().setFromPoints(points);
        group.add(new THREE.Line(geo, material));
      }

      return group;
    }
    scene.add(createContinentOutlines());

    // by creating a second sphere with slightly different color

    // we'll just rely on outlines for simplicity. The dark globe
    // already looks like ocean; outlines define land.
    // ====================================================

      }
    `;
    const atmosphereFS = `
      varying vec3 vNormal;
      void main() {
        float intensity = pow(0.65 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 3.0);
        gl_FragColor = vec4(0.1, 0.5, 0.6, 1.0) * intensity * 0.6;
      }
    `;
    const atmosphereMaterial = new THREE.ShaderMaterial({
      vertexShader: atmosphereVS,
      fragmentShader: atmosphereFS,
      blending: THREE.AdditiveBlending,
      side: THREE.BackSide,
      transparent: true,
      depthWrite: false
    });
    const atmosphere = new THREE.Mesh(
      new THREE.SphereGeometry(GLOBE_RADIUS * 1.12, 64, 64),
      atmosphereMaterial
    );
    scene.add(atmosphere);

    // ====================================================
    // ZEE ZONES — circular patches on the sphere surface
    // ====================================================
    const zoneMeshes = [];  // for raycasting
    const zoneGroup = new THREE.Group();
    scene.add(zoneGroup);

    function createZoneDisc(zone) {
      const angularRadius = areaToAngularRadius(zone.area);

      // Clamp very large zones for display (Polynésie = huge)
      const maxAngularRadius = 0.35; // ~2200km radius visual cap
      const displayRadius = Math.min(angularRadius, maxAngularRadius);

      const centerPhi = (90 - zone.lat) * Math.PI / 180;
      const centerTheta = -zone.lng * Math.PI / 180;

      // Create a disc of triangles on the sphere surface
      const vertices = [];
      const indices = [];

      // Center point
      const cx = ZEE_HEIGHT * Math.sin(centerPhi) * Math.cos(centerTheta);
      const cy = ZEE_HEIGHT * Math.cos(centerPhi);
      const cz = ZEE_HEIGHT * Math.sin(centerPhi) * Math.sin(centerTheta);
      vertices.push(cx, cy, cz);

      // Perimeter points
      for (let i = 0; i <= ZONE_SEGMENTS; i++) {
        const angle = (i / ZONE_SEGMENTS) * Math.PI * 2;

        // Calculate point on sphere at angular distance from center
        // Using spherical coordinate offset
        const sinR = Math.sin(displayRadius);
        const cosR = Math.cos(displayRadius);
        const sinA = Math.sin(angle);
        const cosA = Math.cos(angle);

        // Point relative to north pole at angular distance displayRadius
        const px = sinR * cosA;
        const py = cosR;
        const pz = sinR * sinA;

        // Rotate from north pole to center position
        // First rotate by centerPhi around Z axis (latitude)
        // Then rotate by centerTheta around Y axis (longitude)
        const sinPhi = Math.sin(centerPhi);
        const cosPhi = Math.cos(centerPhi);

        // Rotate around X-axis by centerPhi
        const rx = px;
        const ry = py * cosPhi - pz * sinPhi;
        const rz = py * sinPhi + pz * cosPhi;

        // Rotate around Y-axis by centerTheta
        const sinT = Math.sin(centerTheta);
        const cosT = Math.cos(centerTheta);
        const fx = rx * cosT + rz * sinT;
        const fy = ry;
        const fz = -rx * sinT + rz * cosT;

        vertices.push(fx * ZEE_HEIGHT, fy * ZEE_HEIGHT, fz * ZEE_HEIGHT);

        if (i > 0) {
          indices.push(0, i, i + 1);
        }
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
      geometry.setIndex(indices);
      geometry.computeVertexNormals();

      // Fill material
      const fillMaterial = new THREE.MeshBasicMaterial({
        color: 0x00b4b4,
        transparent: true,
        opacity: 0.22,
        side: THREE.DoubleSide,
        depthWrite: false
      });

      const mesh = new THREE.Mesh(geometry, fillMaterial);
      mesh.userData = { zone: zone, isZEE: true };
      mesh.renderOrder = 1;
      zoneGroup.add(mesh);
      zoneMeshes.push(mesh);

      // Border ring
      const borderPoints = [];
      for (let i = 0; i <= ZONE_SEGMENTS; i++) {
        const idx = (i + 1) * 3; // skip center point
        if (idx + 2 < vertices.length) {
          borderPoints.push(new THREE.Vector3(
            vertices[idx] * 1.0005,
            vertices[idx + 1] * 1.0005,
            vertices[idx + 2] * 1.0005
          ));
        }
      }

      const borderGeo = new THREE.BufferGeometry().setFromPoints(borderPoints);
      const borderMaterial = new THREE.LineBasicMaterial({
        color: 0x00e0e0,
        transparent: true,
        opacity: 0.55,
        linewidth: 1
      });
      const borderLine = new THREE.Line(borderGeo, borderMaterial);
      borderLine.renderOrder = 2;
      zoneGroup.add(borderLine);

      // Small center marker dot
      const dotGeo = new THREE.SphereGeometry(0.006, 8, 8);
      const dotMat = new THREE.MeshBasicMaterial({
        color: 0x00ffff,
        transparent: true,
        opacity: 0.7
      });
      const dot = new THREE.Mesh(dotGeo, dotMat);
      dot.position.set(cx * 1.005, cy * 1.005, cz * 1.005);
      zoneGroup.add(dot);

      return { mesh, borderLine, dot };
    }

    // Create all zones
    const zoneObjects = ZEE_ZONES.map(zone => createZoneDisc(zone));

    // ====================================================
    // STARFIELD BACKGROUND
    // ====================================================
    function createStarfield() {
      const starCount = 2000;
      const positions = new Float32Array(starCount * 3);
      const sizes = new Float32Array(starCount);

      for (let i = 0; i < starCount; i++) {
        const r = 15 + Math.random() * 35;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);

        positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i * 3 + 2] = r * Math.cos(phi);
        sizes[i] = 0.3 + Math.random() * 1.2;
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geo.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));

      const mat = new THREE.PointsMaterial({
        color: 0xaabbdd,
        size: 0.04,
        transparent: true,
        opacity: 0.6,
        sizeAttenuation: true,
        depthWrite: false
      });

      return new THREE.Points(geo, mat);
    }
    scene.add(createStarfield());

    // ====================================================
    // RAYCASTING for hover detection
    // ====================================================
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2(-999, -999);
    let hoveredZone = null;
    let isUserInteracting = false;

    container.addEventListener('pointermove', (e) => {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

      // Position tooltip
      tooltip.style.left = (e.clientX + 18) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';

      // Keep tooltip on screen
      const rect = tooltip.getBoundingClientRect();
      if (rect.right > window.innerWidth - 10) {
        tooltip.style.left = (e.clientX - rect.width - 18) + 'px';
      }
      if (rect.bottom > window.innerHeight - 10) {
        tooltip.style.top = (e.clientY - rect.height - 10) + 'px';
      }
    });

    container.addEventListener('pointerdown', () => {
      isUserInteracting = true;
      controls.autoRotate = false;
    });

    container.addEventListener('pointerup', () => {
      isUserInteracting = false;
      // Resume auto-rotate after 3 seconds of inactivity
      clearTimeout(window._resumeTimer);
      window._resumeTimer = setTimeout(() => {
        if (!isUserInteracting) {
          controls.autoRotate = true;
        }
      }, 3000);
    });

    function formatArea(km2) {
      if (km2 >= 1000000) {
        return (km2 / 1000000).toFixed(1).replace('.', ',') + ' M km\u00B2';
      }
      return km2.toLocaleString('fr-FR') + ' km\u00B2';
    }

    function checkHover() {
      raycaster.setFromCamera(mouse, camera);

      const intersects = raycaster.intersectObjects(zoneMeshes);

      if (intersects.length > 0) {
        const hit = intersects[0].object;
        const zone = hit.userData.zone;

        if (hoveredZone !== zone) {
          // Reset previous hover
          if (hoveredZone) {
            resetZoneHighlight(hoveredZone);
          }

          hoveredZone = zone;
          highlightZone(zone);

          // Update tooltip
          tooltipName.textContent = zone.name;
          tooltipArea.textContent = formatArea(zone.area);
          tooltipDetail.textContent = zone.detail;
        }

        tooltip.classList.add('visible');
        container.style.cursor = 'pointer';
      } else {
        if (hoveredZone) {
          resetZoneHighlight(hoveredZone);
          hoveredZone = null;
        }
        tooltip.classList.remove('visible');
        container.style.cursor = isUserInteracting ? 'grabbing' : 'grab';
      }
    }

    function highlightZone(zone) {
      for (const obj of zoneObjects) {
        if (obj.mesh.userData.zone === zone) {
          obj.mesh.material.opacity = 0.45;
          obj.mesh.material.color.set(0x00e8e8);
          obj.borderLine.material.opacity = 0.9;
          obj.borderLine.material.color.set(0x00ffff);
          obj.dot.material.opacity = 1.0;
          obj.dot.scale.set(1.5, 1.5, 1.5);
          break;
        }
      }
    }

    function resetZoneHighlight(zone) {
      for (const obj of zoneObjects) {
        if (obj.mesh.userData.zone === zone) {
          obj.mesh.material.opacity = 0.22;
          obj.mesh.material.color.set(0x00b4b4);
          obj.borderLine.material.opacity = 0.55;
          obj.borderLine.material.color.set(0x00e0e0);
          obj.dot.material.opacity = 0.7;
          obj.dot.scale.set(1, 1, 1);
          break;
        }
      }
    }

    // ====================================================
    // ANIMATION LOOP
    // ====================================================
    let frameCount = 0;

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      controls.update();

      // Subtle zone pulse animation
      if (frameCount % 2 === 0) {
        const pulse = 0.18 + Math.sin(frameCount * 0.015) * 0.04;
        for (const obj of zoneObjects) {
          if (obj.mesh.userData.zone !== hoveredZone) {
            obj.mesh.material.opacity = pulse;
          }
        }
      }

      checkHover();

      renderer.render(scene, camera);
    }

    // ====================================================
    // RESIZE HANDLER
    // ====================================================
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ====================================================
    // START
    // ====================================================
    // Hide loading screen
    requestAnimationFrame(() => {
      const loadingEl = document.getElementById('loading');
      loadingEl.classList.add('fade-out');
      setTimeout(() => loadingEl.remove(), 900);
    });

    animate();

  </script>
</body>
</html>
