<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZEE de France — Globe Interactif (Satellite) | Colomban at Sea</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0e1a;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      width: 100vw;
    }

    #globe-container {
      width: 100%;
      height: 100vh;
      position: relative;
      overflow: hidden;
      cursor: grab;
    }

    #globe-container:active {
      cursor: grabbing;
    }

    canvas {
      display: block;
    }

    /* Header overlay */
    #header-overlay {
      position: absolute;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
      pointer-events: none;
      width: 90%;
      max-width: 720px;
    }

    /* Total counter bottom right */
    #total-counter {
      position: absolute;
      bottom: 32px;
      right: 36px;
      z-index: 10;
      pointer-events: none;
      text-align: right;
    }

    #total-counter .label {
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    #total-counter .value {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      color: #00d4d4;
      text-shadow: 0 0 30px rgba(0, 212, 212, 0.4);
      line-height: 1.1;
    }

    #total-counter .unit {
      font-family: 'Source Serif 4', serif;
      font-weight: 400;
      font-style: italic;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }

    #total-counter .stat-item {
      transition: opacity 0.35s ease, max-height 0.35s ease;
      overflow: hidden;
      max-height: 80px;
      opacity: 1;
    }

    #total-counter .stat-item.hidden {
      opacity: 0;
      max-height: 0;
      margin-top: 0 !important;
    }

    /* Tooltip */
    #tooltip {
      position: absolute;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      background: rgba(10, 14, 30, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 200, 200, 0.35);
      border-radius: 10px;
      padding: 14px 20px;
      min-width: 180px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px rgba(0,180,180,0.1);
    }

    #tooltip.visible {
      opacity: 1;
    }

    #tooltip .zone-name {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      color: #fff;
      margin-bottom: 4px;
    }

    #tooltip .zone-area {
      font-family: 'Source Serif 4', serif;
      font-style: italic;
      font-size: 0.85rem;
      color: #00d4d4;
    }

    #tooltip .zone-detail {
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
    }

    /* Legend bottom left */
    #legend {
      position: absolute;
      bottom: 32px;
      left: 36px;
      z-index: 10;
      pointer-events: auto;
    }

    #legend .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      user-select: none;
      transition: opacity 0.25s ease;
    }

    #legend .legend-item:hover {
      opacity: 0.85;
    }

    #legend .legend-item.disabled {
      opacity: 0.35;
    }

    #legend .legend-item.disabled .legend-label {
      text-decoration: line-through;
    }

    #legend .swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    #legend .swatch.zee {
      border: 1px solid rgba(0,200,200,0.5);
      background: rgba(0, 180, 180, 0.35);
    }

    #legend .swatch.cables {
      border: 1px solid rgba(0, 180, 180, 0.5);
      background: rgba(0, 180, 180, 0.30);
    }

    #legend .swatch.traffic {
      border: 1px solid rgba(255, 100, 50, 0.5);
      background: rgba(255, 100, 50, 0.30);
    }

    #legend .legend-label {
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.5);
    }

    /* Loading screen */
    #loading {
      position: absolute;
      inset: 0;
      z-index: 999;
      background: #0a0e1a;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      transition: opacity 0.8s ease;
    }

    #loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #loading .spinner {
      width: 40px;
      height: 40px;
      border: 2px solid rgba(0,212,212,0.15);
      border-top-color: #00d4d4;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    #loading .load-text {
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="globe-container">
    <div id="header-overlay"></div>

    <div id="total-counter">
      <div class="stat-item" data-stat="zee">
        <div class="label">Surface totale ZEE</div>
        <div class="value">11 691 000</div>

  <div id="loading">

  </div>

  <script defer src="https://cdn.jsdelivr.net/npm/earcut@2.2.4/dist/earcut.min.js"></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ====================================================
    // CONFIG
    // ====================================================
    const GLOBE_RADIUS = 1.0;
    const ZEE_HEIGHT = 1.003;
    const AUTO_ROTATE_SPEED = 0.08;

    // ====================================================
    // SCENE SETUP
    // ====================================================
    const container = document.getElementById('globe-container');
    const tooltip = document.getElementById('tooltip');
    const tooltipName = tooltip.querySelector('.zone-name');
    const tooltipArea = tooltip.querySelector('.zone-area');
    const tooltipDetail = tooltip.querySelector('.zone-detail');

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      45,
      container.clientWidth / container.clientHeight,
      0.01,
      100
    );
    camera.position.set(0, 0.4, 2.8);

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: false,
      powerPreference: 'high-performance'
    });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x0a0e1a, 1);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    // ====================================================
    // CONTROLS
    // ====================================================
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.rotateSpeed = 0.5;
    controls.enableZoom = true;
    controls.zoomSpeed = 0.8;
    controls.minDistance = 1.3;
    controls.maxDistance = 5;
    controls.enablePan = false;
    controls.autoRotate = true;
    controls.autoRotateSpeed = AUTO_ROTATE_SPEED;

    // ====================================================
    // LIGHTING
    // ====================================================
    const ambientLight = new THREE.AmbientLight(0x666666, 1.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 3, 5);
    scene.add(dirLight);

    const backLight = new THREE.DirectionalLight(0x334455, 0.4);
    backLight.position.set(-3, -2, -5);
    scene.add(backLight);

    // ====================================================
    // GLOBE -- satellite textured sphere
    // ====================================================
    const textureLoader = new THREE.TextureLoader();

    const EARTH_TEXTURE_URL = 'https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg';
    const EARTH_BUMP_URL = 'https://unpkg.com/three-globe/example/img/earth-topology.png';

    let globeReady = false;

    const globeGeometry = new THREE.SphereGeometry(GLOBE_RADIUS, 96, 96);
    const globeMaterial = new THREE.MeshPhongMaterial({
      color: 0xffffff,
      shininess: 25,
      bumpScale: 0.015
    });
    const globe = new THREE.Mesh(globeGeometry, globeMaterial);
    scene.add(globe);

    // Load textures
    let loadedCount = 0;
    const totalLoads = 2;

    function checkAllLoaded() {
      loadedCount++;
      if (loadedCount >= totalLoads) {
        globeReady = true;
        const loadingEl = document.getElementById('loading');
        loadingEl.classList.add('fade-out');
        setTimeout(() => loadingEl.remove(), 900);
      }
    }

    textureLoader.load(EARTH_TEXTURE_URL, (texture) => {
      texture.colorSpace = THREE.SRGBColorSpace;
      globeMaterial.map = texture;
      globeMaterial.needsUpdate = true;
      checkAllLoaded();
    }, undefined, () => {
      globeMaterial.color.set(0x0f1d30);
      globeMaterial.emissive = new THREE.Color(0x050a14);
      globeMaterial.emissiveIntensity = 0.3;
      globeMaterial.needsUpdate = true;
      checkAllLoaded();
    });

    textureLoader.load(EARTH_BUMP_URL, (texture) => {
      globeMaterial.bumpMap = texture;
      globeMaterial.needsUpdate = true;
      checkAllLoaded();
    }, undefined, () => {
      checkAllLoaded();
    });

    // ====================================================
    // ATMOSPHERE GLOW
    // ====================================================
    const atmosphereVS = `
      varying vec3 vNormal;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;
    const atmosphereFS = `
      varying vec3 vNormal;
      void main() {
        float intensity = pow(0.65 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 3.0);
        gl_FragColor = vec4(0.15, 0.55, 0.7, 1.0) * intensity * 0.7;
      }
    `;
    const atmosphereMaterial = new THREE.ShaderMaterial({
      vertexShader: atmosphereVS,
      fragmentShader: atmosphereFS,
      blending: THREE.AdditiveBlending,
      side: THREE.BackSide,
      transparent: true,
      depthWrite: false
    });
    const atmosphere = new THREE.Mesh(
      new THREE.SphereGeometry(GLOBE_RADIUS * 1.12, 64, 64),
      atmosphereMaterial
    );
    scene.add(atmosphere);

    // ====================================================
    // UTILITY: lat/lon to Vector3
    // ====================================================
    function latLonToVec3(lat, lon, radius) {
      const phi = (90 - lat) * Math.PI / 180;
      const theta = -lon * Math.PI / 180;
      return new THREE.Vector3(
        radius * Math.sin(phi) * Math.cos(theta),
        radius * Math.cos(phi),
        radius * Math.sin(phi) * Math.sin(theta)
      );
    }

    // ====================================================
    // ZEE ZONES -- Real GeoJSON polygons from marineregions.org
    // ====================================================
    const zoneMeshes = [];
    const zoneGroup = new THREE.Group();
    scene.add(zoneGroup);
    const zoneObjects = [];

    // Normalize longitude for antimeridian handling
    function normalizeLon(ring) {
      let maxJump = 0;
      for (let i = 1; i < ring.length; i++) {
        maxJump = Math.max(maxJump, Math.abs(ring[i][0] - ring[i - 1][0]));
      }
      if (maxJump <= 180) return ring;
      return ring.map(p => [p[0] < 0 ? p[0] + 360 : p[0], p[1]]);
    }

    // Douglas-Peucker simplification (iterative — no stack overflow on large rings)
    function simplifyRing(ring, tolerance) {
      if (ring.length <= 4) return ring;
      const tol2 = tolerance * tolerance;

      function sqDistToSeg(p, a, b) {
        let dx = b[0] - a[0], dy = b[1] - a[1];
        if (dx !== 0 || dy !== 0) {
          const t = Math.max(0, Math.min(1, ((p[0] - a[0]) * dx + (p[1] - a[1]) * dy) / (dx * dx + dy * dy)));
          dx = a[0] + t * dx - p[0];
          dy = a[1] + t * dy - p[1];
        } else {
          dx = p[0] - a[0]; dy = p[1] - a[1];
        }
        return dx * dx + dy * dy;
      }

      const keep = new Uint8Array(ring.length);
      keep[0] = 1;
      keep[ring.length - 1] = 1;

      // Iterative stack instead of recursion
      const stack = [[0, ring.length - 1]];
      while (stack.length > 0) {
        const [first, last] = stack.pop();
        let maxD = 0, index = 0;
        for (let i = first + 1; i < last; i++) {
          const d = sqDistToSeg(ring[i], ring[first], ring[last]);
          if (d > maxD) { maxD = d; index = i; }
        }
        if (maxD > tol2) {
          keep[index] = 1;
          if (index - first > 1) stack.push([first, index]);
          if (last - index > 1) stack.push([index, last]);
        }
      }

      const result = [];
      for (let i = 0; i < ring.length; i++) { if (keep[i]) result.push(ring[i]); }
      // Ensure closed
      if (result.length >= 2) {
        const f = result[0], l = result[result.length - 1];
        if (f[0] !== l[0] || f[1] !== l[1]) result.push(result[0]);
      }
      return result.length >= 3 ? result : ring;
    }

    function createZeeMesh(outerPts, holePtsArray, properties) {
      // Build flat array for earcut
      const flat = [];
      for (const pt of outerPts) flat.push(pt[0], pt[1]);

      const holeIndices = [];
      if (holePtsArray) {
        for (const hole of holePtsArray) {
          if (hole.length < 3) continue;
          holeIndices.push(flat.length / 2);
          for (const pt of hole) flat.push(pt[0], pt[1]);
        }
      }

      let triIndices;
      try {
        triIndices = earcut(flat, holeIndices.length > 0 ? holeIndices : null, 2);
      } catch (e) {
        console.warn('Earcut failed for', properties.geoname || 'unknown', e);
        return null;
      }
      if (!triIndices || triIndices.length === 0) return null;

      // Build 3D vertices
      const vertCount = flat.length / 2;
      const verts = new Float32Array(vertCount * 3);
      for (let i = 0; i < vertCount; i++) {
        let lon = flat[i * 2];
        if (lon > 180) lon -= 360;
        const lat = flat[i * 2 + 1];
        const v = latLonToVec3(lat, lon, ZEE_HEIGHT);
        verts[i * 3] = v.x;
        verts[i * 3 + 1] = v.y;
        verts[i * 3 + 2] = v.z;
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
      geo.setIndex(triIndices);
      geo.computeVertexNormals();

      const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
        color: 0x00b4b4, transparent: true, opacity: 0.22,
        side: THREE.DoubleSide, depthWrite: false
      }));
      mesh.userData = {
        isZEE: true,
        zone: {
          name: properties.geoname || properties.territory1 || 'ZEE France',
          detail: properties.detail || properties.sovereign1 || 'France',
          area: properties.area_km2 || 0
        }
      };
      mesh.renderOrder = 1;
      zoneGroup.add(mesh);
      zoneMeshes.push(mesh);

      // Border
      const borderPts = [];
      for (const pt of outerPts) {
        let lon = pt[0]; if (lon > 180) lon -= 360;
        borderPts.push(latLonToVec3(pt[1], lon, ZEE_HEIGHT * 1.0005));
      }
      if (borderPts.length > 2) borderPts.push(borderPts[0].clone());

      let borderLine = null;
      if (borderPts.length >= 2) {
        const bGeo = new THREE.BufferGeometry().setFromPoints(borderPts);
        borderLine = new THREE.Line(bGeo, new THREE.LineBasicMaterial({
          color: 0x00e0e0, transparent: true, opacity: 0.55
        }));
        borderLine.renderOrder = 2;
        zoneGroup.add(borderLine);
      }

      return { mesh, borderLine };
    }

    // Process pre-simplified EEZ features
    function processEEZGeoJSON(geojson) {
      if (!geojson || !geojson.features) return;

      const allPolygons = [];
      for (const feature of geojson.features) {
        const geom = feature.geometry;
        const props = feature.properties || {};
        if (!geom) continue;

        const coordsList = [];
        if (geom.type === 'Polygon') coordsList.push(geom.coordinates);
        else if (geom.type === 'MultiPolygon') {
          for (const poly of geom.coordinates) coordsList.push(poly);
        }

        for (const coords of coordsList) {
          allPolygons.push({ coords, props });
        }
      }

      console.log(`EEZ: processing ${allPolygons.length} polygons...`);

      // Data is pre-simplified — process all polygons directly
      for (const { coords, props } of allPolygons) {
        const outer = coords[0];
        if (!outer || outer.length < 3) continue;

        const normOuter = normalizeLon(outer);
        const holes = [];
        for (let h = 1; h < coords.length; h++) {
          if (coords[h] && coords[h].length >= 3) {
            holes.push(normalizeLon(coords[h]));
          }
        }

        const result = createZeeMesh(normOuter, holes, props);
        if (result) zoneObjects.push(result);
      }
      console.log(`EEZ: loaded ${zoneObjects.length} polygons`);
    }

    // Wait for earcut to be available (loaded with defer)
    function waitForEarcut() {
      return new Promise(resolve => {
        if (typeof earcut !== 'undefined') return resolve();
        const check = setInterval(() => {
          if (typeof earcut !== 'undefined') { clearInterval(check); resolve(); }
        }, 50);
      });
    }

    // ====================================================
    function createStarfield() {
      const starCount = 2000;
      const positions = new Float32Array(starCount * 3);
      const sizes = new Float32Array(starCount);

      for (let i = 0; i < starCount; i++) {
        const r = 15 + Math.random() * 35;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);

        positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i * 3 + 2] = r * Math.cos(phi);
        sizes[i] = 0.3 + Math.random() * 1.2;
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geo.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));

      const mat = new THREE.PointsMaterial({
        color: 0xaabbdd,
        size: 0.04,
        transparent: true,
        opacity: 0.6,
        sizeAttenuation: true,
        depthWrite: false
      });

      return new THREE.Points(geo, mat);
    }
    scene.add(createStarfield());

    // ====================================================
    // SUBMARINE CABLES LAYER
    // ====================================================
    const cableGroup = new THREE.Group();
    scene.add(cableGroup);
    const CABLE_RADIUS = GLOBE_RADIUS + 0.005;

    // Split cable coordinates at antimeridian crossings and large longitude gaps.
    // Returns an array of coordinate arrays, each safe to render as a single line.
    function splitCableCoords(coords) {
      const segments = [];
      let current = [];

      for (let i = 0; i < coords.length; i++) {
        const lon = coords[i][0];
        const lat = coords[i][1];
        if (isNaN(lat) || isNaN(lon)) continue;

        if (current.length > 0) {
          const prevLon = current[current.length - 1][0];
          const lonDiff = Math.abs(lon - prevLon);

          // If longitude jump > 90°, this segment crosses the antimeridian or wraps
          if (lonDiff > 90) {
            // Interpolate the crossing point at ±180
            const prevCoord = current[current.length - 1];
            const lon1 = prevCoord[0];
            const lat1 = prevCoord[1];
            let lon2 = lon;
            const lat2 = lat;

            // Unwrap lon2 to be continuous with lon1
            if (lon2 - lon1 > 180) lon2 -= 360;
            else if (lon1 - lon2 > 180) lon2 += 360;

            const crossLon = lon1 > 0 ? 180 : -180;
            const t = (lon2 - lon1) !== 0 ? (crossLon - lon1) / (lon2 - lon1) : 0.5;
            const crossLat = lat1 + t * (lat2 - lat1);

            // End current segment at the crossing
            current.push([crossLon, crossLat]);
            if (current.length >= 2) segments.push(current);

            // Start new segment from the other side of the antimeridian
            current = [[-crossLon, crossLat], [lon, lat]];
            continue;
          }
        }

        current.push([lon, lat]);
      }

      if (current.length >= 2) segments.push(current);
      return segments;
    }

    function buildCableLine(coords, color) {
      const points = [];
      for (let i = 0; i < coords.length; i++) {
        const lon = coords[i][0];
        const lat = coords[i][1];
        if (isNaN(lat) || isNaN(lon)) continue;
        points.push(latLonToVec3(lat, lon, CABLE_RADIUS));
      }
      if (points.length < 2) return null;
      const geo = new THREE.BufferGeometry().setFromPoints(points);
      const mat = new THREE.LineBasicMaterial({
        color: color,
        transparent: true,
        opacity: 0.35,
        depthWrite: false
      });
      return new THREE.Line(geo, mat);
    }

    function processCableGeoJSON(geojson) {
      if (!geojson || !geojson.features) {
        console.warn('Submarine cables: invalid GeoJSON data');
        return;
      }
      let lineCount = 0;
      for (const feature of geojson.features) {
        const geom = feature.geometry;
        if (!geom) continue;

        let cableColor;
        const colorVal = feature.properties && (feature.properties.color || feature.properties.c);
        if (colorVal) {
          try {
            cableColor = new THREE.Color(colorVal);
          } catch(e) {
            cableColor = new THREE.Color(0x00b4b4);
          }
        } else {
          cableColor = new THREE.Color(0x00b4b4);
        }

        const coordSets = [];
        if (geom.type === 'MultiLineString') {
          for (const lineCoords of geom.coordinates) {
            coordSets.push(lineCoords);
          }
        } else if (geom.type === 'LineString') {
          coordSets.push(geom.coordinates);
        }

        for (const coords of coordSets) {
          // Split at antimeridian crossings before building lines
          const splitSegments = splitCableCoords(coords);
          for (const segCoords of splitSegments) {
            const line = buildCableLine(segCoords, cableColor);
            if (line) {
              line.renderOrder = 3;
              cableGroup.add(line);
              lineCount++;
            }
          }
        }
      }
      console.log(`Submarine cables: loaded ${lineCount} line segments`);

    const LANE_RADIUS = GLOBE_RADIUS + 0.003;
    const LANE_STYLES = {
      1: { color: 0xff8c50, opacity: 0.90, linewidth: 1 },  // Major
      2: { color: 0xff7040, opacity: 0.60, linewidth: 1 },  // Middle
      3: { color: 0xff6432, opacity: 0.32, linewidth: 1 }   // Minor
    };

    SHIPPING_LANES.features.forEach(function(feat) {
      const style = LANE_STYLES[feat.properties.t];
      const mat = new THREE.LineBasicMaterial({
        color: style.color,
        transparent: true,
        opacity: style.opacity,
        depthWrite: false
      });
      feat.geometry.coordinates.forEach(function(line) {
        const points = [];
        for (let i = 0; i < line.length; i++) {
          const lon = line[i][0], lat = line[i][1];
          if (isNaN(lat) || isNaN(lon)) continue;
          points.push(latLonToVec3(lat, lon, LANE_RADIUS));
        }
        if (points.length >= 2) {
          const geo = new THREE.BufferGeometry().setFromPoints(points);
          trafficGroup.add(new THREE.Line(geo, mat));
        }
      });
    });
    console.log('Shipping lanes loaded (vector)');

    // ====================================================
    // LAYER TOGGLES
    // ====================================================
    const layerVisibility = { zee: true, cables: true, traffic: true };

    document.querySelectorAll('#legend .legend-item[data-layer]').forEach(item => {
      item.addEventListener('click', () => {
        const layer = item.dataset.layer;
        layerVisibility[layer] = !layerVisibility[layer];
        item.classList.toggle('disabled', !layerVisibility[layer]);

        if (layer === 'zee') {
          zoneGroup.visible = layerVisibility.zee;
        } else if (layer === 'cables') {
          cableGroup.visible = layerVisibility.cables;
        } else if (layer === 'traffic') {
          trafficGroup.visible = layerVisibility.traffic;
        }

        // Toggle corresponding stat counter
        const statEl = document.querySelector(`#total-counter .stat-item[data-stat="${layer}"]`);
        if (statEl) {
          statEl.classList.toggle('hidden', !layerVisibility[layer]);
        }
      });
    });

    // ====================================================
    // RAYCASTING
    // ====================================================
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2(-999, -999);
    let hoveredZone = null;
    let isUserInteracting = false;

    container.addEventListener('pointermove', (e) => {
      const rect = container.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

      tooltip.style.left = (e.clientX + 18) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';

      const tooltipRect = tooltip.getBoundingClientRect();
      if (tooltipRect.right > window.innerWidth - 10) {
        tooltip.style.left = (e.clientX - tooltipRect.width - 18) + 'px';
      }
      if (tooltipRect.bottom > window.innerHeight - 10) {
        tooltip.style.top = (e.clientY - tooltipRect.height - 10) + 'px';
      }
    });

    container.addEventListener('pointerdown', () => {
      isUserInteracting = true;
      controls.autoRotate = false;
    });

    container.addEventListener('pointerup', () => {
      isUserInteracting = false;
      clearTimeout(window._resumeTimer);
      window._resumeTimer = setTimeout(() => {
        if (!isUserInteracting) {
          controls.autoRotate = true;
        }
      }, 3000);
    });

    function formatArea(km2) {
      if (!km2 || km2 === 0) return '';
      if (km2 >= 1000000) {
        return (km2 / 1000000).toFixed(1).replace('.', ',') + ' M km\u00B2';
      }
      return km2.toLocaleString('fr-FR') + ' km\u00B2';
    }

    function checkHover() {
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(zoneMeshes);

      if (intersects.length > 0) {
        const hit = intersects[0].object;
        const zone = hit.userData.zone;

        if (hoveredZone !== zone) {
          if (hoveredZone) {
            resetZoneHighlight(hoveredZone);
          }
          hoveredZone = zone;
          highlightZone(zone);

          tooltipName.textContent = zone.name;
          tooltipArea.textContent = formatArea(zone.area);
          tooltipDetail.textContent = zone.detail;
        }

        tooltip.classList.add('visible');
        container.style.cursor = 'pointer';
      } else {
        if (hoveredZone) {
          resetZoneHighlight(hoveredZone);
          hoveredZone = null;
        }
        tooltip.classList.remove('visible');
        container.style.cursor = isUserInteracting ? 'grabbing' : 'grab';
      }
    }

    function highlightZone(zone) {
      for (const obj of zoneObjects) {
        if (obj.mesh.userData.zone === zone) {
          obj.mesh.material.opacity = 0.45;
          obj.mesh.material.color.set(0x00e8e8);
          if (obj.borderLine) {
            obj.borderLine.material.opacity = 0.9;
            obj.borderLine.material.color.set(0x00ffff);
          }
          break;
        }
      }
    }

    function resetZoneHighlight(zone) {
      for (const obj of zoneObjects) {
        if (obj.mesh.userData.zone === zone) {
          obj.mesh.material.opacity = 0.22;
          obj.mesh.material.color.set(0x00b4b4);
          if (obj.borderLine) {
            obj.borderLine.material.opacity = 0.55;
            obj.borderLine.material.color.set(0x00e0e0);
          }
          break;
        }
      }
    }

    // ====================================================
    // ANIMATION LOOP
    // ====================================================
    let frameCount = 0;

    function animate(time) {
      requestAnimationFrame(animate);
      frameCount++;

      controls.update();

      // Pulse ZEE zones
      if (frameCount % 2 === 0) {
        const pulse = 0.18 + Math.sin(frameCount * 0.015) * 0.04;
        for (const obj of zoneObjects) {
          if (obj.mesh.userData.zone !== hoveredZone) {
            obj.mesh.material.opacity = pulse;
          }
        }
      }



      checkHover();
      renderer.render(scene, camera);
    }

    // ====================================================
    // RESIZE HANDLER
    // ====================================================
    window.addEventListener('resize', () => {
      const w = container.clientWidth;
      const h = container.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    });

    // ====================================================
    // START
    // ====================================================
    animate();

  </script>
</body>
